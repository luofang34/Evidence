name: Publish to crates.io

# Run-name disambiguates the Actions list at a glance: tag-push runs
# render as "Publish <tag>"; manual dispatches render as "Publish
# [DRY-RUN]" or "Publish [REAL] (dispatch)" so a dry-run can't be
# confused with a real publish by someone scanning the history.
run-name: >-
  Publish ${{
    github.event_name == 'push'
      && github.ref_name
      || (inputs.dry_run && '[DRY-RUN]' || '[REAL] (dispatch)')
  }}

# Release-only publish workflow using crates.io Trusted Publishing
# (OIDC; no long-lived API token).
#
# Triggers:
# - `v*` tag push — normal release flow. The tag's version must match
#   `Cargo.toml`'s `[workspace.package] version` exactly.
# - `workflow_dispatch` — manual trigger with `dry_run=true` (default)
#   for verification, or `dry_run=false` for a re-publish of the
#   current workspace version without cutting a new tag (rare).
#
# Every path goes through the `production-release` GitHub environment
# (reviewer-gated, deployment branches restricted to `main` +
# `v*` tags). Trusted publishing pairs this workflow with per-crate
# publisher entries on crates.io (`environment = production-release`).
#
# **No dev channel.** Bleeding-edge installs use git:
#
#     cargo install --git https://github.com/luofang34/Evidence \
#         cargo-evidence
#
# Rationale: every crates.io upload is a permanent public record that
# pollutes the tool's version history for downstream auditors. Daily
# dev uploads would mix into the cert-relevant release list and
# dilute the signal. Rust's `cargo install --git` is the standard
# way to share work-in-progress, and it doesn't cost crates.io a
# name-space slot per commit.

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry-run (skip cargo publish; exercise everything else)'
        type: boolean
        default: true

concurrency:
  # Serialize release publishes so a second dispatch during an in-flight
  # run can't race on the crates.io index-wait step.
  group: publish-release
  cancel-in-progress: false

jobs:
  publish:
    # Job name mirrors the run-name mode so the in-run UI (jobs panel,
    # status checks on PRs) also reflects dry-run vs real without
    # scrolling into step logs.
    name: >-
      ${{
        github.event_name == 'push'
          && format('Publish {0}', github.ref_name)
          || (inputs.dry_run && 'Publish [DRY-RUN]' || 'Publish [REAL] (dispatch)')
      }}
    runs-on: ubuntu-latest
    environment: production-release
    permissions:
      id-token: write   # OIDC for trusted publishing
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust 1.95
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.95"

      - name: Verify workspace version
        shell: bash
        run: |
          WORKSPACE_VER=$(grep -E '^version = ' Cargo.toml | head -1 \
            | sed 's/^version = "\([^"]*\)"/\1/')
          echo "workspace version: $WORKSPACE_VER"
          # On tag-push events, assert the tag matches the workspace
          # version exactly. Prevents publishing `v1.2.3` with
          # Cargo.toml still at `1.2.2`.
          if [ "${{ github.event_name }}" = "push" ]; then
            TAG="${GITHUB_REF#refs/tags/v}"
            if [ "$TAG" != "$WORKSPACE_VER" ]; then
              echo "::error::tag v$TAG doesn't match workspace version $WORKSPACE_VER"
              exit 1
            fi
          fi
          # Refuse `-dev.*` suffixes regardless of trigger. Pre-release
          # suffixes like `-alpha.N` / `-rc.N` / `-beta.N` are allowed
          # (valid semver pre-releases that cargo won't auto-install,
          # matching the project's version conventions).
          if [[ "$WORKSPACE_VER" == *-dev.* ]]; then
            echo "::error::release workflow refuses -dev.* versions: $WORKSPACE_VER"
            exit 1
          fi

      - name: Tarball sanity check
        shell: bash
        run: |
          for crate in evidence-core cargo-evidence mcp-evidence; do
            cargo package --list -p "$crate" --allow-dirty > /tmp/pkg-"$crate".txt
            if grep -qE '^(tool/trace|cert/baselines)/' /tmp/pkg-"$crate".txt; then
              echo "::error::Tarball for $crate contains workspace-root paths"
              grep -E '^(tool/trace|cert/baselines)/' /tmp/pkg-"$crate".txt
              exit 1
            fi
          done

      - name: Authenticate to crates.io via trusted publishing
        if: ${{ github.event_name == 'push' || !inputs.dry_run }}
        id: auth
        uses: rust-lang/crates-io-auth-action@v1

      # Idempotency design. The two-crate pipeline can partially
      # succeed (evidence-core uploads, then a crates.io index fan-out
      # blip trips the downstream wait, and cargo-evidence never
      # runs). A rerun must finish the job without re-uploading the
      # first crate.
      #
      # Earlier attempt: pre-probe with `curl -sfI .../download` and
      # skip `cargo publish` when the probe succeeds. That probe is
      # unreliable on GitHub-hosted runners — the `/download`
      # endpoint redirects 302 to a Fastly CDN edge, and `-f` treats
      # the redirect as a failure on the runner's curl (local curl
      # handled the same 302 cleanly, so this would not have
      # reproduced outside CI). With the probe returning "not
      # published" on a crate that *was* published, the fallback ran
      # `cargo publish` which failed on "already exists".
      #
      # Current approach: let `cargo publish` be the probe. It is the
      # authoritative source of truth. On success, upload succeeded.
      # On non-zero exit, inspect stderr: the literal string
      # "already exists on crates.io index" is the idempotency-OK
      # signal — treat it as success. Any other failure mode
      # propagates.
      #
      # This also removes all reliance on the `/download` endpoint
      # probe behavior, which was shared between the publish-skip
      # guard and the downstream index-wait loop — so the index-wait
      # is reshaped below too.
      - name: Publish evidence-core (idempotent)
        if: ${{ github.event_name == 'push' || !inputs.dry_run }}
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}
        shell: bash
        run: |
          set +e
          out=$(cargo publish -p evidence-core 2>&1)
          rc=$?
          set -e
          printf '%s\n' "$out"
          if [ $rc -ne 0 ]; then
            if printf '%s' "$out" | grep -q "already exists on crates.io index"; then
              echo "::notice::evidence-core already on crates.io at this version; accepting as idempotent no-op"
            else
              exit $rc
            fi
          fi

      # Index-wait: cargo-evidence's `cargo publish` will itself fail
      # if crates.io hasn't indexed evidence-core yet (the dep
      # resolver can't find it). So the wait is still load-bearing —
      # we just can't trust the `/download` probe.
      #
      # Instead of HEAD-probing, use `cargo search` which queries the
      # sparse index the same path `cargo publish` will take. Output
      # format: `<crate> = "<ver>"  # <desc>`. A grep for the exact
      # version string is the probe. 90 retries × 5s = 7.5 min
      # headroom for first-time upload fan-out.
      #
      # `--color never` is required: the workflow's env block pins
      # `CARGO_TERM_COLOR: always` (so build/test output shows colors
      # in the UI), which wraps cargo search's crate-name output in
      # ANSI escapes — `\033[1m\033[92mevidence-core\033[0m = "0.1.0"` —
      # breaking the `^evidence-core` grep anchor. The explicit flag
      # on this call shadows the env for this step only; no other
      # step loses its colored output.
      - name: Wait for crates.io to index evidence-core
        if: ${{ github.event_name == 'push' || !inputs.dry_run }}
        shell: bash
        run: |
          VER=$(grep -E '^version = ' Cargo.toml | head -1 \
            | sed 's/^version = "\([^"]*\)"/\1/')
          for i in {1..90}; do
            if cargo search --color never evidence-core --limit 1 2>/dev/null \
                | grep -qE "^evidence-core = \"${VER}\""; then
              echo "evidence-core ${VER} indexed"
              exit 0
            fi
            sleep 5
          done
          echo "::error::timed out waiting for evidence-core ${VER} to index"
          exit 1

      - name: Publish cargo-evidence (idempotent)
        if: ${{ github.event_name == 'push' || !inputs.dry_run }}
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}
        shell: bash
        run: |
          set +e
          out=$(cargo publish -p cargo-evidence 2>&1)
          rc=$?
          set -e
          printf '%s\n' "$out"
          if [ $rc -ne 0 ]; then
            if printf '%s' "$out" | grep -q "already exists on crates.io index"; then
              echo "::notice::cargo-evidence already on crates.io at this version; accepting as idempotent no-op"
            else
              exit $rc
            fi
          fi

      # mcp-evidence depends on evidence-core only (not
      # cargo-evidence), so once evidence-core is indexed the
      # publish can proceed. No additional index-wait needed.
      - name: Publish mcp-evidence (idempotent)
        if: ${{ github.event_name == 'push' || !inputs.dry_run }}
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}
        shell: bash
        run: |
          set +e
          out=$(cargo publish -p mcp-evidence 2>&1)
          rc=$?
          set -e
          printf '%s\n' "$out"
          if [ $rc -ne 0 ]; then
            if printf '%s' "$out" | grep -q "already exists on crates.io index"; then
              echo "::notice::mcp-evidence already on crates.io at this version; accepting as idempotent no-op"
            else
              exit $rc
            fi
          fi

      - name: Summary
        if: always()
        shell: bash
        run: |
          VER=$(grep -E '^version = ' Cargo.toml | head -1 \
            | sed 's/^version = "\([^"]*\)"/\1/')
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ inputs.dry_run }}" = "true" ]; then
            echo "::notice::Dry-run complete for ${VER}; no crates.io upload"
          else
            echo "::notice::Published ${VER} to crates.io"
          fi
