name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  check:
    name: Check (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Rust 1.85
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.85"
          components: rustfmt, clippy

      - name: Cache cargo registry & build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Format check
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Forbid new `#[allow(dead_code)]`
        if: runner.os == 'Linux'
        shell: bash
        run: |
          # PR diff mode: look only at lines the PR adds. Push mode: scan
          # the whole tree so a direct-to-main push still fails fast.
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            base="origin/${{ github.base_ref }}"
            git fetch --no-tags --depth=1 origin "${{ github.base_ref }}"
            diff=$(git diff "$base"...HEAD -- '*.rs')
            added=$(printf '%s\n' "$diff" | grep -E '^\+[^+]' || true)
            if printf '%s\n' "$added" | grep -qE '#\[allow\(dead_code\)\]'; then
              echo "::error::This PR adds #[allow(dead_code)] — either use the field or delete it."
              printf '%s\n' "$added" | grep -nE '#\[allow\(dead_code\)\]' || true
              exit 1
            fi
          else
            if grep -rnE '#\[allow\(dead_code\)\]' crates/; then
              echo "::error::tree contains #[allow(dead_code)] — either use the field or delete it."
              exit 1
            fi
          fi

      - name: Test
        run: cargo test --workspace

      - name: Build (release)
        run: cargo build --workspace --release

  nix:
    name: Nix build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Nix
        uses: cachix/install-nix-action@v27
        with:
          nix_path: nixpkgs=channel:nixos-unstable

      - name: Nix flake check
        run: nix flake check

      - name: Nix build
        run: nix build
