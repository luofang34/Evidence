name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"
  # Opt into Node.js 24 runtime for any action still pinning Node.js 20
  # (actions/checkout, actions/cache, actions/upload-artifact,
  # DeterminateSystems/nix-installer-action as of this writing). GH
  # forces the switch on 2026-06-02 and removes Node 20 on 2026-09-16;
  # flipping the switch now surfaces any Node-24 incompatibility here
  # instead of on the cutover date.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  check:
    name: Check (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Rust 1.95
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.95"
          components: rustfmt, clippy

      - name: Cache cargo registry & build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Format check
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Forbid schema-version literals outside schema_versions
        if: runner.os == 'Linux'
        shell: bash
        run: |
          # Mirrors the `schema_versions_locked` integration test. A
          # grep-level gate catches non-Rust-source additions
          # (e.g. markdown docs, example TOMLs) that the Rust test
          # doesn't walk.
          hits=$(grep -rnE '"0\.0\.[0-9]+"' crates/ \
            --include='*.rs' --include='*.toml' --include='*.json' --include='*.md' \
            --exclude-dir='target' \
            --exclude-dir='fixtures' \
            --exclude='schema_versions.rs' \
            --exclude='schema_versions_locked.rs' || true)
          if [ -n "$hits" ]; then
            echo "::error::schema-version literal found outside evidence::schema_versions:"
            echo "$hits"
            exit 1
          fi

      - name: Forbid new `#[allow(dead_code)]`
        if: runner.os == 'Linux'
        shell: bash
        run: |
          # Gate intent: this change set must not *add* a new
          # `#[allow(dead_code)]`. Pre-existing ones are grandfathered
          # (e.g. `tests/helpers.rs` needs it because the shared
          # `#[path = "helpers.rs"] mod helpers;` pattern makes the
          # full module visible to each integration-test binary while
          # each binary only uses a subset — real dead_code from the
          # per-binary compile unit's view).
          #
          # PR mode: diff the PR head against its base.
          # Push mode: diff HEAD against its first parent (the state
          # before the merge), so the gate stays delta-based instead
          # of tree-based. The prior tree-grep implementation caused
          # a green PR to produce a red main build — same change set,
          # different verdict — which broke the "PR green ⇒ main
          # stays green" contract. A direct-to-main push with a new
          # allow still fails: `HEAD^..HEAD` captures those lines too.
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            base="origin/${{ github.base_ref }}"
            # No extra fetch: the job's `actions/checkout@v4` step
            # already ran with `fetch-depth: 0`, which populated
            # `origin/${{ github.base_ref }}` at full history. A
            # secondary `git fetch --depth=1` would create a
            # `.git/shallow` marker — the cargo-evidence shallow-clone
            # guard in `preflight` then refuses to run under
            # `cargo test` (the `self_compliance_baseline` test spawns
            # `generate` as a subprocess). Leaving the original-
            # checkout state intact keeps both gates working.
            diff=$(git diff "$base"...HEAD -- '*.rs')
          else
            # On the initial repo commit HEAD^ doesn't exist; fall
            # back to `git show` which treats the first commit as
            # all-additions against the empty tree.
            if git rev-parse --verify HEAD^ >/dev/null 2>&1; then
              diff=$(git diff HEAD^..HEAD -- '*.rs')
            else
              diff=$(git show --format= HEAD -- '*.rs')
            fi
          fi
          added=$(printf '%s\n' "$diff" | grep -E '^\+[^+]' || true)
          if printf '%s\n' "$added" | grep -qE '#\[allow\(dead_code\)\]'; then
            echo "::error::This change adds #[allow(dead_code)] — either use the field or delete it."
            printf '%s\n' "$added" | grep -nE '#\[allow\(dead_code\)\]' || true
            exit 1
          fi

      - name: Test
        run: cargo test --workspace

      # Doc gate: missing_docs is set to `warn` at workspace level; this
      # step elevates it (via RUSTFLAGS=-D warnings) so any public item
      # without a doc comment fails CI. RUSTDOCFLAGS also escalates
      # rustdoc's own lints (broken_intra_doc_links, HTML tag errors,
      # invalid code blocks) to hard errors.
      #
      # Why Linux-only: docs are platform-independent; running this on
      # macOS/Windows burns runner minutes without adding signal. If
      # future docs start using `#[cfg(target_os = "…")]`-gated items,
      # revisit.
      - name: Doc gate (missing_docs + broken intra-doc links)
        if: runner.os == 'Linux'
        env:
          RUSTFLAGS: "-D warnings"
          RUSTDOCFLAGS: "-D rustdoc::broken_intra_doc_links -D rustdoc::private_intra_doc_links -D warnings"
        run: cargo doc --workspace --no-deps

      - name: Build (release)
        run: cargo build --workspace --release

  trace-self-validate:
    # Dogfood the tool's own trace format against its own source.
    # `tool/trace/{sys,hlr,llr,tests}.toml` covers the full DO-178C
    # §5.1 chain (SYS → HLR → LLR → Test); a validation failure here
    # means either a link broke (UUID renamed without a corresponding
    # edit) or the format can't express something new we tried to
    # write — the latter is a format-change ticket recorded in
    # `tool/trace/README.md`, not a bug in this job.
    #
    # `needs: check` intentionally NOT set — runs in parallel, does
    # its own release build. Linux-only; trace validation is
    # platform-independent.
    name: Trace self-validate (ubuntu-latest)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Rust 1.95
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.95"

      - name: Cache cargo registry & build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Build release binary
        run: cargo build --release -p cargo-evidence

      - name: Validate tool/trace (enforcement flags on, discovery picks tool/trace)
        run: |
          # Trace-only validation — fast, no `cargo test` run.
          # `check .` (below) is the agent-facing one-shot that also
          # runs the test suite and emits per-requirement REQ_*
          # diagnostics; this step is kept as a separate gate so a
          # pure-trace regression (broken link, dangling selector)
          # fails fast without waiting for `cargo test`.
          #
          # ci_self_check::ci_yaml_has_enforcement_flags asserts both
          # enforcement flags remain committed to this job.
          ./target/release/cargo-evidence evidence trace \
            --validate \
            --require-hlr-sys-trace \
            --require-hlr-surface-bijection \
            --check-test-selectors

      - name: Self-check via `cargo evidence check .`
        run: |
          # Agent-facing one-shot: runs `cargo test --workspace` under
          # the hood, parses outcomes, emits one REQ_PASS/REQ_GAP/
          # REQ_SKIP per requirement, then the VERIFY_OK terminal.
          # Pass / gap matrix for the tool's own self-trace — the
          # downstream gate PR #47 (self-compliance) will layer on.
          ./target/release/cargo-evidence evidence \
            --format=jsonl \
            check .

      - name: Assert backfill is a no-op on committed trace
        shell: bash
        run: |
          # Any non-empty assignment means an entry was committed
          # without a UUID — the pre-commit workflow missed a step.
          out=$(./target/release/cargo-evidence evidence trace \
            --backfill-uuids \
            --trace-roots tool/trace 2>&1)
          if printf '%s' "$out" | grep -qE 'assigned [1-9]'; then
            echo "::error::tool/trace/*.toml contains entries without UUIDs. Run \`cargo evidence trace --backfill-uuids --trace-roots tool/trace\` locally and commit."
            printf '%s\n' "$out"
            exit 1
          fi
          printf '%s\n' "$out"

      - name: Self-compliance baseline gate (PR #47 / LLR-034)
        # Generates a bundle on the tool's own workspace and diffs
        # the produced compliance/*.json against
        # cert/baselines/self_compliance.json. Any (crate, objective)
        # pair that drifts fails with a targeted message. Upgrading a
        # status is a PR that edits the baseline with written
        # justification in the body.
        run: cargo test --release --test self_compliance_baseline -p cargo-evidence

      - name: Ratcheting floors gate (PR #48 / LLR-036)
        # Reads cert/floors.toml and asserts every current
        # measurement is ≥ its committed floor. A regression (dropped
        # code, deleted test, lowered trace entry count) fires here
        # with FLOORS_BELOW_MIN naming the dimension. Raising a floor
        # is a PR that edits the TOML; lowering it requires a
        # `Lower-Floor:` body line (enforced by the next step).
        run: ./target/release/cargo-evidence evidence floors

      - name: Floors-only-up lint (PR #48 / LLR-037)
        # Refuses silent lowering of any `cert/floors.toml` floor.
        # A numeric decrease must be accompanied by a
        # `Lower-Floor: <dimension> <reason>` line in the PR body
        # (or the direct-push commit message). Without it, fails
        # with FLOORS_LOWERED_WITHOUT_JUSTIFICATION.
        env:
          PR_BODY: ${{ github.event.pull_request.body }}
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            ./scripts/floors-lower-lint.sh "origin/${{ github.base_ref }}"
          else
            # Direct-to-main push: compare against HEAD^.
            if git rev-parse --verify HEAD^ >/dev/null 2>&1; then
              ./scripts/floors-lower-lint.sh "HEAD^"
            else
              echo "initial commit — no base to diff against; skipping."
            fi
          fi

  nix:
    # Exercises the cert-ship path: `nix build` of `packages.default`
    # via `makeRustPlatform`. Linux-only because the README is explicit
    # that final cert builds run on Linux under Nix; macOS Nix is a
    # dev-convenience path, and it's already exercised end-to-end by
    # `evidence-self-nix (macos-latest)` via the devShell — which is
    # what the 5-flavor `deterministic_hash` parity claim depends on.
    # Running a second macOS `nix build` added ~9 min to the critical
    # path for ~5% more coverage (breakage unique to `makeRustPlatform`
    # on macOS that doesn't also hit the devShell); not worth blocking
    # PRs on.
    name: Nix build (ubuntu-latest)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Nix
        # DeterminateSystems installer detects and reuses pre-existing
        # `_nixbld` state so it doesn't abort on `eDSRecordAlreadyExists`
        # the way cachix/install-nix-action does.
        uses: DeterminateSystems/nix-installer-action@v14

      - name: Nix flake check
        run: nix flake check

      - name: Nix build
        run: nix build

  evidence-self:
    # Dogfood the **native dev workflow**: run cargo-evidence against
    # this repo on a plain ubuntu-latest runner (not under Nix) and
    # assert same-host same-commit content_hash reproducibility across
    # two back-to-back runs.
    #
    # `needs: check` intentionally NOT set. This job does its own
    # `cargo build --release`, so a compile failure surfaces here too.
    # Running in parallel with `check` cuts critical-path latency.
    name: Evidence (self)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          # Full history so git_sha / git_branch are populated and the
          # shallow-clone guard in `cargo-evidence` is satisfied.
          fetch-depth: 0

      - name: Install Rust 1.95
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.95"

      - name: Cache cargo registry & build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Build release binary
        run: cargo build --release -p cargo-evidence

      # Output dirs live outside the tracked tree. If we wrote them
      # inside the repo, run A would leave an untracked `./out-a/`
      # directory that makes `git status --porcelain` non-empty for
      # run B — flipping `git_dirty` from false to true and
      # legitimately rotating env.json's hash. That's correct tool
      # behavior (an untracked dir IS dirty state), so the fix is the
      # CI setup, not the tool: the same advice applies to real users
      # who run `cargo-evidence generate --out-dir <somewhere>`.

      - name: Generate bundle (run A)
        run: |
          mkdir -p "$RUNNER_TEMP/out-a"
          ./target/release/cargo-evidence evidence generate \
            --skip-tests \
            --out-dir "$RUNNER_TEMP/out-a" \
            --profile dev

      - name: Locate bundle A
        id: bundle_a
        run: |
          path=$(ls -d "$RUNNER_TEMP"/out-a/dev-*/ | head -n1)
          path=${path%/}
          echo "path=$path" >> "$GITHUB_OUTPUT"
          echo "Bundle A: $path"

      - name: Verify bundle A
        run: ./target/release/cargo-evidence evidence verify "${{ steps.bundle_a.outputs.path }}"

      - name: Negative — no_out_of_scope_deps rejects a bad scope
        shell: bash
        run: |
          # The dogfood `cert/boundary.toml` lists both workspace
          # crates as in-scope, so run A above implicitly proves the
          # positive path. This step proves the enforcement *actually
          # fires* when the config is wrong — writes a temp boundary
          # that omits `evidence` from the in-scope list and asserts
          # generate refuses with the expected error. Uses
          # `--boundary` to avoid dirtying the tracked tree.
          cat > "$RUNNER_TEMP/bad-boundary.toml" <<'EOF'
          [schema]
          version = "0.0.1"
          [scope]
          in_scope = ["cargo-evidence"]
          [policy]
          no_out_of_scope_deps = true
          forbid_build_rs = false
          forbid_proc_macros = false
          [dal]
          default_dal = "D"
          EOF
          set +e
          out=$(./target/release/cargo-evidence evidence generate \
            --skip-tests \
            --out-dir "$RUNNER_TEMP/out-bad" \
            --profile dev \
            --boundary "$RUNNER_TEMP/bad-boundary.toml" 2>&1)
          code=$?
          set -e
          if [ "$code" -eq 0 ]; then
            echo "::error::boundary-policy enforcement did not fire on a bad in-scope list"
            echo "$out"
            exit 1
          fi
          if ! printf '%s' "$out" | grep -q "no_out_of_scope_deps"; then
            echo "::error::generate failed but not with the expected no_out_of_scope_deps message"
            echo "$out"
            exit 1
          fi
          echo "Boundary-policy enforcement rejected bad scope (exit=$code)."

      - name: Assert engine provenance captured honestly
        shell: bash
        run: |
          # `build.rs` resolves the engine SHA from (1) an explicit
          # EVIDENCE_ENGINE_GIT_SHA env var, (2) `git rev-parse HEAD`,
          # or (3) a `release-v<version>` fallback, and records which
          # branch fired in `engine_build_source`. In CI we always
          # build from a tracked checkout, so the source must be "git"
          # and the SHA must be 40-char hex. Anything else means build.rs
          # couldn't see `.git/` — an environment bug we need to hear
          # about before crates.io ships a bundle stamped "release-*"
          # for a git-backed run.
          sha=$(jq -r .engine_git_sha        "${{ steps.bundle_a.outputs.path }}/index.json")
          source=$(jq -r .engine_build_source "${{ steps.bundle_a.outputs.path }}/index.json")
          echo "engine_git_sha       = $sha"
          echo "engine_build_source  = $source"
          if [ "$source" != "git" ]; then
            echo "::error::engine_build_source is '$source'; expected 'git' in CI."
            exit 1
          fi
          if ! printf '%s' "$sha" | grep -qE '^[a-f0-9]{40}$'; then
            echo "::error::engine_git_sha is not a 40-char hex SHA: '$sha'"
            exit 1
          fi

      - name: Generate bundle (run B) and compare content_hash
        shell: bash
        run: |
          # Two generate runs on the same commit should produce the
          # same content_hash; index.json's timestamp field differs,
          # but content_hash is SHA-256 of SHA256SUMS which excludes
          # index.json by design. A mismatch here is a real
          # determinism leak on the generate path — the static
          # cross_platform_determinism test wouldn't catch it if the
          # leak lived in env capture, trace matrix generation, or
          # command recording.
          mkdir -p "$RUNNER_TEMP/out-b"
          ./target/release/cargo-evidence evidence generate \
            --skip-tests \
            --out-dir "$RUNNER_TEMP/out-b" \
            --profile dev

          path_b=$(ls -d "$RUNNER_TEMP"/out-b/dev-*/ | head -n1)
          path_b=${path_b%/}
          echo "Bundle B: $path_b"

          hash_a=$(jq -r .content_hash "${{ steps.bundle_a.outputs.path }}/index.json")
          hash_b=$(jq -r .content_hash "$path_b/index.json")

          echo "content_hash A: $hash_a"
          echo "content_hash B: $hash_b"

          if [ "$hash_a" != "$hash_b" ]; then
            echo "::error::content_hash drift between two back-to-back runs on the same commit."
            echo "::error::A = $hash_a"
            echo "::error::B = $hash_b"
            echo "::error::Inspect both bundles in the workflow artifacts to diff SHA256SUMS."
            exit 1
          fi

      - name: Stage bundles for artifact upload
        if: always()
        shell: bash
        run: |
          mkdir -p ./dogfood-artifact
          # cp -r tolerates a missing dir when a job fails before run B.
          cp -r "$RUNNER_TEMP/out-a" ./dogfood-artifact/ 2>/dev/null || true
          cp -r "$RUNNER_TEMP/out-b" ./dogfood-artifact/ 2>/dev/null || true

      - name: Upload bundle as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: evidence-self-bundle
          path: ./dogfood-artifact/
          if-no-files-found: warn
          retention-days: 14

  evidence-cross-host:
    # Generates a bundle on each OS from the same commit and
    # publishes its index.json + SHA256SUMS + deterministic-manifest
    # as a per-OS artifact. The determinism-compare job downloads all
    # and asserts `deterministic_hash` parity across native + Nix
    # flavors.
    #
    # `content_hash` still differs per host by design (env.json
    # records `host.os`, libc, tool availability — those are baked
    # into SHA256SUMS as part of the integrity chain, same as every
    # other recorded byte). What's gating is the committed
    # `deterministic-manifest.json`, a projection of env.json onto
    # toolchain + source identity, which MUST be byte-equal across
    # every flavor built from the same commit with the same
    # `rust-toolchain.toml`.
    #
    # `needs: check` intentionally NOT set — runs in parallel with
    # check; each matrix entry does its own release build.
    name: Cross-host determinism (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Rust 1.95
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.95"

      - name: Cache cargo registry & build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Build release binary
        run: cargo build --release -p cargo-evidence

      - name: Generate bundle
        shell: bash
        run: |
          mkdir -p "$RUNNER_TEMP/xhost-out"
          ./target/release/cargo-evidence evidence generate \
            --skip-tests \
            --out-dir "$RUNNER_TEMP/xhost-out" \
            --profile dev

      - name: Stage per-OS bundle metadata
        shell: bash
        run: |
          bundle=$(ls -d "$RUNNER_TEMP"/xhost-out/dev-*/ | head -n1)
          bundle=${bundle%/}
          mkdir -p ./xhost-stage
          cp "$bundle/index.json"                   ./xhost-stage/index.json
          cp "$bundle/SHA256SUMS"                   ./xhost-stage/SHA256SUMS
          cp "$bundle/env.json"                     ./xhost-stage/env.json
          cp "$bundle/deterministic-manifest.json"  ./xhost-stage/deterministic-manifest.json
          # runner.os ("Linux" / "macOS" / "Windows") is the flavor
          # label the determinism-compare job keys on.
          echo "${{ runner.os }}" > ./xhost-stage/runner-os.txt
          echo "---- on ${{ runner.os }} ----"
          echo "content_hash:       $(jq -r .content_hash        ./xhost-stage/index.json)"
          echo "deterministic_hash: $(jq -r .deterministic_hash  ./xhost-stage/index.json)"

      - name: Upload per-OS artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: xhost-${{ runner.os }}
          path: ./xhost-stage/
          if-no-files-found: error
          retention-days: 14

  evidence-self-nix:
    # Dogfood the **Nix cert-equivalent workflow**: build and run
    # cargo-evidence inside `nix develop -c`, using the rust-overlay-
    # pinned toolchain from `rust-toolchain.toml` rather than whatever
    # dtolnay/rust-toolchain fetches.
    #
    # Two purposes:
    #   1. Prove the tool actually runs under the canonical cert
    #      environment, with the same two-run same-host content_hash
    #      parity gate as `evidence-self`.
    #   2. Upload a per-flavor artifact so `determinism-compare` can
    #      assert that Nix-flavor bundles and native-flavor bundles
    #      produce the same `deterministic_hash` (same projection
    #      fields: rustc version string, cargo version, Cargo.lock
    #      hash, rust-toolchain.toml content, rustflags, git state).
    #
    # Why both Linux and macOS: user explicitly asked for parity
    # between the two Nix hosts. If rust-overlay ever ships a rustc
    # whose version string differs across platforms, this gate fires.
    #
    # Windows Nix requires WSL plumbing; skipped.
    name: Evidence (self, Nix, ${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Nix
        # See the `nix` job for why we're on DeterminateSystems, not
        # cachix/install-nix-action.
        uses: DeterminateSystems/nix-installer-action@v14

      - name: Cache cargo registry & build (Nix-segregated)
        uses: actions/cache@v4
        with:
          # Separate key namespace from the native jobs so a `target/`
          # tree compiled by a native rustc can't contaminate the
          # `nix develop` build (or vice versa).
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-nix-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-nix-cargo-

      - name: Build release binary inside `nix develop`
        shell: bash
        run: |
          # Defensive RUSTFLAGS / CARGO_TERM_COLOR pass-through. `nix
          # develop -c` inherits the caller env today, but relying on
          # that is fragile if nix ever changes behavior — any lost
          # RUSTFLAGS value silently changes env.json's rustflags
          # field and therefore the deterministic_hash. Keep it
          # explicit.
          nix develop -c env \
            RUSTFLAGS="$RUSTFLAGS" \
            CARGO_TERM_COLOR="$CARGO_TERM_COLOR" \
            cargo build --release -p cargo-evidence

      - name: Generate bundle (run A) under Nix
        shell: bash
        run: |
          # RUSTFLAGS is read at generate time (env.rs), not build
          # time, so pass it through on the generate invocation too.
          mkdir -p "$RUNNER_TEMP/out-a"
          nix develop -c env RUSTFLAGS="$RUSTFLAGS" \
            ./target/release/cargo-evidence evidence generate \
            --skip-tests \
            --out-dir "$RUNNER_TEMP/out-a" \
            --profile dev

      - name: Locate bundle A
        id: bundle_a
        shell: bash
        run: |
          path=$(ls -d "$RUNNER_TEMP"/out-a/dev-*/ | head -n1)
          path=${path%/}
          echo "path=$path" >> "$GITHUB_OUTPUT"
          echo "Bundle A: $path"

      - name: Verify bundle A
        shell: bash
        run: |
          nix develop -c \
            ./target/release/cargo-evidence evidence verify \
            "${{ steps.bundle_a.outputs.path }}"

      - name: Generate bundle (run B) and compare content_hash
        shell: bash
        run: |
          # Same-host same-commit determinism gate, identical in
          # spirit to `evidence-self`. Two runs under `nix develop`
          # must produce the same content_hash.
          mkdir -p "$RUNNER_TEMP/out-b"
          nix develop -c env RUSTFLAGS="$RUSTFLAGS" \
            ./target/release/cargo-evidence evidence generate \
            --skip-tests \
            --out-dir "$RUNNER_TEMP/out-b" \
            --profile dev

          path_b=$(ls -d "$RUNNER_TEMP"/out-b/dev-*/ | head -n1)
          path_b=${path_b%/}
          echo "Bundle B: $path_b"

          hash_a=$(jq -r .content_hash "${{ steps.bundle_a.outputs.path }}/index.json")
          hash_b=$(jq -r .content_hash "$path_b/index.json")

          echo "content_hash A: $hash_a"
          echo "content_hash B: $hash_b"

          if [ "$hash_a" != "$hash_b" ]; then
            echo "::error::Nix-${{ runner.os }}: content_hash drift between two runs."
            echo "::error::A = $hash_a"
            echo "::error::B = $hash_b"
            exit 1
          fi

      - name: Stage per-flavor bundle metadata
        if: always()
        shell: bash
        run: |
          bundle="${{ steps.bundle_a.outputs.path }}"
          if [ -z "$bundle" ] || [ ! -d "$bundle" ]; then
            echo "::warning::bundle A not located; skipping stage"
            exit 0
          fi
          mkdir -p ./xhost-stage
          cp "$bundle/index.json"                   ./xhost-stage/index.json
          cp "$bundle/SHA256SUMS"                   ./xhost-stage/SHA256SUMS
          cp "$bundle/env.json"                     ./xhost-stage/env.json
          cp "$bundle/deterministic-manifest.json"  ./xhost-stage/deterministic-manifest.json
          # `Nix-` prefix makes the determinism-compare table show
          # Nix-Linux / Nix-macOS distinct from plain Linux / macOS.
          echo "Nix-${{ runner.os }}" > ./xhost-stage/runner-os.txt
          echo "---- Nix-${{ runner.os }} ----"
          echo "content_hash:       $(jq -r .content_hash        ./xhost-stage/index.json)"
          echo "deterministic_hash: $(jq -r .deterministic_hash  ./xhost-stage/index.json)"

      - name: Upload per-flavor artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: xhost-nix-${{ runner.os }}
          path: ./xhost-stage/
          if-no-files-found: error
          retention-days: 14

  evidence-self-cert:
    # Dogfood the **strict cert path** end-to-end. The three other
    # dogfood jobs (evidence-self, evidence-cross-host, evidence-self-nix)
    # all pass `--profile dev`, so the cert-only logic has unit-test
    # coverage only:
    #   - clean-git enforcement (cli/generate/phases.rs: preflight)
    #   - strict env capture (env/capture.rs: StrictRustcRequired
    #     / StrictCargoRequired)
    #   - strict require_clean_git inside EvidenceBuilder
    #
    # This job wires them together on a real runner and asserts:
    #   1. `--profile cert` succeeds on a clean tree, produces a
    #      verifiable bundle, and env.json records profile="cert" /
    #      git_dirty=false / rustc+cargo != "unknown".
    #   2. `--profile cert` FAILS on a dirty tree with the expected
    #      "requires clean git tree" message. An untracked file is
    #      enough — `git status --porcelain` lists it and
    #      `is_dirty_or_unknown` returns true.
    #
    # Linux-only keeps the matrix lean: the profile-gated logic is
    # host-agnostic (already exercised on 3 OSes via --profile dev
    # in the cross-host job). The strict-missing-tool branch stays
    # unit-test-only — we can't unexercise rustc/cargo on PATH in CI
    # without tearing down the toolchain.
    #
    # Not wired into determinism-compare: `deterministic_hash` includes
    # `profile` in its projection, so cert and dev bundles hash
    # differently by design. That job gates dev-only parity across
    # native+Nix flavors.
    name: Evidence (self, cert profile)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Rust 1.95
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.95"

      - name: Cache cargo registry & build
        uses: actions/cache@v4
        with:
          # Segregated key from other jobs so this job's target tree
          # can't pick up artifacts built under a different profile.
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cert-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cert-cargo-

      - name: Build release binary
        run: cargo build --release -p cargo-evidence

      - name: Assert tree is clean (preflight)
        shell: bash
        run: |
          # Safety rail. If the checkout action or the cache restore
          # dropped any file inside the tracked tree, cert generate
          # would fail for the wrong reason and the job output would
          # mis-attribute the cause to the tool.
          if [ -n "$(git status --porcelain)" ]; then
            echo "::error::working tree dirty before cert generate"
            git status --porcelain
            exit 1
          fi

      - name: Generate bundle with --profile cert
        run: |
          mkdir -p "$RUNNER_TEMP/cert-out"
          ./target/release/cargo-evidence evidence generate \
            --skip-tests \
            --out-dir "$RUNNER_TEMP/cert-out" \
            --profile cert

      - name: Locate bundle
        id: bundle
        run: |
          path=$(ls -d "$RUNNER_TEMP"/cert-out/cert-*/ | head -n1)
          path=${path%/}
          echo "path=$path" >> "$GITHUB_OUTPUT"
          echo "Bundle: $path"

      - name: Verify bundle
        run: ./target/release/cargo-evidence evidence verify "${{ steps.bundle.outputs.path }}"

      - name: Assert env.json recorded cert-mode invariants
        shell: bash
        run: |
          profile=$(jq -r .profile    "${{ steps.bundle.outputs.path }}/env.json")
          dirty=$(jq -r   .git_dirty  "${{ steps.bundle.outputs.path }}/env.json")
          rustc=$(jq -r   .rustc      "${{ steps.bundle.outputs.path }}/env.json")
          cargo=$(jq -r   .cargo      "${{ steps.bundle.outputs.path }}/env.json")
          echo "profile=$profile  git_dirty=$dirty"
          echo "rustc=$rustc"
          echo "cargo=$cargo"
          if [ "$profile" != "cert" ]; then
            echo "::error::env.json.profile is '$profile'; expected 'cert'"
            exit 1
          fi
          if [ "$dirty" != "false" ]; then
            echo "::error::env.json.git_dirty is '$dirty'; expected 'false'"
            exit 1
          fi
          # Strict env capture (StrictRustcRequired/StrictCargoRequired)
          # would have bailed before env.json was written if either
          # probe failed. Belt-and-braces: assert anyway so a future
          # refactor that moved the strict gate past env.json emit
          # would fail here instead of silently shipping a bundle
          # that says "unknown".
          if [ "$rustc" = "unknown" ] || [ "$cargo" = "unknown" ]; then
            echo "::error::rustc/cargo recorded as 'unknown' under cert profile"
            exit 1
          fi

      - name: Negative — dirty tree must be rejected under cert
        shell: bash
        run: |
          # Introduce an untracked file; `git status --porcelain` lists
          # it with `??` status and is_dirty_or_unknown returns true.
          # cmd_generate's preflight phase (profile Cert|Record) then
          # emits the "requires clean git tree" error and exits 1.
          touch dirty-marker.txt
          set +e
          out=$(./target/release/cargo-evidence evidence generate \
            --skip-tests \
            --out-dir "$RUNNER_TEMP/cert-dirty-out" \
            --profile cert 2>&1)
          code=$?
          set -e
          rm -f dirty-marker.txt
          if [ "$code" -eq 0 ]; then
            echo "::error::cert generate succeeded on dirty tree; expected failure"
            echo "$out"
            exit 1
          fi
          if ! printf '%s' "$out" | grep -q "requires clean git tree"; then
            echo "::error::cert generate failed, but not with the expected 'requires clean git tree' message"
            echo "$out"
            exit 1
          fi
          echo "Cert dirty-tree rejection confirmed (exit=$code)."

      - name: Upload cert bundle on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: evidence-self-cert-bundle
          path: ${{ runner.temp }}/cert-out/
          if-no-files-found: warn
          retention-days: 14

  determinism-compare:
    # Downloads the FIVE expected artifacts — three native
    # (xhost-Linux / xhost-macOS / xhost-Windows) and two Nix
    # (xhost-nix-Linux / xhost-nix-macOS) — and asserts
    # `deterministic_hash` parity across every flavor (gating).
    #
    # Strict missing-artifact policy: if any of the five doesn't
    # show up (Nix install flaked, runner outage, …) this job fails
    # loud. A persistent upload bug must not silently reduce coverage.
    #
    # `content_hash` is expected to differ per flavor — env.json
    # records host identity and `in_nix_shell`, so 5 flavors must
    # produce 5 distinct content_hashes. Fewer means env.json lost a
    # host-varying field; annotate as a warning, don't fail.
    name: Determinism compare (5 flavors)
    needs: [evidence-cross-host, evidence-self-nix]
    if: always()
    runs-on: ubuntu-latest

    steps:
      - name: Download all per-flavor artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./xhost
          pattern: xhost-*

      - name: Assert deterministic_hash parity across all flavors
        shell: bash
        run: |
          set -u

          # The five expected flavor labels, keyed by what each job
          # writes into runner-os.txt.
          declare -a EXPECTED=(Linux macOS Windows Nix-Linux Nix-macOS)

          echo "## Determinism compare report" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| flavor | deterministic_hash | content_hash |" >> "$GITHUB_STEP_SUMMARY"
          echo "|---|---|---|" >> "$GITHUB_STEP_SUMMARY"

          declare -A seen_det
          declare -A seen_content
          declare -a flavors=()
          declare -a det_hashes=()
          declare -a content_hashes=()

          for dir in ./xhost/xhost-*/; do
            [ -d "$dir" ] || continue
            flavor=$(cat "$dir/runner-os.txt" | tr -d '[:space:]')
            det=$(jq -r .deterministic_hash "$dir/index.json")
            content=$(jq -r .content_hash "$dir/index.json")
            echo "$flavor: deterministic=$det content=$content"
            echo "| $flavor | \`$det\` | \`$content\` |" >> "$GITHUB_STEP_SUMMARY"
            seen_det[$flavor]="$det"
            seen_content[$flavor]="$content"
            flavors+=("$flavor")
            det_hashes+=("$det")
            content_hashes+=("$content")
          done

          echo "" >> "$GITHUB_STEP_SUMMARY"

          # Missing-flavor guard: EVERY expected flavor must have
          # uploaded. A flaky Nix install on one matrix entry is a
          # bug to investigate, not to paper over.
          missing=()
          for flavor in "${EXPECTED[@]}"; do
            if [ -z "${seen_det[$flavor]:-}" ]; then
              missing+=("$flavor")
            fi
          done
          if [ ${#missing[@]} -ne 0 ]; then
            echo "::error::missing flavor(s): ${missing[*]}"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "_❌ Expected 5 flavors; missing: ${missing[*]}_" >> "$GITHUB_STEP_SUMMARY"
            exit 1
          fi

          n=${#det_hashes[@]}
          distinct_det=$(printf '%s\n' "${det_hashes[@]}" | sort -u | wc -l | tr -d '[:space:]')
          distinct_content=$(printf '%s\n' "${content_hashes[@]}" | sort -u | wc -l | tr -d '[:space:]')

          echo "**deterministic_hash distinct values: $distinct_det / $n (must be 1)**" >> "$GITHUB_STEP_SUMMARY"
          echo "**content_hash distinct values:       $distinct_content / $n (expected $n, one per flavor)**" >> "$GITHUB_STEP_SUMMARY"

          fail=0
          if [ "$distinct_det" -ne 1 ]; then
            echo "::error::deterministic_hash drift — $distinct_det distinct values across $n flavors"
            # Name each drifted flavor in the log so the reviewer
            # doesn't need to dig through the summary table.
            for flavor in "${EXPECTED[@]}"; do
              echo "::error::flavor=$flavor deterministic_hash=${seen_det[$flavor]}"
            done
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "_❌ deterministic_hash MUST be identical across all flavors. Inspect each artifact's \`deterministic-manifest.json\`: toolchain / cargo_lock_hash / rust_toolchain_toml / rustflags / git state is drifting between flavors._" >> "$GITHUB_STEP_SUMMARY"
            fail=1
          else
            echo "::notice::deterministic_hash parity: PASS ($n/$n flavors agree)"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "_✅ deterministic_hash matches across all $n flavors._" >> "$GITHUB_STEP_SUMMARY"
          fi

          if [ "$distinct_content" -ne "$n" ]; then
            # Two flavors produced the same content_hash. By design
            # env.json records `host.os`, libc, tools, in_nix_shell —
            # so two different flavors sharing a content_hash means
            # either (a) env.json lost a host-varying field, or (b)
            # the two flavors are setup-identical in a way we should
            # record. Annotate only; don't fail.
            echo "::warning::content_hash collision: $distinct_content distinct values across $n flavors (expected $n)"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "_⚠ Expected $n distinct content_hash values (one per flavor); got $distinct_content. Check env.json's host-varying fields (host.*, tools, in_nix_shell)._" >> "$GITHUB_STEP_SUMMARY"
          fi

          exit $fail

  cross-time-determinism:
    # Guards against silent drift of a bundle's `deterministic_hash`
    # across time — dependency lock bumps, toolchain swaps,
    # RUSTFLAGS changes. Cross-host determinism (landed) pins parity
    # across N hosts at one point in time; this job pins parity
    # across time on one host.
    #
    # Flow: download the last successful main-branch
    # `evidence-cross-host` Linux artifact, extract its
    # `deterministic_hash`, build the current PR's bundle, compare.
    # If equal, pass silently. If different + the PR body (or head
    # commit message) carries `Override-Deterministic-Baseline:
    # <reason>`, pass with a logged notice. If different without
    # override, fail with both hashes + the expected override
    # syntax.
    #
    # Degradation: if no prior artifact exists (fresh repo, first
    # workflow run, or the 14-day retention expired before this
    # PR opened), skip with a warning. Blocking a PR because CI
    # history is thin would be user-hostile.
    #
    # Linux-only — `deterministic_hash` is cross-host-stable by
    # design, so one OS is enough to catch drift. Running on three
    # would burn runner minutes for no additional signal.
    name: Cross-time determinism (ubuntu-latest)
    runs-on: ubuntu-latest
    # No `needs:` — runs in parallel with check.

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Rust 1.95
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.95"

      - name: Cache cargo registry & build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Build release binary
        run: cargo build --release -p cargo-evidence

      - name: Generate current bundle
        shell: bash
        run: |
          mkdir -p "$RUNNER_TEMP/current-out"
          ./target/release/cargo-evidence evidence generate \
            --skip-tests \
            --out-dir "$RUNNER_TEMP/current-out" \
            --profile dev
          current_bundle=$(ls -d "$RUNNER_TEMP"/current-out/dev-*/ | head -n1)
          current_bundle=${current_bundle%/}
          cp "$current_bundle/deterministic-manifest.json" "$RUNNER_TEMP/current-manifest.json"
          echo "current toolchain projection:"
          jq '{rustc, cargo, llvm_version, cargo_lock_hash, rustflags}' "$RUNNER_TEMP/current-manifest.json"

      - name: Fetch last successful main-branch artifact
        id: fetch-prior
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          mkdir -p "$RUNNER_TEMP/prior-main"

          # Find the last successful run of this workflow on main.
          # If no such run exists, degrade gracefully.
          last_run=$(gh run list \
              --branch main \
              --workflow ci.yml \
              --status success \
              --limit 1 \
              --json databaseId \
              --jq '.[0].databaseId // empty')
          if [ -z "$last_run" ]; then
            echo "::warning::No successful main-branch CI run found; skipping cross-time compare."
            echo "prior_missing=1" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Download the xhost-Linux artifact from that run. If
          # retention expired (14 days), the download errors out
          # and we degrade to skip.
          if ! gh run download "$last_run" \
               --name xhost-Linux \
               --dir "$RUNNER_TEMP/prior-main" 2>/dev/null; then
            echo "::warning::Prior main-branch artifact xhost-Linux from run $last_run is unavailable (expired?); skipping compare."
            echo "prior_missing=1" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [ ! -f "$RUNNER_TEMP/prior-main/deterministic-manifest.json" ]; then
            echo "::warning::Prior artifact downloaded but deterministic-manifest.json is missing; skipping."
            echo "prior_missing=1" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "prior_missing=0" >> "$GITHUB_OUTPUT"
          echo "prior toolchain projection:"
          jq '{rustc, cargo, llvm_version, cargo_lock_hash, rustflags}' "$RUNNER_TEMP/prior-main/deterministic-manifest.json"

      - name: Lint drift against override
        if: steps.fetch-prior.outputs.prior_missing == '0'
        shell: bash
        env:
          # On pull_request events, `github.event.pull_request.body`
          # carries the body; on push events, `github.event.head_commit.message`
          # carries the head commit message. We plumb both so the
          # script's dual check works in either mode.
          PR_BODY: ${{ github.event.pull_request.body }}
          COMMIT_MESSAGE: ${{ github.event.head_commit.message }}
        run: |
          ./scripts/deterministic-baseline-override-lint.sh \
            "$RUNNER_TEMP/prior-main/deterministic-manifest.json" \
            "$RUNNER_TEMP/current-manifest.json"

      - name: Summary
        if: always()
        shell: bash
        run: |
          if [ "${{ steps.fetch-prior.outputs.prior_missing }}" = "1" ]; then
            echo "_Cross-time determinism: skipped — no prior main-branch artifact available._" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "_Cross-time determinism: prior main-branch deterministic_hash matched current build._" >> "$GITHUB_STEP_SUMMARY"
          fi
