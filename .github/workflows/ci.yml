name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  check:
    name: Check (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Rust 1.95
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.95"
          components: rustfmt, clippy

      - name: Cache cargo registry & build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Format check
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Forbid schema-version literals outside schema_versions
        if: runner.os == 'Linux'
        shell: bash
        run: |
          # Mirrors the `schema_versions_locked` integration test. A
          # grep-level gate catches non-Rust-source additions
          # (e.g. markdown docs, example TOMLs) that the Rust test
          # doesn't walk.
          hits=$(grep -rnE '"0\.0\.[0-9]+"' crates/ \
            --include='*.rs' --include='*.toml' --include='*.json' --include='*.md' \
            --exclude-dir='target' \
            --exclude-dir='fixtures' \
            --exclude='schema_versions.rs' \
            --exclude='schema_versions_locked.rs' || true)
          if [ -n "$hits" ]; then
            echo "::error::schema-version literal found outside evidence::schema_versions:"
            echo "$hits"
            exit 1
          fi

      - name: Forbid new `#[allow(dead_code)]`
        if: runner.os == 'Linux'
        shell: bash
        run: |
          # PR diff mode: look only at lines the PR adds. Push mode: scan
          # the whole tree so a direct-to-main push still fails fast.
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            base="origin/${{ github.base_ref }}"
            git fetch --no-tags --depth=1 origin "${{ github.base_ref }}"
            diff=$(git diff "$base"...HEAD -- '*.rs')
            added=$(printf '%s\n' "$diff" | grep -E '^\+[^+]' || true)
            if printf '%s\n' "$added" | grep -qE '#\[allow\(dead_code\)\]'; then
              echo "::error::This PR adds #[allow(dead_code)] — either use the field or delete it."
              printf '%s\n' "$added" | grep -nE '#\[allow\(dead_code\)\]' || true
              exit 1
            fi
          else
            if grep -rnE '#\[allow\(dead_code\)\]' crates/; then
              echo "::error::tree contains #[allow(dead_code)] — either use the field or delete it."
              exit 1
            fi
          fi

      - name: Test
        run: cargo test --workspace

      - name: Build (release)
        run: cargo build --workspace --release

  nix:
    name: Nix build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Nix
        uses: cachix/install-nix-action@v27
        with:
          nix_path: nixpkgs=channel:nixos-unstable

      - name: Nix flake check
        run: nix flake check

      - name: Nix build
        run: nix build

  evidence-self:
    # Dogfood: run cargo-evidence against this repo and publish the
    # bundle as a CI artifact. Fails early on the kind of regression
    # that a unit test can't see — e.g. `engine_git_sha` falling back
    # to "unknown" because build.rs can't find git, or content_hash
    # drifting between two back-to-back runs on the same commit.
    name: Evidence (self)
    runs-on: ubuntu-latest
    needs: check

    steps:
      - uses: actions/checkout@v4
        with:
          # Full history so git_sha / git_branch are populated and the
          # shallow-clone guard in `cargo-evidence` is satisfied.
          fetch-depth: 0

      - name: Install Rust 1.95
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.95"

      - name: Cache cargo registry & build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Build release binary
        run: cargo build --release -p cargo-evidence

      # Output dirs live outside the tracked tree. If we wrote them
      # inside the repo, run A would leave an untracked `./out-a/`
      # directory that makes `git status --porcelain` non-empty for
      # run B — flipping `git_dirty` from false to true and
      # legitimately rotating env.json's hash. That's correct tool
      # behavior (an untracked dir IS dirty state), so the fix is the
      # CI setup, not the tool: the same advice applies to real users
      # who run `cargo-evidence generate --out-dir <somewhere>`.

      - name: Generate bundle (run A)
        run: |
          mkdir -p "$RUNNER_TEMP/out-a"
          ./target/release/cargo-evidence evidence generate \
            --skip-tests \
            --out-dir "$RUNNER_TEMP/out-a" \
            --profile dev

      - name: Locate bundle A
        id: bundle_a
        run: |
          path=$(ls -d "$RUNNER_TEMP"/out-a/dev-*/ | head -n1)
          path=${path%/}
          echo "path=$path" >> "$GITHUB_OUTPUT"
          echo "Bundle A: $path"

      - name: Verify bundle A
        run: ./target/release/cargo-evidence evidence verify "${{ steps.bundle_a.outputs.path }}"

      - name: Assert engine_git_sha is populated
        shell: bash
        run: |
          # build.rs embeds the git SHA via `cargo:rustc-env`. If git
          # isn't reachable from the build sandbox, it falls back to
          # "unknown" — which means evidence bundles can no longer be
          # correlated back to the engine source that produced them.
          # Fail loud if that's happening in CI.
          sha=$(jq -r .engine_git_sha "${{ steps.bundle_a.outputs.path }}/index.json")
          echo "engine_git_sha = $sha"
          if [ "$sha" = "unknown" ] || [ -z "$sha" ]; then
            echo "::error::engine_git_sha is '$sha' — build.rs did not capture a git SHA."
            exit 1
          fi
          # Must be 40 hex chars.
          if ! printf '%s' "$sha" | grep -qE '^[a-f0-9]{40}$'; then
            echo "::error::engine_git_sha is not a 40-char hex SHA: '$sha'"
            exit 1
          fi

      - name: Generate bundle (run B) and compare content_hash
        shell: bash
        run: |
          # Two generate runs on the same commit should produce the
          # same content_hash; index.json's timestamp field differs,
          # but content_hash is SHA-256 of SHA256SUMS which excludes
          # index.json by design. A mismatch here is a real
          # determinism leak on the generate path — the static
          # cross_platform_determinism test wouldn't catch it if the
          # leak lived in env capture, trace matrix generation, or
          # command recording.
          mkdir -p "$RUNNER_TEMP/out-b"
          ./target/release/cargo-evidence evidence generate \
            --skip-tests \
            --out-dir "$RUNNER_TEMP/out-b" \
            --profile dev

          path_b=$(ls -d "$RUNNER_TEMP"/out-b/dev-*/ | head -n1)
          path_b=${path_b%/}
          echo "Bundle B: $path_b"

          hash_a=$(jq -r .content_hash "${{ steps.bundle_a.outputs.path }}/index.json")
          hash_b=$(jq -r .content_hash "$path_b/index.json")

          echo "content_hash A: $hash_a"
          echo "content_hash B: $hash_b"

          if [ "$hash_a" != "$hash_b" ]; then
            echo "::error::content_hash drift between two back-to-back runs on the same commit."
            echo "::error::A = $hash_a"
            echo "::error::B = $hash_b"
            echo "::error::Inspect both bundles in the workflow artifacts to diff SHA256SUMS."
            exit 1
          fi

      - name: Stage bundles for artifact upload
        if: always()
        shell: bash
        run: |
          mkdir -p ./dogfood-artifact
          # cp -r tolerates a missing dir when a job fails before run B.
          cp -r "$RUNNER_TEMP/out-a" ./dogfood-artifact/ 2>/dev/null || true
          cp -r "$RUNNER_TEMP/out-b" ./dogfood-artifact/ 2>/dev/null || true

      - name: Upload bundle as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: evidence-self-bundle
          path: ./dogfood-artifact/
          if-no-files-found: warn
          retention-days: 14

  evidence-cross-host:
    # Generates a bundle on each OS from the same commit and
    # publishes its index.json + SHA256SUMS + deterministic-manifest
    # as a per-OS artifact. The aggregator job below downloads all
    # three and asserts `deterministic_hash` parity.
    #
    # `content_hash` still differs per host by design (env.json
    # records `host.os`, libc, tool availability — those are baked
    # into SHA256SUMS as part of the integrity chain, same as every
    # other recorded byte). What's gating now is the committed
    # `deterministic-manifest.json`, a projection of env.json onto
    # toolchain + target + source identity, which MUST be byte-equal
    # across all three hosts built from the same commit with the
    # same `rust-toolchain.toml`.
    name: Cross-host determinism (${{ matrix.os }})
    needs: check
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Rust 1.95
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.95"

      - name: Cache cargo registry & build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Build release binary
        run: cargo build --release -p cargo-evidence

      - name: Generate bundle
        shell: bash
        run: |
          mkdir -p "$RUNNER_TEMP/xhost-out"
          ./target/release/cargo-evidence evidence generate \
            --skip-tests \
            --out-dir "$RUNNER_TEMP/xhost-out" \
            --profile dev

      - name: Stage per-OS bundle metadata
        shell: bash
        run: |
          bundle=$(ls -d "$RUNNER_TEMP"/xhost-out/dev-*/ | head -n1)
          bundle=${bundle%/}
          mkdir -p ./xhost-stage
          cp "$bundle/index.json"                   ./xhost-stage/index.json
          cp "$bundle/SHA256SUMS"                   ./xhost-stage/SHA256SUMS
          cp "$bundle/env.json"                     ./xhost-stage/env.json
          cp "$bundle/deterministic-manifest.json"  ./xhost-stage/deterministic-manifest.json
          # The runner.os value ("Linux" / "macOS" / "Windows") is
          # the stable identifier the aggregator keys on.
          echo "${{ runner.os }}" > ./xhost-stage/runner-os.txt
          echo "---- on ${{ runner.os }} ----"
          echo "content_hash:       $(jq -r .content_hash        ./xhost-stage/index.json)"
          echo "deterministic_hash: $(jq -r .deterministic_hash  ./xhost-stage/index.json)"

      - name: Upload per-OS artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: xhost-${{ runner.os }}
          path: ./xhost-stage/
          if-no-files-found: error
          retention-days: 14

  evidence-cross-host-compare:
    # Downloads the three per-OS artifacts and asserts
    # `deterministic_hash` parity (gating). `content_hash` still
    # differs by host by design — env.json records host identity
    # and is in SHA256SUMS, so its hash differs; the committed
    # manifest is the channel for cross-host reproducibility.
    #
    # The summary table surfaces both hashes per host so reviewers
    # can confirm (i) deterministic_hash is the same value everywhere
    # and (ii) content_hash varies in a predictable way (i.e. no two
    # hosts produce the same content_hash — that would hint at an
    # env.json field that's accidentally host-invariant).
    #
    # `if: always()` runs even if a matrix job failed to upload,
    # because a single missing host is still useful to call out.
    name: Cross-host determinism (compare)
    needs: evidence-cross-host
    if: always()
    runs-on: ubuntu-latest

    steps:
      - name: Download all per-OS artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./xhost
          pattern: xhost-*

      - name: Assert deterministic_hash parity
        shell: bash
        run: |
          set -u
          echo "## Cross-host determinism report" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| host | deterministic_hash | content_hash |" >> "$GITHUB_STEP_SUMMARY"
          echo "|---|---|---|" >> "$GITHUB_STEP_SUMMARY"

          declare -a det_hashes=()
          declare -a content_hashes=()
          declare -a hosts=()
          for dir in ./xhost/xhost-*/; do
            host=$(cat "$dir/runner-os.txt" | tr -d '[:space:]')
            det=$(jq -r .deterministic_hash "$dir/index.json")
            content=$(jq -r .content_hash "$dir/index.json")
            echo "$host: deterministic=$det content=$content"
            echo "| $host | \`$det\` | \`$content\` |" >> "$GITHUB_STEP_SUMMARY"
            det_hashes+=("$det")
            content_hashes+=("$content")
            hosts+=("$host")
          done

          echo "" >> "$GITHUB_STEP_SUMMARY"

          n=${#det_hashes[@]}
          if [ "$n" -lt 2 ]; then
            echo "::error::only $n host(s) reported — cannot assert parity"
            echo "_Only $n host(s) reported; cannot assert parity._" >> "$GITHUB_STEP_SUMMARY"
            exit 1
          fi

          distinct_det=$(printf '%s\n' "${det_hashes[@]}" | sort -u | wc -l | tr -d '[:space:]')
          distinct_content=$(printf '%s\n' "${content_hashes[@]}" | sort -u | wc -l | tr -d '[:space:]')

          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "**deterministic_hash distinct values: $distinct_det / $n (must be 1)**" >> "$GITHUB_STEP_SUMMARY"
          echo "**content_hash distinct values:       $distinct_content / $n (expected $n, one per host)**" >> "$GITHUB_STEP_SUMMARY"

          fail=0
          if [ "$distinct_det" -ne 1 ]; then
            echo "::error::deterministic_hash drift — $distinct_det distinct values across $n hosts"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "_❌ deterministic_hash MUST be identical across all hosts. Inspect each bundle's \`deterministic-manifest.json\`: toolchain, target triple, rustc/cargo versions, or source state is drifting between runners._" >> "$GITHUB_STEP_SUMMARY"
            fail=1
          else
            echo "::notice::deterministic_hash parity: PASS ($n/$n hosts agree)"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "_✅ deterministic_hash matches across all $n hosts._" >> "$GITHUB_STEP_SUMMARY"
          fi

          if [ "$distinct_content" -ne "$n" ]; then
            # Two hosts produced the same content_hash. By design env.json
            # records `host.os`, libc, tools — so two different hosts
            # sharing a content_hash means either (a) env.json lost a
            # host-varying field, or (b) the host setup is identical in a
            # way we should record. Annotate only; don't fail.
            echo "::warning::content_hash collision: $distinct_content distinct values across $n hosts (expected $n)"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "_⚠ Expected $n distinct content_hash values (one per host); got $distinct_content. Check env.json's host-varying fields._" >> "$GITHUB_STEP_SUMMARY"
          fi

          exit $fail
