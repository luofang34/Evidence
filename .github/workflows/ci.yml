name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  check:
    name: Check (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Rust 1.85
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.85"
          components: rustfmt, clippy

      - name: Cache cargo registry & build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Format check
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Forbid new `#[allow(dead_code)]`
        if: runner.os == 'Linux'
        shell: bash
        run: |
          # PR diff mode: look only at lines the PR adds. Push mode: scan
          # the whole tree so a direct-to-main push still fails fast.
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            base="origin/${{ github.base_ref }}"
            git fetch --no-tags --depth=1 origin "${{ github.base_ref }}"
            diff=$(git diff "$base"...HEAD -- '*.rs')
            added=$(printf '%s\n' "$diff" | grep -E '^\+[^+]' || true)
            if printf '%s\n' "$added" | grep -qE '#\[allow\(dead_code\)\]'; then
              echo "::error::This PR adds #[allow(dead_code)] — either use the field or delete it."
              printf '%s\n' "$added" | grep -nE '#\[allow\(dead_code\)\]' || true
              exit 1
            fi
          else
            if grep -rnE '#\[allow\(dead_code\)\]' crates/; then
              echo "::error::tree contains #[allow(dead_code)] — either use the field or delete it."
              exit 1
            fi
          fi

      - name: Test
        run: cargo test --workspace

      - name: Build (release)
        run: cargo build --workspace --release

  nix:
    name: Nix build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Nix
        uses: cachix/install-nix-action@v27
        with:
          nix_path: nixpkgs=channel:nixos-unstable

      - name: Nix flake check
        run: nix flake check

      - name: Nix build
        run: nix build

  evidence-self:
    # Dogfood: run cargo-evidence against this repo and publish the
    # bundle as a CI artifact. Fails early on the kind of regression
    # that a unit test can't see — e.g. `engine_git_sha` falling back
    # to "unknown" because build.rs can't find git, or content_hash
    # drifting between two back-to-back runs on the same commit.
    name: Evidence (self)
    runs-on: ubuntu-latest
    needs: check

    steps:
      - uses: actions/checkout@v4
        with:
          # Full history so git_sha / git_branch are populated and the
          # shallow-clone guard in `cargo-evidence` is satisfied.
          fetch-depth: 0

      - name: Install Rust 1.85
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.85"

      - name: Cache cargo registry & build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Build release binary
        run: cargo build --release -p cargo-evidence

      # Output dirs live outside the tracked tree. If we wrote them
      # inside the repo, run A would leave an untracked `./out-a/`
      # directory that makes `git status --porcelain` non-empty for
      # run B — flipping `git_dirty` from false to true and
      # legitimately rotating env.json's hash. That's correct tool
      # behavior (an untracked dir IS dirty state), so the fix is the
      # CI setup, not the tool: the same advice applies to real users
      # who run `cargo-evidence generate --out-dir <somewhere>`.

      - name: Generate bundle (run A)
        run: |
          mkdir -p "$RUNNER_TEMP/out-a"
          ./target/release/cargo-evidence evidence generate \
            --skip-tests \
            --out-dir "$RUNNER_TEMP/out-a" \
            --profile dev

      - name: Locate bundle A
        id: bundle_a
        run: |
          path=$(ls -d "$RUNNER_TEMP"/out-a/dev-*/ | head -n1)
          path=${path%/}
          echo "path=$path" >> "$GITHUB_OUTPUT"
          echo "Bundle A: $path"

      - name: Verify bundle A
        run: ./target/release/cargo-evidence evidence verify "${{ steps.bundle_a.outputs.path }}"

      - name: Assert engine_git_sha is populated
        shell: bash
        run: |
          # build.rs embeds the git SHA via `cargo:rustc-env`. If git
          # isn't reachable from the build sandbox, it falls back to
          # "unknown" — which means evidence bundles can no longer be
          # correlated back to the engine source that produced them.
          # Fail loud if that's happening in CI.
          sha=$(jq -r .engine_git_sha "${{ steps.bundle_a.outputs.path }}/index.json")
          echo "engine_git_sha = $sha"
          if [ "$sha" = "unknown" ] || [ -z "$sha" ]; then
            echo "::error::engine_git_sha is '$sha' — build.rs did not capture a git SHA."
            exit 1
          fi
          # Must be 40 hex chars.
          if ! printf '%s' "$sha" | grep -qE '^[a-f0-9]{40}$'; then
            echo "::error::engine_git_sha is not a 40-char hex SHA: '$sha'"
            exit 1
          fi

      - name: Generate bundle (run B) and compare content_hash
        shell: bash
        run: |
          # Two generate runs on the same commit should produce the
          # same content_hash; index.json's timestamp field differs,
          # but content_hash is SHA-256 of SHA256SUMS which excludes
          # index.json by design. A mismatch here is a real
          # determinism leak on the generate path — the static
          # cross_platform_determinism test wouldn't catch it if the
          # leak lived in env capture, trace matrix generation, or
          # command recording.
          mkdir -p "$RUNNER_TEMP/out-b"
          ./target/release/cargo-evidence evidence generate \
            --skip-tests \
            --out-dir "$RUNNER_TEMP/out-b" \
            --profile dev

          path_b=$(ls -d "$RUNNER_TEMP"/out-b/dev-*/ | head -n1)
          path_b=${path_b%/}
          echo "Bundle B: $path_b"

          hash_a=$(jq -r .content_hash "${{ steps.bundle_a.outputs.path }}/index.json")
          hash_b=$(jq -r .content_hash "$path_b/index.json")

          echo "content_hash A: $hash_a"
          echo "content_hash B: $hash_b"

          if [ "$hash_a" != "$hash_b" ]; then
            echo "::error::content_hash drift between two back-to-back runs on the same commit."
            echo "::error::A = $hash_a"
            echo "::error::B = $hash_b"
            echo "::error::Inspect both bundles in the workflow artifacts to diff SHA256SUMS."
            exit 1
          fi

      - name: Stage bundles for artifact upload
        if: always()
        shell: bash
        run: |
          mkdir -p ./dogfood-artifact
          # cp -r tolerates a missing dir when a job fails before run B.
          cp -r "$RUNNER_TEMP/out-a" ./dogfood-artifact/ 2>/dev/null || true
          cp -r "$RUNNER_TEMP/out-b" ./dogfood-artifact/ 2>/dev/null || true

      - name: Upload bundle as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: evidence-self-bundle
          path: ./dogfood-artifact/
          if-no-files-found: warn
          retention-days: 14

  evidence-cross-host:
    # Diagnostic (NOT gating). Generates a bundle on each OS from the
    # same commit and publishes its index.json + SHA256SUMS as a
    # per-OS artifact. The aggregator job below downloads all three
    # and diffs content_hash.
    #
    # Expected outcome today: the three content_hash values diverge
    # because env.json's `host` field (a tagged enum with per-OS
    # shape) legitimately differs across Linux / macOS / Windows.
    # Purpose in this PR is to *quantify* that drift; a follow-up
    # will decide whether to normalize env.json's host-dependent
    # fields or to split evidence bundles into a host-agnostic
    # reproducibility layer and a host-specific evidence layer.
    #
    # `continue-on-error: true` at the job level keeps the workflow
    # green even when these jobs fail the internal hash comparison.
    name: Cross-host determinism (diagnostic, ${{ matrix.os }})
    continue-on-error: true
    needs: check
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Rust 1.85
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.85"

      - name: Cache cargo registry & build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Build release binary
        run: cargo build --release -p cargo-evidence

      - name: Generate bundle
        shell: bash
        run: |
          mkdir -p "$RUNNER_TEMP/xhost-out"
          ./target/release/cargo-evidence evidence generate \
            --skip-tests \
            --out-dir "$RUNNER_TEMP/xhost-out" \
            --profile dev

      - name: Stage per-OS diagnostic files
        shell: bash
        run: |
          bundle=$(ls -d "$RUNNER_TEMP"/xhost-out/dev-*/ | head -n1)
          bundle=${bundle%/}
          mkdir -p ./xhost-stage
          cp "$bundle/index.json"   ./xhost-stage/index.json
          cp "$bundle/SHA256SUMS"   ./xhost-stage/SHA256SUMS
          cp "$bundle/env.json"     ./xhost-stage/env.json
          # The runner.os value ("Linux" / "macOS" / "Windows") is
          # the stable identifier we'll key on in the aggregator.
          echo "${{ runner.os }}" > ./xhost-stage/runner-os.txt
          echo "---- content_hash on ${{ runner.os }} ----"
          jq -r .content_hash ./xhost-stage/index.json

      - name: Upload per-OS artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: xhost-${{ runner.os }}
          path: ./xhost-stage/
          if-no-files-found: error
          retention-days: 14

  evidence-cross-host-compare:
    # Downloads all three per-OS artifacts and diffs their
    # content_hash. Exits non-zero if any two differ; the
    # continue-on-error flag keeps the workflow green regardless,
    # because this PR ships the test as a diagnostic, not a gate.
    #
    # `if: always()` runs even if one of the matrix jobs failed to
    # upload — the comparison is still useful with 2/3 inputs, and a
    # missing artifact surfaces as a clear "no artifact" error in
    # the step log rather than a silent skip.
    name: Cross-host determinism (compare)
    continue-on-error: true
    needs: evidence-cross-host
    if: always()
    runs-on: ubuntu-latest

    steps:
      - name: Download all per-OS artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./xhost
          pattern: xhost-*

      - name: Diff content_hash across hosts
        shell: bash
        run: |
          set -u
          echo "## Cross-host determinism report" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| host | content_hash |" >> "$GITHUB_STEP_SUMMARY"
          echo "|---|---|" >> "$GITHUB_STEP_SUMMARY"

          declare -a hashes=()
          declare -a hosts=()
          for dir in ./xhost/xhost-*/; do
            host=$(cat "$dir/runner-os.txt" | tr -d '[:space:]')
            hash=$(jq -r .content_hash "$dir/index.json")
            echo "$host: $hash"
            echo "| $host | \`$hash\` |" >> "$GITHUB_STEP_SUMMARY"
            hashes+=("$hash")
            hosts+=("$host")
          done

          echo "" >> "$GITHUB_STEP_SUMMARY"

          n=${#hashes[@]}
          if [ "$n" -lt 2 ]; then
            echo "::warning::only $n host(s) reported — cannot compare"
            echo "_Only $n host(s) reported; nothing to compare._" >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

          # Count distinct hashes — a quick way to describe the drift
          # shape ("1 distinct" = all agree; "2 distinct" = 2 vs 1
          # split; "3 distinct" = full drift).
          distinct=$(printf '%s\n' "${hashes[@]}" | sort -u | wc -l | tr -d '[:space:]')
          echo "distinct content_hash values: $distinct / $n"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "**Distinct content_hash values: $distinct / $n**" >> "$GITHUB_STEP_SUMMARY"

          if [ "$distinct" -eq 1 ]; then
            echo "::notice::cross-host determinism: PASS ($n/$n hosts agree)"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "_All $n hosts produced identical content_hash. ✅_" >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

          echo "::warning::cross-host determinism: DRIFT — $distinct distinct content_hash values across $n hosts"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "_$distinct distinct content_hash values across $n hosts. Drift is expected today because \`env.json.host\` (tagged enum) legitimately differs per OS; follow-up work will decide how to bracket host-dependent evidence._" >> "$GITHUB_STEP_SUMMARY"
          # Non-zero exit annotates the job red in the UI; the
          # job-level continue-on-error keeps the workflow overall
          # green. Diagnostic only.
          exit 1
