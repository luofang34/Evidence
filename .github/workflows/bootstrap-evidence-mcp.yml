name: Bootstrap evidence-mcp (one-time, token-based publish)

# ONE-TIME workflow — DELETE THIS FILE after first successful run.
#
# Why this exists
# ---------------
# crates.io Trusted Publishing requires the crate to already exist on
# the registry before a TP entry can be attached to it. For the
# first-ever publish of a new name there is no chicken-and-egg path
# out — the first upload has to authenticate with a regular API
# token.
#
# evidence-core and cargo-evidence reached crates.io before TP was
# available via the same kind of one-time token flow; evidence-mcp
# is catching up.
#
# One-time procedure (do these in order)
# --------------------------------------
# 1. On crates.io, create a **scoped** API token:
#    - crates.io/settings/tokens → "New token"
#    - Name: `evidence-mcp bootstrap (one-time)`
#    - Scopes: `publish-new`  (this lets the token publish *any* new
#      crate but not modify existing ones; revoke after single use)
#    - Expiry: 1 day (narrow window — one-shot job only needs ~1 hour)
#
# 2. On GitHub, add the token as a repository secret:
#    - Settings → Secrets and variables → Actions → "New repository
#      secret"
#    - Name: `CRATES_IO_TOKEN_EVIDENCE_MCP_BOOTSTRAP`
#    - Value: <paste token from step 1>
#
# 3. Trigger this workflow:
#    - Actions tab → "Bootstrap evidence-mcp" → Run workflow
#    - Confirmation input: type `publish-evidence-mcp-0.1.0` exactly
#    - The job runs under the `production-release` GitHub Environment
#      which requires reviewer approval (same as the regular publish
#      workflow) — the token is only released into the job after
#      that approval.
#
# 4. After successful publish, on crates.io/crates/evidence-mcp:
#    - Settings → "Trusted Publishers" → Add
#    - Values (must match `.github/workflows/publish.yml` exactly):
#        Repository owner:   luofang34
#        Repository name:    Evidence
#        Workflow filename:  publish.yml
#        Environment:        production-release
#
# 5. Clean up (all four items, same PR):
#    - Revoke the bootstrap token: crates.io/settings/tokens → Revoke
#    - Delete the GitHub secret: Settings → Secrets → delete
#      `CRATES_IO_TOKEN_EVIDENCE_MCP_BOOTSTRAP`
#    - Delete this file: `.github/workflows/bootstrap-evidence-mcp.yml`
#    - Commit the deletion; the normal `publish.yml` handles all
#      future releases via Trusted Publishing.

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type "publish-evidence-mcp-0.1.0" to confirm one-time publish'
        required: true
        type: string

concurrency:
  group: bootstrap-evidence-mcp
  cancel-in-progress: false

jobs:
  bootstrap:
    name: Bootstrap evidence-mcp 0.1.0 (token-based)
    runs-on: ubuntu-latest
    environment: production-release
    permissions:
      contents: read
    steps:
      - name: Confirm input matches sentinel
        shell: bash
        run: |
          if [ "${{ inputs.confirm }}" != "publish-evidence-mcp-0.1.0" ]; then
            echo "::error::Confirmation string mismatch. Expected 'publish-evidence-mcp-0.1.0'; got '${{ inputs.confirm }}'."
            echo "::error::Read the header of this workflow file for the one-time procedure."
            exit 1
          fi

      - uses: actions/checkout@v5

      - name: Install Rust 1.95 (workspace MSRV)
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.95"

      - name: Verify workspace version is 0.1.0
        shell: bash
        run: |
          # This workflow is pinned to the first-publish version. A
          # later bump to 0.1.1+ means the regular `publish.yml` should
          # be used instead (post-TP-setup).
          VER=$(grep -E '^version = ' Cargo.toml | head -1 | sed -E 's/.*"([^"]+)".*/\1/')
          if [ "$VER" != "0.1.0" ]; then
            echo "::error::workspace version is '$VER', bootstrap workflow is 0.1.0-only"
            echo "::error::If evidence-mcp is already on crates.io, delete this workflow"
            echo "::error::and use the normal publish.yml via tag push."
            exit 1
          fi

      - name: Verify CRATES_IO_TOKEN_EVIDENCE_MCP_BOOTSTRAP secret is set
        shell: bash
        env:
          HAS_TOKEN: ${{ secrets.CRATES_IO_TOKEN_EVIDENCE_MCP_BOOTSTRAP != '' }}
        run: |
          if [ "$HAS_TOKEN" != "true" ]; then
            echo "::error::Secret CRATES_IO_TOKEN_EVIDENCE_MCP_BOOTSTRAP is not set."
            echo "::error::Read the workflow header (step 2) for how to create it."
            exit 1
          fi

      - name: Tarball sanity (block workspace-root paths)
        shell: bash
        run: |
          cargo package --list -p evidence-mcp --allow-dirty > /tmp/pkg.txt
          if grep -qE '^(tool/trace|cert/baselines)/' /tmp/pkg.txt; then
            echo "::error::Tarball for evidence-mcp contains workspace-root paths"
            grep -E '^(tool/trace|cert/baselines)/' /tmp/pkg.txt
            exit 1
          fi

      - name: Publish evidence-mcp (idempotent — tolerates prior success on retry)
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CRATES_IO_TOKEN_EVIDENCE_MCP_BOOTSTRAP }}
        shell: bash
        run: |
          set +e
          out=$(cargo publish -p evidence-mcp 2>&1)
          rc=$?
          set -e
          printf '%s\n' "$out"
          if [ $rc -ne 0 ]; then
            if printf '%s' "$out" | grep -q "already exists on crates.io index"; then
              echo "::notice::evidence-mcp 0.1.0 is already on crates.io — accepting as idempotent no-op."
              echo "::notice::You can now proceed with step 4 (Trusted Publisher setup) and step 5 (cleanup)."
            else
              exit $rc
            fi
          fi

      - name: Summary
        shell: bash
        run: |
          echo "evidence-mcp 0.1.0 bootstrap complete."
          echo ""
          echo "Next steps (see workflow header):"
          echo "  4. Configure Trusted Publisher at"
          echo "     https://crates.io/crates/evidence-mcp/settings/publishing"
          echo "  5. Revoke the bootstrap token, delete the GitHub secret,"
          echo "     and delete this workflow file."
