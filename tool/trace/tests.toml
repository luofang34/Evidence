[[tests]]
uid = "11c798f0-62c9-4669-9cc5-2f596544cfb9"
id = "TEST-048"
title = "cargo evidence doctor passes on rigorous fixture, fails on sloppy fixture, blocks cert generate"
owner = "tool"
traces_to = ["ec50f98b-9a1d-4f7b-bc33-df56c7faab2a"]
description = """
Integration tests in `crates/cargo-evidence/tests/doctor_cmd.rs`:
- Rigorous fixture (synthetic repo with tool/trace, cert/floors.toml,
  cert/boundary.toml, .github/workflows/ci.yml mentioning cargo
  evidence, README with `Override-Deterministic-Baseline:`) exits 0
  with `DOCTOR_OK` terminal and one `_OK` diagnostic per check.
- Sloppy fixture (missing trace + floors + boundary) exits 2 with
  `DOCTOR_FAIL` terminal; stream contains `DOCTOR_TRACE_INVALID`,
  `DOCTOR_FLOORS_MISSING`, `DOCTOR_BOUNDARY_MISSING` with
  `severity=error`.
- Cert-profile integration: `generate --profile cert` against the
  sloppy fixture exits non-zero with a `GENERATE_ERROR` terminal
  whose diagnostic enumerates the triggered doctor codes, proving
  the audit runs BEFORE bundle assembly.
- Self-dogfood: the current workspace passes `cargo evidence
  doctor` (load-bearing regression — if the tool's own rigor
  slips below its published checklist, this test fires).
"""
test_selectors = [
    "doctor_cmd::rigorous_fixture_passes",
    "doctor_cmd::sloppy_fixture_fails_with_named_codes",
    "doctor_cmd::cert_generate_blocks_on_doctor_fail",
    "doctor_cmd::current_workspace_passes_doctor",
]

[[tests]]
uid = "2856e53c-8c90-42e8-ad9b-3da6f3a14a25"
id = "TEST-049"
title = "Pre-release tool flag propagates into env.json, blocks verify under cert/record, passes dev"
owner = "tool"
traces_to = ["548b7b36-1d03-487d-a6a1-f2b37bdee2a1"]
description = """
Four assertions:
- `is_prerelease_version` correctly classifies `0.1.0-pre.1`,
  `0.0.1-alpha.2`, `1.0.0-rc.3` as pre-release and `0.1.0`,
  `1.0.0+build.42` as release (pure detection).
- `EnvFingerprint` round-trips `tool_prerelease` through serde;
  absent field deserializes as `false` (backwards compat for
  older bundles that predate the flag).
- Verify dev on a bundle with `tool_prerelease = true` exits 0
  and emits `VERIFY_PRERELEASE_TOOL` at warning severity (not
  terminal).
- Verify cert on the same bundle exits 2 with
  `VERIFY_PRERELEASE_TOOL` error + `VERIFY_FAIL` terminal.

The generate-time warning banner in `init_builder` is a
`tracing::warn!` gated on the compile-time const
`TOOL_IS_PRERELEASE`. Exercising it would require rebuilding
the CLI with a pre-release `CARGO_PKG_VERSION`; it is verified
by manual dogfood each time a pre-release publish is cut.
"""
test_selectors = [
