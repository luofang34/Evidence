#:schema https://navigate.dev/schema/evidence/tests.schema.json
# cargo-evidence — Test cases. One per LLR, naming the authoritative
# test (integration or unit). `test_selector` uses the Rust
# `cargo test <selector>` convention — i.e. crate::module::path or
# test_file_stem::fn_name.
#
# Selector staleness is a known gap: the LLR → Test UUID link is
# validated, but the selector itself is not resolved against the
# source tree in PR #44. PR #44b will extend trace --validate with
# --check-test-selectors. See tool/trace/README.md journal entry #1.

[schema]
version = "0.0.3"

[meta]
document_id = "TOOL-TESTS"
revision = "1.0"

