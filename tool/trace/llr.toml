description = """
`evidence_core::coverage::report::BranchCoverage {covered: u64,
total: u64}` is a sibling of `LineCoverage` on
`FileMeasurement`. The parser
(`evidence_core::coverage::llvm_cov_json::parse_llvm_cov_export`)
