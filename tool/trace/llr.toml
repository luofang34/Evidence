#:schema https://navigate.dev/schema/evidence/llr.schema.json
# cargo-evidence — Low-Level Requirements. One per HLR, naming the
# concrete function or entry point that implements it. The `modules`
# field carries a crate::path::to::function pointer so a reader can
# jump from requirement to implementation without grep.

[schema]
version = "0.0.3"

[meta]
document_id = "TOOL-LLR"
revision = "1.0"

# -------------------------------------------------------------------
# Diagnostic format contract
# -------------------------------------------------------------------

[[requirements]]
uid = "33333333-3333-4333-8333-000000000001"
id = "LLR-001"
title = "cmd_verify_jsonl emits a terminal on every exit path"
owner = "tool"
traces_to = ["22222222-2222-4222-8222-000000000001"]
modules = ["cargo_evidence::cli::verify::cmd_verify_jsonl"]
description = """
Each arm of cmd_verify_jsonl (pass, fail, skipped, runtime error,
strict-signature-missing) emits exactly one hand-built terminal
(VERIFY_OK, VERIFY_FAIL, or VERIFY_ERROR) as its last stdout line
before returning the matching exit code.
"""
verification_methods = ["test"]

[[requirements]]
uid = "33333333-3333-4333-8333-000000000002"
id = "LLR-002"
title = "emit_jsonl flushes stdout per event"
owner = "tool"
traces_to = ["22222222-2222-4222-8222-000000000002"]
modules = ["cargo_evidence::cli::output::emit_jsonl"]
description = """
The emit_jsonl helper locks stdout, writes one compact JSON line +
'\\n', and calls handle.flush() before returning. This is the only
path that writes JSONL to stdout; tracing is routed to stderr by
init_tracing.
"""
verification_methods = ["test"]

[[requirements]]
uid = "33333333-3333-4333-8333-000000000003"
id = "LLR-003"
title = "DiagnosticCode impls use exhaustive match self"
owner = "tool"
traces_to = ["22222222-2222-4222-8222-000000000003"]
modules = [
    "evidence::diagnostic::DiagnosticCode",
    "evidence::verify::errors::VerifyError",
    "evidence::hash::HashError",
]
description = """
Each DiagnosticCode::code impl matches self exhaustively so adding a
new variant without a code fails at compile time. The
diagnostic_codes_locked integration test is the runtime half,
asserting regex + uniqueness across the walked source tree.
"""
verification_methods = ["test"]

[[requirements]]
uid = "33333333-3333-4333-8333-000000000004"
id = "LLR-004"
title = "TERMINAL_CODES is the source of truth for terminals"
owner = "tool"
traces_to = ["22222222-2222-4222-8222-000000000004"]
modules = ["evidence::diagnostic::TERMINAL_CODES"]
description = """
pub const TERMINAL_CODES: &[&str] enumerates every hand-emitted
terminal. diagnostic_codes_locked asserts (a) internal uniqueness,
(b) disjointness with the walked DiagnosticCode registry, (c) every
walked code ending in a reserved suffix is also in TERMINAL_CODES,
(d) every TERMINAL_CODES entry ends in a reserved suffix.
"""
verification_methods = ["test"]

[[requirements]]
uid = "33333333-3333-4333-8333-000000000005"
id = "LLR-005"
title = "FixHint::Other catches unknown kind via #[serde(other)]"
owner = "tool"
traces_to = ["22222222-2222-4222-8222-000000000005"]
modules = ["evidence::diagnostic::FixHint"]
description = """
FixHint is a tagged enum with #[serde(tag = \"kind\")]. An unknown
kind string deserializes to FixHint::Other (the #[serde(other)]
variant) rather than failing. The payload is discarded because serde
#[serde(other)] requires unit variants; preserving it is scope for
PR #5.
"""
verification_methods = ["test"]

# -------------------------------------------------------------------
# Bundle generation
# -------------------------------------------------------------------

[[requirements]]
uid = "33333333-3333-4333-8333-000000000006"
id = "LLR-006"
title = "GitSnapshot::capture queries git once at builder construction"
owner = "tool"
traces_to = ["22222222-2222-4222-8222-000000000006"]
modules = ["evidence::git::GitSnapshot::capture"]
description = """
GitSnapshot::capture reads HEAD SHA, branch, and dirty status in one
atomic set. Subsequent pipeline steps read the snapshot; they do not
re-query git. The snapshot is owned by EvidenceBuilder.
"""
verification_methods = ["test"]

[[requirements]]
uid = "33333333-3333-4333-8333-000000000007"
id = "LLR-007"
title = "env_fingerprint records toolchain + host identity"
owner = "tool"
traces_to = ["22222222-2222-4222-8222-000000000007"]
modules = ["evidence::env::capture::env_fingerprint"]
description = """
env_fingerprint runs rustc --version, cargo --version, reads
Cargo.lock and rust-toolchain.toml, captures RUSTFLAGS and NAV_*
env vars, and builds a Host struct. Under strict mode, missing
rustc or cargo raises EnvCaptureError::Strict{Rustc,Cargo}Required.
"""
verification_methods = ["test"]

[[requirements]]
uid = "33333333-3333-4333-8333-000000000008"
id = "LLR-008"
title = "write_sha256sums sorts and normalizes paths"
owner = "tool"
traces_to = ["22222222-2222-4222-8222-000000000008"]
modules = ["evidence::hash::write_sha256sums"]
description = """
write_sha256sums walks the bundle root, collects file paths, sorts
them, normalizes backslashes to forward slashes, and writes
'<sha>  <rel-path>' lines. Skips SHA256SUMS itself, index.json, and
BUNDLE.sig so the content layer is stable.
"""
verification_methods = ["test"]

[[requirements]]
uid = "33333333-3333-4333-8333-000000000009"
id = "LLR-009"
title = "DeterministicManifest projects host-independent fields"
owner = "tool"
traces_to = ["22222222-2222-4222-8222-000000000009"]
modules = ["evidence::env::fingerprint::DeterministicManifest"]
description = """
DeterministicManifest is derived from EnvFingerprint by selecting
only fields that shall be byte-equal across hosts for the same
commit: rustc string, cargo string, target_triple, cargo_lock_hash,
rust_toolchain_toml, rustflags. Its SHA-256 lands in
index.json.deterministic_hash.
"""
verification_methods = ["test"]

[[requirements]]
uid = "33333333-3333-4333-8333-000000000010"
id = "LLR-010"
title = "EvidenceBuilder::finalize re-reads git SHA"
owner = "tool"
traces_to = ["22222222-2222-4222-8222-000000000010"]
modules = ["evidence::bundle::EvidenceBuilder::finalize"]
description = """
finalize() calls GitProvider::head_sha() a second time and compares
against the snapshot. On mismatch it returns BuilderError::Toctou
with both SHAs so the operator can see the drift. This closes the
time-of-check / time-of-use gap for the bundle's git provenance.
"""
verification_methods = ["test"]

# -------------------------------------------------------------------
# Verification
# -------------------------------------------------------------------

[[requirements]]
uid = "33333333-3333-4333-8333-000000000011"
id = "LLR-011"
title = "verify_hash_list rehashes every SHA256SUMS entry"
owner = "tool"
traces_to = ["22222222-2222-4222-8222-000000000011"]
modules = ["evidence::verify::bundle::verify_bundle_with_key"]
description = """
verify_bundle_with_key parses SHA256SUMS, recomputes the SHA-256 of
each listed file with streaming io::copy, and pushes VerifyError
variants onto the findings vec for mismatches, missing files, and
unexpected-but-unlisted files. All findings accumulate (no early
bail).
"""
verification_methods = ["test"]

[[requirements]]
uid = "33333333-3333-4333-8333-000000000012"
id = "LLR-012"
title = "check_env_vs_index cross-checks duplicated fields"
owner = "tool"
traces_to = ["22222222-2222-4222-8222-000000000012"]
modules = ["evidence::verify::cross_file::check_env_vs_index"]
description = """
check_env_vs_index reads env.json (tolerating tamper-failure via
if let Ok), compares profile / git_sha / git_branch / git_dirty
against index.json, and emits VerifyError::CrossFileInconsistency
per disagreement.
"""
verification_methods = ["test"]

[[requirements]]
uid = "33333333-3333-4333-8333-000000000013"
id = "LLR-013"
title = "check_dal_map cross-checks index.json ↔ compliance/"
owner = "tool"
traces_to = ["22222222-2222-4222-8222-000000000013"]
modules = ["evidence::verify::consistency::check_dal_map"]
description = """
check_dal_map iterates index.json.dal_map, reads each
compliance/<crate>.json, and asserts the dal string matches.
Orphans in either direction emit VerifyError::DalMapOrphan with the
offending crate name.
"""
verification_methods = ["test"]

[[requirements]]
uid = "33333333-3333-4333-8333-000000000014"
id = "LLR-014"
title = "check_trace_outputs_hashed enforces trace-file hashing"
owner = "tool"
traces_to = ["22222222-2222-4222-8222-000000000014"]
modules = ["evidence::verify::consistency::check_trace_outputs_hashed"]
description = """
check_trace_outputs_hashed iterates index.json.trace_outputs and
asserts each path is present in the SHA256SUMS key set. Missing
entries emit VerifyError::TraceOutputNotHashed.
"""
verification_methods = ["test"]

[[requirements]]
uid = "33333333-3333-4333-8333-000000000015"
id = "LLR-015"
title = "cmd_verify_jsonl strict-mode signature guard"
owner = "tool"
traces_to = ["22222222-2222-4222-8222-000000000015"]
modules = ["cargo_evidence::cli::verify::cmd_verify_jsonl"]
description = """
When strict is true and neither BUNDLE.sig nor --verify-key is
present, cmd_verify_jsonl emits VERIFY_STRICT_SIGNATURE_MISSING as a
finding followed by VERIFY_FAIL terminal, returning
EXIT_VERIFICATION_FAILURE (2).
"""
verification_methods = ["test"]

