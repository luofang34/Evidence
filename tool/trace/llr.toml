`crates/cargo-evidence/src/cli/doctor.rs` runs each rigor check
in a fixed deterministic order, emitting one `Diagnostic` per
check via `evidence_core::diagnostic::emit_jsonl` with a `DOCTOR_*`
code. Severity is derived per check: trace / floors / boundary
failures are `error`; CI / merge-style / override-doc gaps are
`warning`. A check that passes emits an `info`-severity
`DOCTOR_*_OK` diagnostic so the stream shape stays "one line
per check" and downstream tooling can detect truncation.

Stream terminates with exactly one terminal diagnostic:
- `DOCTOR_OK` + exit 0 when no `error`-severity diagnostic fired
- `DOCTOR_FAIL` + exit 2 when at least one `error` fired
