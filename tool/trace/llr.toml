uid = "b1377fb5-f879-4edc-9c50-46c5e67c71ad"
id = "LLR-059"
title = "threshold_violations dispatches to level-appropriate aggregator; strict < comparison"
owner = "tool"
traces_to = ["bebe9227-5f47-4eb8-89a7-f2157fb96e6c"]
modules = ["cargo_evidence::cli::generate::coverage_phase::threshold_violations"]
derived = false
description = """
`threshold_violations(report: &CoverageReport, thresholds:
DalCoverageThresholds) -> Vec<ThresholdViolation>` iterates
over each `(level, Option<u8>)` threshold entry:

  1. Skip if `thresholds.<level>_percent` is `None` (DAL-D or
     dev). No violation recorded.
  2. Skip if no `Measurement` of that level exists in the
     report. No violation recorded — "measurement absent" is
     a config-layer issue, not a coverage-layer failure.
     Treating absence as 0% would mask the true problem
     (auditor gets COVERAGE_BELOW_THRESHOLD when they
     should have gotten a "configure your coverage=branch
     flag" signal).
  3. Compute `current = aggregate_<level>_percent(m)`.
  4. If `current < f64::from(threshold)`, append a
     `ThresholdViolation { dimension, current_percent,
     threshold_percent }`.

Comparison is strict `<`, not `<=`. DO-178C A-7 minima are
stated inclusively ("statement coverage shall be ≥ 90% at
DAL-C"), so equality is compliant. This is a BVA case the
test triplet pins — `current == threshold` must not fire.

The two-level dispatch (statement uses
`aggregate_lines_percent`, branch uses
`aggregate_branches_percent`) is what enforces the level/
field binding at the policy layer. The dispatcher is the
only place in the threshold-enforcement chain where that
binding is decided; changing it to use a shared aggregator
would be the regression path.
"""
verification_methods = ["test"]
emits = ["COVERAGE_BELOW_THRESHOLD"]

