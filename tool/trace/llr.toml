title = "dispatch guard emits CLI_SUBCOMMAND_ERROR terminal"
owner = "tool"
traces_to = ["22222222-2222-4222-8222-000000000020"]
modules = ["cargo_evidence::main::emit_unsupported_jsonl_terminal"]
description = """
When --format=jsonl is passed to any non-verify subcommand,
dispatch calls emit_unsupported_jsonl_terminal, which streams
CLI_UNSUPPORTED_FORMAT (finding) then CLI_SUBCOMMAND_ERROR
(terminal, with subcommand field set), returning EXIT_ERROR. Stderr
stays silent.
"""
verification_methods = ["test"]
