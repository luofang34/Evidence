description = """
`evidence_core::coverage::report::CoverageReport` models the
typed wire shape of `coverage/coverage_summary.json`. Top-level
fields: `schema_version: String` (pinned to
`schema_versions::COVERAGE`), `measurements: Vec<Measurement>`.
Each `Measurement` carries a `level: CoverageLevel` enum with
four variants (`statement`, `branch`, `pattern_decision`,
`mcdc` — the latter two reserved, not emitted), plus
`engine: String`, `engine_version: String`, and
`per_file: Vec<FileMeasurement>`. Each `FileMeasurement` has a
workspace-relative `path: String`, `lines: LineCoverage
{covered, total}`, `branches: Option<BranchCoverage {covered,
total}>`, `decisions: Vec<DecisionCoverage>`, and
`conditions: Vec<ConditionCoverage>`. `branches` is `Some` at
`CoverageLevel::Branch` and `None` at `Statement` —
aggregation over a Branch measurement reads the `branches`
field, never `lines`. `decisions` / `conditions` stay reserved
for v2 pattern-decision / MC/DC; both are empty today
regardless of level.

`evidence_core::coverage::llvm_cov_json::parse_llvm_cov_export`
consumes `cargo-llvm-cov`'s JSON export format (documented
shape: `{data: [{files: [...], functions: [...], totals: {...}}],
version, cargo_llvm_cov: {version}}`), normalizes absolute file
paths to workspace-relative, and returns a `CoverageReport` with
one measurement per requested level. Filename normalization
strips the workspace root prefix deterministically so hashes are
cross-host stable.

`cargo_evidence::cli::generate::coverage_phase::run_coverage_phase`
is the new Phase 5b of `cmd_generate`. It is invoked after the
plain `cargo test` phase when `CoverageChoice != None`. The
function spawns `cargo llvm-cov --workspace --json --output-path
<tmp.json> --lcov --output-path <tmp.lcov>` (via
`std::process::Command`), parses the JSON, and stages both files
into the builder via `EvidenceBuilder::set_coverage_report` and
`EvidenceBuilder::stage_coverage_lcov`. On ENOENT (binary
missing) the phase emits a `COVERAGE_LLVMCOV_MISSING`
diagnostic whose severity is Warning for `Profile::Dev` and
Error for `Profile::Cert` / `Profile::Record`; on JSON parse
failure it emits `COVERAGE_PARSE_FAILED` (always Error).
Successful completion emits `COVERAGE_OK` (Info non-terminal)
naming the engine version and per-level line counts.
"""
verification_methods = ["test"]
emits = [
    "COVERAGE_LLVMCOV_MISSING",
    "COVERAGE_OK",
    "COVERAGE_PARSE_FAILED",
