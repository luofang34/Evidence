measurements, and leaves it `None` on Statement-level.

The structural split replaces an earlier shim
(`decisions_from_branch_summary`) that encoded the branch
numerator/denominator as a single synthetic `DecisionCoverage`
whose id string was `"file-summary:{covered}/{count}"`. That
encoding made the counts unreachable to anything downstream
that didn't parse the id string — in particular, branch-
threshold aggregation had no way to read them, and silently
fell back to summing line counts. A file with zero branches
(straight-line code) serializes as `Some(BranchCoverage{0,0})`,
not `None`; absence of the field means "this measurement level
does not carry branch data", not "this file has no branches".

