uid = "84c30007-3c84-4d23-bdf8-f540339b507a"
id = "LLR-058"
title = "aggregate_branches_percent sums per_file[].branches over a Branch-level Measurement"
owner = "tool"
traces_to = ["bebe9227-5f47-4eb8-89a7-f2157fb96e6c"]
modules = [
    "cargo_evidence::cli::generate::coverage_phase::aggregate_branches_percent",
    "evidence_core::bundle::builder_coverage::aggregate_branches",
]
derived = false
description = """
`aggregate_branches_percent(m: &Measurement) -> f64` computes
`sum(per_file[].branches.map_or(0, |b| b.covered)) /
sum(per_file[].branches.map_or(0, |b| b.total)) * 100.0`.
Files where `branches` is `None` contribute `0/0` (no
contribution) rather than `0/total` (which would pull the
aggregate toward zero). This distinction matters when a
Branch-level measurement is assembled from a mixed parser
run where some files legitimately lacked branch data.

**This function is the core of the bugfix.** Pre-fix, the
Branch-level arm of `threshold_violations` called a shared
`aggregate_percent` that always summed `lines.*`. A file at
95% lines / 50% branches looked like 95% branch coverage —
DAL-B's 85% branch minimum passed spuriously, and the tool
certified a bundle whose claim it could not mechanically
defend.

The symmetry with `aggregate_lines_percent` is deliberate but
not DRY: collapsing them into a generic `aggregate_percent(m,
|f| &f.lines)` would re-introduce the risk of a caller
passing the wrong field-accessor at call site. Two
single-purpose functions make the Branch vs Statement
distinction unmissable at every callsite.

Zero denominator → `0.0`, same rationale as LLR-057.
"""
verification_methods = ["test"]

