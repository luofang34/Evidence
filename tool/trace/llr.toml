traces_to = ["cb44260b-778a-45f0-9a2b-8304dfd836c0"]
modules = [
    "evidence_mcp::server::Server",
    "evidence_mcp::workspace::resolve_workspace",
]
derived = false
description = """
`#[tool_handler(router = self.tool_router, name = "evidence-mcp")]`
on `impl ServerHandler for Server` in `server.rs` is the
load-bearing declaration. The rmcp-macros generator (at
`build_get_info` in rmcp-macros/src/tool_handler.rs) pattern-
matches on the `(name, version)` args:

  - `(Some, Some)` → `Implementation::new(name, version)`
  - `(Some, None)` → `Implementation::new(name, env!("CARGO_PKG_VERSION"))`
  - `(None, Some)` → `Implementation::new(env!("CARGO_CRATE_NAME"), version)`
  - `(None, None)` → `Implementation::from_build_env()` (rmcp default)

This crate uses `(Some "evidence-mcp", None)` so the version
is read via `env!("CARGO_PKG_VERSION")` at evidence-mcp's
compile-time, not rmcp's — matches the crate's declared
Cargo.toml version.

**lib.rs-as-facade split** (the structural half of this LLR):
pre-split lib.rs bundled the `Server` impl, helper fns, and
types in a single 269-line file — over the CLAUDE.md
"lib.rs ≤ 100 lines" rule. The split moves:

  - `Server` struct + `ServerHandler` impl + `#[tool_router]`
    tool methods + `prepend_fallback_signal` → `server.rs`
  - `WorkspaceResolution` enum + `resolve_workspace` +
    `workspace_fallback_diagnostic` → `workspace.rs`
  - `lib.rs` becomes crate-docstring + `mod` decls +
    `pub use server::Server` (facade; ≤80 lines target).

The split isn't purely hygiene: the serverInfo override
required adding the `name = "evidence-mcp"` macro arg, and
keeping lib.rs coherent at that addition was the immediate
trigger. Grouping ServerHandler concerns into `server.rs`
makes future rmcp-trait changes apply to one file, not two.
"""
verification_methods = ["test"]

[[requirements]]
uid = "6c371c79-f9fa-498d-9e11-07c7d75533a9"
id = "LLR-063"
title = "detect_with_probe + probe_cli_version + skew_diagnostic"
owner = "tool"
traces_to = ["4955bb57-af8d-402f-b2bf-42ef5baadc54"]
modules = [
    "evidence_mcp::version_probe::VersionSkew",
    "evidence_mcp::version_probe::detect_with_probe",
    "evidence_mcp::version_probe::probe_cli_version",
    "evidence_mcp::version_probe::skew_diagnostic",
]
derived = false
description = '''
`VersionSkew { Matched(String) | Skewed{mcp,cli} |
ProbeFailed(String) }` is the three-state outcome of the
startup probe. `Matched` carries the probed string so the
byte-equality invariant is expressed at the type level —
consumers that want the CLI version on a successful probe
read it off the `Matched` payload rather than substituting
the evidence-mcp version, which would silently break if
`Matched` were ever relaxed to a fuzzy semver check.

`detect_with_probe<F: FnOnce() -> Result<String, String>>(F)`
is the testable core: it takes a closure supplying the CLI
version (or an error) and returns the `VersionSkew`. Tests
drive the three branches with simulated probe outcomes so no
subprocess is spawned during unit verification.

`probe_cli_version()` is the real subprocess path:

  1. `Command::new("cargo").args(["evidence", "--version"])`.
     Env: `CARGO_TERM_COLOR=never` + `NO_COLOR=1` (match the
     rest of the subprocess plumbing; defend against ANSI
     escapes sneaking into stdout).
  2. `wait_with_timeout(5s)` — cold cargo caches can be slow;
     past 5s is pathological and we'd rather surface a
     probe-failed warning than block the MCP handshake on the
     version check.
  3. Parse: first non-empty line; last whitespace-separated
     token. Matches clap's auto-version emit shape
     (`<bin_name> <version>\n`).
  4. Empty output after parsing → `Err` (caller maps to
     ProbeFailed), not Ok("") — an empty version string is
     not a meaningful CLI response, and a downstream Skewed
     warning naming an empty CLI version would confuse the
     agent.

`skew_diagnostic(skew)` synthesizes an MCP-layer diagnostic
in the same shape as `workspace_fallback_diagnostic`
(workspace.rs): `{code, severity: "warning", message,
subcommand: "mcp"}`. `None` for Matched; `Some` with
`MCP_VERSION_SKEW` / `MCP_VERSION_PROBE_FAILED` otherwise.

Comparison semantics:
  - Strict string equality between `env!(CARGO_PKG_VERSION)`
    and the probed CLI string. Pre-release suffixes count as
    skew (`0.1.2` vs `0.1.2-dev.1` → Skewed). Alternative
    (semver-equal comparison that smooths pre-release) would
    hide the signal ambiguously.

Cached via `Arc<VersionSkew>` on the Server struct so
`#[derive(Clone)]` (required by rmcp) doesn't re-copy the
strings per-request.
'''
verification_methods = ["test"]
emits = [
    "MCP_VERSION_PROBE_FAILED",
    "MCP_VERSION_SKEW",
]

