uid = "a95ed852-94ba-499b-bd17-76d26b75ebe5"
id = "LLR-057"
title = "aggregate_lines_percent sums per_file[].lines over a Statement-level Measurement"
owner = "tool"
traces_to = ["bebe9227-5f47-4eb8-89a7-f2157fb96e6c"]
modules = [
    "cargo_evidence::cli::generate::coverage_phase::aggregate_lines_percent",
    "evidence_core::bundle::builder_coverage::aggregate_lines",
]
derived = false
description = """
`aggregate_lines_percent(m: &Measurement) -> f64` computes
`sum(per_file[].lines.covered) / sum(per_file[].lines.total)
* 100.0`. Used by the Statement-level arm of
`threshold_violations` (enforcement side) and by
`EvidenceBuilder::coverage_statement_percent` (compliance-
report side). The two callsites are textually similar but
non-shared because the enforcement arm lives in
`cargo-evidence` (needs the CLI-side policy context) and the
compliance arm lives in `evidence-core` (populates the wire
`CoverageSummary`). Both are asserted by the same test
triplet to prevent drift.

Zero denominator (no executable lines across all files)
returns `0.0`. Without this guard, `u64::sum() / u64::sum()`
would panic on division-by-zero in release mode and return
NaN in f64 — either one breaks the `< threshold` comparison
silently (NaN comparisons always return false, so a NaN
"current" would never trigger a violation, hiding the gap).

The function has no parameter for the measurement level
because the level is implicit in the caller's dispatch —
passing a Branch-level `Measurement` here would sum that
measurement's `lines` field, which is populated but
semantically secondary at Branch level. The dispatch in
`threshold_violations` is what binds "Statement level uses
lines" to the policy.
"""
verification_methods = ["test"]

