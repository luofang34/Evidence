uid = "759ac6b4-ef4c-4d1d-8bfc-79f07ecef6eb"
id = "LLR-064"
title = "MCP tool-layer failures surface as structured diagnostics carrying typed MCP_* codes"
owner = "tool"
traces_to = ["20b4b691-f89f-4453-85f3-9eba5299935e"]
modules = [
    "evidence_mcp::subprocess",
    "evidence_mcp::server",
    "evidence_mcp::schema",
]
derived = false
description = """
Every `RunError` variant plus the two parse-layer synthesized
terminals map to a typed `MCP_*` code declared in `RULES`
under `Domain::Mcp`. Tool-method handlers respond with a
well-formed `JsonlToolResponse` (or `RulesToolResponse`)
carrying `exit_code == 2`, the matching terminal, and one
structured diagnostic event (code + severity `Error` +
human message) — agents pattern-match on `.code` rather than
parsing an rmcp `Err(String)`. `Err(String)` is reserved for
host-contract breakages (server CWD unresolvable, invalid
enum value for `mode`).

Hand-emitted MCP codes live in a dedicated
`evidence_core::HAND_EMITTED_MCP_CODES` constant, parallel
to `HAND_EMITTED_CLI_CODES` and disjoint from it. Each set
is audited against its own source tree —
`HAND_EMITTED_CLI_CODES` against `crates/cargo-evidence/src`,
`HAND_EMITTED_MCP_CODES` against `crates/evidence-mcp/src` —
so the `diagnostic_codes_locked` bijection stays crate-local.

Registered codes (all `Severity::Error`, `Domain::Mcp`):

  - `MCP_CARGO_NOT_FOUND` — `RunError::BinaryNotFound`.
  - `MCP_SUBPROCESS_SPAWN_FAILED` — `RunError::Spawn`.
  - `MCP_SUBPROCESS_TIMEOUT` — `RunError::Timeout`.
  - `MCP_MALFORMED_JSONL` — a parsed stdout line is not JSON.
  - `MCP_NO_OUTPUT` — the subprocess produced zero lines.

`MCP_VERSION_PROBE_FAILED` / `MCP_VERSION_SKEW` /
`MCP_WORKSPACE_FALLBACK` (existing; Warning severity) also
live in `HAND_EMITTED_MCP_CODES` since they are emitted from
`crates/evidence-mcp/src`; the CLI-side registry is strictly
cargo-evidence-emitted codes.

`RunError::code(&self) -> &'static str` lives on the enum,
so a new variant forces the code declaration at the type.
The response-building helper reads the code directly off the
enum — no per-call match arm in `server.rs` that can drift
out of sync.

`RulesToolResponse` carries
`error: Option<serde_json::Value>` alongside `rules`,
`count`, `exit_code`, and the existing `warnings` vec. A
failed subprocess populates `error` with the structured
diagnostic, leaves `rules` empty, and sets `count = 0`; a
successful run leaves `error = None`.

`exit_code` is documentation, not the machine contract. Two
failure classes — CLI verification failure (the subprocess
ran to completion and emitted its own `_FAIL` terminal) and
MCP tool-layer failure (the wrapper synthesized an `MCP_*`
terminal because the subprocess could not be run to
completion) — deliberately share `exit_code == 2`. Hosts must
dispatch on the structured field: `terminal` for JSONL-stream
verbs, `error.code` for rules / diff. The bit that would
distinguish the two classes lives in those fields by design;
collapsing the `exit_code` lane keeps every wire response on
the same numeric ladder as `cargo evidence` invocations
without forcing hosts to maintain two parallel decode tables.

Streaming-verb recipe: the JSONL-stream verbs (doctor, check,
floors — and any future verb of the same shape) share a single
`Server::run_streaming_verb(args, workspace_path)` helper that
owns the `resolve_workspace` → `run_evidence` → (on error)
`jsonl_response_from_run_error` | (on success) `parse_jsonl` →
`prepend_fallback_signal` → `prepend_skew_signal` →
`JsonlToolResponse` sequence. Each handler reduces to a
one-liner naming its CLI args; skipping the skew-signal prepend
on a new verb is no longer possible by construction, since the
helper is the only path to the response shape.
"""
verification_methods = ["test"]
emits = [
    "MCP_CARGO_NOT_FOUND",
    "MCP_MALFORMED_JSONL",
    "MCP_NO_OUTPUT",
    "MCP_SUBPROCESS_SPAWN_FAILED",
    "MCP_SUBPROCESS_TIMEOUT",
]

