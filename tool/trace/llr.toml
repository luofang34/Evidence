[[requirements]]
uid = "33333333-3333-4333-8333-000000000019"
id = "LLR-019"
title = "validate_trace_links_with_policy is two-phase"
owner = "tool"
traces_to = ["22222222-2222-4222-8222-000000000019"]
modules = ["evidence::trace::validation::validate_trace_links_with_policy"]
description = """
validate_trace_links_with_policy first registers every SYS / HLR /
LLR / TEST / DERIVED entry into a uid_index + item_index,
returning TraceValidationError::Register on duplicates or bad UUIDs.
Only after the register pass is clean does it run the link pass,
which enforces the expected target kind and ownership rules for
HLR→SYS, LLR→HLR, and TEST→LLR.
"""
verification_methods = ["test"]

[[requirements]]
uid = "33333333-3333-4333-8333-000000000020"
