the `Profile::Cert | Profile::Record` branch; the call returns
`Err(BuilderError::DoctorFailed { codes: Vec<&'static str> })`
when the audit fails, and the main dispatch translates the error
into a `GENERATE_ERROR` terminal whose diagnostic enumerates the
per-check codes so the auditor gets full detail without re-
running doctor.
"""
