id = "HLR-004"
title = "Terminal suffixes are reserved"
owner = "tool"
scope = "component"
description = """
Schema Rule 1 (suffix clause): _OK, _FAIL, _ERROR are terminal-only.
No DiagnosticCode impl may return a code ending in these suffixes;
the set of hand-emitted terminals is fixed by TERMINAL_CODES and
enforced by diagnostic_codes_locked (disjointness + reserved-suffix
containment in both directions).
"""
verification_methods = ["test"]
traces_to = ["0e42b90f-88d7-408f-8843-0a3335279360"]
surfaces = [
    "CLI_SUBCOMMAND_ERROR terminal",
    "diagnostic code namespace (regex + reserved suffixes)",
]

