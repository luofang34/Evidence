[[requirements]]
uid = "f6d35f65-4a38-4ad9-ba2a-b5c4e3d7da41"
id = "HLR-001"
title = "Every --format=jsonl run emits exactly one terminal event"
owner = "tool"
scope = "component"
description = """
Schema Rule 1: the last JSONL line on stdout has a code ending in _OK
(exit 0), _FAIL (exit 2), or _ERROR (exit 1). Every run — including
runtime faults — emits exactly one terminal so reader code can detect
stream truncation.
"""
verification_methods = ["test"]
traces_to = ["0e42b90f-88d7-408f-8843-0a3335279360"]
surfaces = ["VERIFY_OK / VERIFY_FAIL / VERIFY_ERROR terminal contract"]

[[requirements]]
uid = "da30287c-8223-448b-ad94-7a09cc981347"
id = "HLR-002"
title = "stdout under --format=jsonl is strict JSONL"
owner = "tool"
scope = "component"
description = """
Schema Rule 2: under --format=jsonl, every stdout line parses as a JSON
object. Human progress text, tracing logs, and error prose live on
stderr only. Stderr on the JSONL error path is silent so agents
reading both streams don't see duplicate error data.
"""
verification_methods = ["test"]
traces_to = ["0e42b90f-88d7-408f-8843-0a3335279360"]
surfaces = ["jsonl stream per Schema Rule 2"]

[[requirements]]
