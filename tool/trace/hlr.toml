[[requirements]]
uid = "57992e98-fb1e-4248-b340-6dd454db95c1"
id = "HLR-048"
title = "cargo evidence doctor audits downstream rigor via a checklist of typed diagnostic codes"
owner = "tool"
scope = "component"
description = """
New subcommand `cargo evidence doctor` runs a mechanical rigor
audit against the caller's repo. Each check emits exactly one
`Diagnostic` with a stable `DOCTOR_*` code and a severity
(`error` / `warning` / `info`); the stream terminates with
exactly one of `DOCTOR_OK` (exit 0) or `DOCTOR_FAIL` (exit 2)
per Schema Rule 1. Jsonl-native so an agent can pattern-match
on the code rather than parse prose.

MVP checks:
- trace validity (FAIL): wraps `trace --validate
  --require-hlr-sys-trace --require-hlr-surface-bijection
  --check-test-selectors`.
- floors config present + satisfied (FAIL): wraps
  `cargo evidence floors`.
- boundary config present + parseable (FAIL): exists-check on
  `cert/boundary.toml` + `BoundaryConfig::load`.
- CI workflow references cargo evidence (WARN): greps
  `.github/workflows/*.yml`.
- merge-style policy (WARN): inspects last 20 main-branch
  commits; warns on `Merge pull request #N from …` pattern
  because merge-commit repos have the Override-Deterministic-
  Baseline haystack gap.
- override protocol documented (WARN): greps README.md +
  CONTRIBUTING.md for `Override-Deterministic-Baseline:`.

`cargo evidence generate --profile cert` (and `record`) invokes
doctor internally before bundle assembly and aborts on any
`error`-severity finding. `--profile dev` does not invoke
doctor — dev iteration stays fast.
"""
verification_methods = ["test"]
traces_to = ["abba0183-f506-4fe5-81d1-afdc3bcac1ca"]
surfaces = ["doctor"]

[[requirements]]
uid = "014adc4d-c545-403c-b4f2-d702a49dff30"
id = "HLR-049"
title = "Pre-release builds embed a tool_prerelease flag in env.json and verify refuses such bundles under cert/record"
owner = "tool"
scope = "component"
description = """
`env!("CARGO_PKG_VERSION")` at build time decides the flag:
any `-` suffix (semver pre-release identifier per §9) sets
`tool_prerelease = true` in the bundle's `env.json`. The schema
edit is additive; absent field deserializes as `false` so
pre-PR-#60 bundles continue to verify as release-grade (they
were). `env.json`'s `ENV` schema constant stays at `"0.0.1"`
per the pre-1.0 additive-field policy.

`verify_bundle_with_key` checks `env.tool_prerelease` after
the existing `check_env_vs_index` pass. On `tool_prerelease ==
true` the library pushes `VerifyError::PrereleaseToolDetected
{ profile, engine_crate_version }` into `verify_errors` on
every profile (library stays policy-free: "report what's
true"). The CLI layer (`cmd_verify_jsonl`) partitions
VerifyError variants into error-vs-warning severity by
`(code, index.profile)`: `VERIFY_PRERELEASE_TOOL` on
`Profile::Dev` downgrades to Warning + `VERIFY_OK` terminal +
exit 0; same code on Cert/Record stays Error + `VERIFY_FAIL` +
exit 2. Every other VerifyError variant remains error-severity
regardless of profile.

`generate --profile cert` / `record` additionally emits a
warning-severity `VERIFY_PRERELEASE_TOOL` at bundle-assembly
time so the user sees the problem before trying to verify. Dev
profile generate skips the emit — dev iteration stays fast.
"""
verification_methods = ["test"]
traces_to = ["2758e039-4943-4a9a-ad3d-9e0b0d0da7d8"]
surfaces = ["pre-release safety gate"]

[[requirements]]
uid = "20b4b691-f89f-4453-85f3-9eba5299935e"
id = "HLR-050"
title = "Thin MCP server wraps check, rules, and doctor via subprocess over stdio"
owner = "tool"
scope = "component"
description = """
A new workspace crate `mcp-evidence` (binary + thin lib) shall
expose three MCP tools over stdio transport: `evidence_check`,
`evidence_rules`, `evidence_doctor`. Each tool spawns the
corresponding `cargo evidence <verb>` subcommand under
`--format=jsonl` (or `--json` for `rules`, which is blob-only
per CLI_UNSUPPORTED_FORMAT rejection), collects stdout + exit
code, and returns a structured response containing the parsed
diagnostic events, the terminal code, and the exit code.

Subprocess is the architectural choice: the CLI's jsonl
output is the stable contract (pinned by
`crates/cargo-evidence/tests/verify_jsonl.rs`,
`rules_cmd.rs`, `doctor_cmd.rs`). Wrapping the CLI avoids
duplicating severity policy and keeps `mcp-evidence` a thin
wrapper that versions in lockstep with the CLI. The MCP layer
does not own any `Diagnostic` codes in `evidence_core::RULES`
— it is pass-through. Its only layer-local failure signals
(`BinaryNotFound`, `MalformedJsonl`, `CHECK_TIMEOUT`) surface
as structured errors in the MCP tool response, not as new
codes in the CLI's public vocabulary.

`evidence_check` shall accept an optional `workspace_path`
plus optional `mode` (`"auto"|"source"|"bundle"`, mirroring
`cargo evidence check --mode`). `evidence_doctor` shall accept
an optional `workspace_path`. `evidence_rules` takes no
arguments. Default `workspace_path` is the server process's
CWD. All spawns run with `CARGO_TERM_COLOR=never` +
`NO_COLOR=1` to prevent ANSI escapes breaking JSONL parse.

A 10-minute timeout bounds each spawn (`cargo test
--workspace` in source-mode check can legitimately take
several minutes); exceeding it yields a synthetic
`CHECK_TIMEOUT` terminal and exit_code=1.
"""
verification_methods = ["test"]
traces_to = ["385c2c4c-748c-4486-bd8c-7622b12c9273"]
surfaces = ["agent MCP surface"]

[[requirements]]
uid = "cfeb6d1b-4189-47fd-9d9f-d50b81c57354"
id = "HLR-051"
title = "Per-test outcome records written to tests/test_outcomes.jsonl with failure-message capture from libtest stdout"
owner = "tool"
scope = "component"
description = """
The existing libtest text parser at
`evidence_core::bundle::parse_cargo_test_output_with_outcomes`
already extracts `BTreeMap<String, TestOutcome>` where
`TestOutcome ∈ {Passed, Failed, Ignored}` — per-test name +
status are captured today. The gap is (a) `failure_message`
for failed tests (not in the map today), and (b) the
serialization from that map to a bundle artifact.

PR #73 extends the parser to also scan libtest's
`---- <test_name> stdout ----` failure blocks emitted after the
`test result:` summary line, capturing the panic message + a
short backtrace tail into `failure_message: Option<String>` on
Failed variants. A new `TestOutcomeRecord` wire struct
(distinct from the parser's internal enum so the wire shape is
decoupled from parser internals) carries `{name, module_path,
passed, ignored, failure_message, duration_ms}` where
`duration_ms: Option<u64>` is reserved slot zero for a future
nightly-libtest or nextest timing source.

`tests/test_outcomes.jsonl` lands in the bundle sorted
alphabetically by `(module_path, name)`, integrity-hashed into
`SHA256SUMS`. `tests/cargo_test_summary.json` stays for
backwards compatibility (derived-from-outcomes). Compliance
emitter upgrades A-7 Obj-3 from `Partial` → `Met` when the
jsonl is non-empty and every `passed=false` entry has a
non-empty `failure_message`.

Design note: `cargo nextest` was considered as the data source
and rejected — its only unique value-add over the enriched
libtest parser is `duration_ms`, which is not an A-7 Obj-3
requirement. Adopting nextest would add a cert-customer
`cargo install` footprint for zero Obj-3 credit. Duration
stays a schema-reserved follow-up.
"""
verification_methods = ["test"]
traces_to = ["8069de78-71cc-4acb-a1f8-9e3519ccf1ce"]
surfaces = ["per-test outcome capture"]
