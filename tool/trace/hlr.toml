id = "HLR-027"
title = "Every REQ_GAP carries a mechanical FixHint where one exists"
owner = "tool"
scope = "component"
description = """
REQ_GAP events include a FixHint variant chosen by sub-case:
empty traces_to under require_hlr_sys_trace → AddTomlKey;
missing uid → AssignUuid;
unresolvable test_selector → AddTomlKey recommending a resolved
selector. Real test failures carry no FixHint (the fix is in source
code, not in the trace file) but do carry enough message context
for an agent to root-cause. Without hints, `check` is structured
logging; with them, MCP (PR #50) can wrap autofix agents directly.
"""
verification_methods = ["test"]
traces_to = ["aa13d9a6-042e-4bc9-9d9e-c191128fb857"]
surfaces = ["check"]

