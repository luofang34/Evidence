id = "HLR-003"
title = "Diagnostic codes are locked: unique + regex + exhaustive"
owner = "tool"
scope = "component"
description = """
Schema Rule 3: every DiagnosticCode::code return matches
^[A-Z][A-Z0-9]*(_[A-Z0-9]+)*$, every code is unique across the
library, and the match inside each impl is exhaustive (a new variant
without a code fails to compile).
"""
verification_methods = ["test"]
traces_to = ["0e42b90f-88d7-408f-8843-0a3335279360"]
surfaces = ["diagnostic code namespace (regex + reserved suffixes)"]

[[requirements]]
