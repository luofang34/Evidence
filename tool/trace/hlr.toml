#:schema https://navigate.dev/schema/evidence/hlr.schema.json
# cargo-evidence — High-Level Requirements. One per load-bearing
# invariant the tool enforces. Each HLR traces_to exactly one SYS UID;
# tool-internal HLRs with no System parent would leave traces_to empty,
# but every entry in this file currently has a System allocation.

[schema]
version = "0.0.3"

[meta]
document_id = "TOOL-HLR"
revision = "1.0"

# -------------------------------------------------------------------
# Diagnostic format contract (Schema Rules 1–10 in
# schemas/diagnostic.schema.json). All allocated under SYS-002.
# -------------------------------------------------------------------

[[requirements]]
uid = "22222222-2222-4222-8222-000000000001"
id = "HLR-001"
title = "Every --format=jsonl run emits exactly one terminal event"
owner = "tool"
scope = "component"
traces_to = ["11111111-1111-4111-8111-000000000002"]
description = """
Schema Rule 1: the last JSONL line on stdout has a code ending in _OK
(exit 0), _FAIL (exit 2), or _ERROR (exit 1). Every run — including
runtime faults — emits exactly one terminal so reader code can detect
stream truncation.
"""
verification_methods = ["test"]

[[requirements]]
uid = "22222222-2222-4222-8222-000000000002"
id = "HLR-002"
title = "stdout under --format=jsonl is strict JSONL"
owner = "tool"
scope = "component"
traces_to = ["11111111-1111-4111-8111-000000000002"]
description = """
Schema Rule 2: under --format=jsonl, every stdout line parses as a JSON
object. Human progress text, tracing logs, and error prose live on
stderr only. Stderr on the JSONL error path is silent so agents
reading both streams don't see duplicate error data.
"""
verification_methods = ["test"]

[[requirements]]
uid = "22222222-2222-4222-8222-000000000003"
id = "HLR-003"
title = "Diagnostic codes are locked: unique + regex + exhaustive"
owner = "tool"
scope = "component"
traces_to = ["11111111-1111-4111-8111-000000000002"]
description = """
Schema Rule 3: every DiagnosticCode::code return matches
^[A-Z][A-Z0-9]*(_[A-Z0-9]+)*$, every code is unique across the
library, and the match inside each impl is exhaustive (a new variant
without a code fails to compile).
"""
verification_methods = ["test"]

[[requirements]]
uid = "22222222-2222-4222-8222-000000000004"
id = "HLR-004"
title = "Terminal suffixes are reserved"
owner = "tool"
scope = "component"
traces_to = ["11111111-1111-4111-8111-000000000002"]
description = """
Schema Rule 1 (suffix clause): _OK, _FAIL, _ERROR are terminal-only.
No DiagnosticCode impl may return a code ending in these suffixes;
the set of hand-emitted terminals is fixed by TERMINAL_CODES and
enforced by diagnostic_codes_locked (disjointness + reserved-suffix
containment in both directions).
"""
verification_methods = ["test"]

[[requirements]]
uid = "22222222-2222-4222-8222-000000000005"
id = "HLR-005"
title = "FixHint is forward-compatible"
owner = "tool"
scope = "component"
traces_to = ["11111111-1111-4111-8111-000000000002"]
description = """
Schema Rule 6: a JSONL consumer written against this schema must
tolerate unknown FixHint `kind` values. Unknown kinds deserialize as
FixHint::Other via #[serde(other)]; adding a FixHint variant in a
later release does not break existing agents.
"""
verification_methods = ["test"]

# -------------------------------------------------------------------
# Bundle generation pipeline. Allocated under SYS-001 (verifiable) and
# SYS-003 (cross-host reproducibility).
# -------------------------------------------------------------------

[[requirements]]
uid = "22222222-2222-4222-8222-000000000006"
id = "HLR-006"
title = "Capture atomic git snapshot at start"
owner = "tool"
scope = "component"
traces_to = ["11111111-1111-4111-8111-000000000001"]
description = """
Generate captures the git SHA, branch, and dirty status once at the
start of the run and re-checks the SHA at finalize. Downstream steps
read from the captured snapshot, not from fresh git queries, so a
HEAD move mid-run cannot create a bundle that mixes two commits.
"""
verification_methods = ["test"]

[[requirements]]
uid = "22222222-2222-4222-8222-000000000007"
id = "HLR-007"
title = "Capture deterministic environment fingerprint"
owner = "tool"
scope = "component"
traces_to = ["11111111-1111-4111-8111-000000000003"]
description = """
Generate records rustc version, cargo version, target triple, host
metadata, Cargo.lock hash, rust-toolchain.toml, and RUSTFLAGS into
env.json. Under cert / record profiles, missing rustc or cargo probes
abort with a strict error rather than recording 'unknown'.
"""
verification_methods = ["test"]

[[requirements]]
uid = "22222222-2222-4222-8222-000000000008"
id = "HLR-008"
title = "Write SHA256SUMS with deterministic ordering"
owner = "tool"
scope = "component"
traces_to = ["11111111-1111-4111-8111-000000000001"]
description = """
The content-layer file (SHA256SUMS) lists every hashed bundle file
with its SHA-256 digest, sorted by path with forward-slash separators
regardless of host. BTreeMap collection enforces deterministic key
order; no HashMap-driven nondeterminism is allowed.
"""
verification_methods = ["test"]

[[requirements]]
uid = "22222222-2222-4222-8222-000000000009"
id = "HLR-009"
title = "Emit deterministic-manifest.json projection"
owner = "tool"
scope = "component"
traces_to = ["11111111-1111-4111-8111-000000000003"]
description = """
deterministic-manifest.json is a host-independent projection of
env.json covering only toolchain + source identity. Its SHA-256 is
recorded in index.json.deterministic_hash; cross-host parity is
asserted in CI via determinism-compare.
"""
verification_methods = ["test"]

[[requirements]]
uid = "22222222-2222-4222-8222-000000000010"
id = "HLR-010"
title = "Finalize re-checks git SHA (TOCTOU guard)"
owner = "tool"
scope = "component"
traces_to = ["11111111-1111-4111-8111-000000000005"]
description = """
At finalize time the builder re-queries git HEAD and compares against
the snapshot taken at start. On mismatch, BuilderError::Toctou aborts
the run so no bundle is ever emitted that describes 'the commit at
start' while referencing a different HEAD state.
"""
verification_methods = ["test"]

# -------------------------------------------------------------------
# Verification pipeline. Allocated under SYS-001.
# -------------------------------------------------------------------

[[requirements]]
uid = "22222222-2222-4222-8222-000000000011"
id = "HLR-011"
title = "Verify detects hash mismatch for every hashed file"
owner = "tool"
scope = "component"
traces_to = ["11111111-1111-4111-8111-000000000001"]
description = """
verify_bundle recomputes the SHA-256 of every file listed in
SHA256SUMS and emits VERIFY_HASH_MISMATCH for each mismatch. A file
present in the bundle but missing from SHA256SUMS triggers
VERIFY_UNEXPECTED_FILE; a listed file missing from the bundle
triggers VERIFY_MISSING_HASHED_FILE.
"""
verification_methods = ["test"]

[[requirements]]
uid = "22222222-2222-4222-8222-000000000012"
id = "HLR-012"
title = "Verify enforces env.json ↔ index.json consistency"
owner = "tool"
scope = "component"
traces_to = ["11111111-1111-4111-8111-000000000001"]
description = """
Fields duplicated across env.json and index.json (profile, git_sha,
git_branch, git_dirty) must agree. A disagreement emits
VERIFY_CROSS_FILE_INCONSISTENCY naming the field and both values so a
reviewer can root-cause the divergence.
"""
verification_methods = ["test"]

[[requirements]]
uid = "22222222-2222-4222-8222-000000000013"
id = "HLR-013"
title = "Verify enforces DAL-map ↔ compliance consistency"
owner = "tool"
scope = "component"
traces_to = ["11111111-1111-4111-8111-000000000004"]
description = """
index.json.dal_map[crate] must equal compliance/<crate>.json.dal for
the same crate, and every DAL-mapped crate must have a compliance
report (and vice versa). Mismatches emit VERIFY_DAL_MAP_MISMATCH or
VERIFY_DAL_MAP_ORPHAN.
"""
verification_methods = ["test"]

[[requirements]]
uid = "22222222-2222-4222-8222-000000000014"
id = "HLR-014"
title = "Verify enforces trace_outputs are in SHA256SUMS"
owner = "tool"
scope = "component"
traces_to = ["11111111-1111-4111-8111-000000000001"]
description = """
Every path in index.json.trace_outputs must also appear in
SHA256SUMS. An index-only reference overclaims coverage because the
referenced file would not be integrity-checked; verify surfaces that
as VERIFY_TRACE_OUTPUT_NOT_HASHED.
"""
verification_methods = ["test"]

[[requirements]]
uid = "22222222-2222-4222-8222-000000000015"
id = "HLR-015"
title = "Strict-mode verify requires BUNDLE.sig"
owner = "tool"
scope = "component"
traces_to = ["11111111-1111-4111-8111-000000000005"]
description = """
Under --strict verify, a bundle without BUNDLE.sig and no --verify-key
is a verification failure. The JSONL path emits
VERIFY_STRICT_SIGNATURE_MISSING + VERIFY_FAIL terminal, exit 2.
"""
verification_methods = ["test"]

# -------------------------------------------------------------------
# CLI surface. Allocated under SYS-002 (machine-readable stream),
# SYS-004 (policy-gated), SYS-005 (refusal on integrity unmet).
# -------------------------------------------------------------------

[[requirements]]
uid = "22222222-2222-4222-8222-000000000016"
id = "HLR-016"
title = "Exit codes map to terminal events"
owner = "tool"
scope = "component"
traces_to = ["11111111-1111-4111-8111-000000000002"]
description = """
Per Schema Rule 1, exit 0 ⟺ last JSONL line _OK, exit 2 ⟺ _FAIL,
exit 1 ⟺ _ERROR. Runtime faults emit the runtime finding followed by
the _ERROR terminal before returning EXIT_ERROR.
"""
verification_methods = ["test"]

[[requirements]]
uid = "22222222-2222-4222-8222-000000000017"
id = "HLR-017"
title = "--format resolution folds legacy --json"
owner = "tool"
scope = "component"
traces_to = ["11111111-1111-4111-8111-000000000002"]
description = """
OutputFormat::resolve honors an explicit --format over the legacy
--json bool; absent --format, --json is treated as --format=json
(Schema Rule 5 — permanent alias, no deprecation).
"""
verification_methods = ["test"]

[[requirements]]
uid = "22222222-2222-4222-8222-000000000018"
id = "HLR-018"
title = "schema show diagnostic prints the embedded source"
owner = "tool"
scope = "component"
traces_to = ["11111111-1111-4111-8111-000000000002"]
description = """
`cargo evidence schema show diagnostic` writes
schemas/diagnostic.schema.json to stdout verbatim. `schema validate`
deliberately does not recognize diagnostic files by filename
(Schema Rule 9).
"""
verification_methods = ["test"]

[[requirements]]
uid = "22222222-2222-4222-8222-000000000019"
id = "HLR-019"
title = "trace --validate enforces cross-tier links"
owner = "tool"
scope = "component"
traces_to = ["11111111-1111-4111-8111-000000000004"]
description = """
validate_trace_links_with_policy enforces: every traces_to UID
resolves to an existing entry of the expected kind; ownership rules
for HLR→SYS, LLR→HLR, TEST→LLR; UUID syntax; uniqueness of every
(kind, owner, id) triple. Orphan tests emit warnings; other
violations fail.
"""
verification_methods = ["test"]

[[requirements]]
uid = "22222222-2222-4222-8222-000000000020"
id = "HLR-020"
title = "Dispatch guards unwired --format=jsonl subcommands"
owner = "tool"
scope = "component"
traces_to = ["11111111-1111-4111-8111-000000000002"]
description = """
Passing --format=jsonl to a subcommand without native JSONL support
emits CLI_UNSUPPORTED_FORMAT + CLI_SUBCOMMAND_ERROR terminal (with
the subcommand name in a dedicated field), exits 1, and leaves
stderr silent — never silently degrades to mixed human/JSON text on
stdout.
"""
verification_methods = ["test"]
