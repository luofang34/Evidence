id = "HLR-031"
title = "Every code is claimed by an LLR via LLR.emits"
owner = "tool"
scope = "component"
description = """
An LLR entry field `emits: Vec<String>` declares which diagnostic
codes that LLR is responsible for. A locked-codes invariant asserts
the union of `emits` across all LLRs equals the RULES set (minus an
explicit `reserved_unclaimed` enumeration which must be empty or
justified in source comments), and that every `emits` entry names a
real RULES code. This is the link that closes the code-test-
