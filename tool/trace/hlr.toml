`Lower-Floor: <dimension> <reason>` line in the PR body (or commit
message, on direct-to-main push). Without the line, the lint emits
FLOORS_LOWERED_WITHOUT_JUSTIFICATION and fails the build. Mirrors
the deterministic-baseline override pattern sketched in PR #49.
"""
