[[requirements]]
uid = "a289fe83-d842-4708-b920-39cbcebd1aa1"
id = "SYS-009"
title = "Tool ratchets its own rigor floors — no silent regression"
owner = "soi"
scope = "soi"
description = """
The tool shall commit an absolute floor for every dimension along
which it ratchets its own rigor (diagnostic codes, terminal codes,
per-layer trace entry counts, #[test] count, bijection-invariant
count), plus a delta ceiling for dimensions where any new addition
is a regression (dead-code allows, library-code panics). A CI gate
shall fail any change that lowers a measurement below its committed
floor or exceeds a committed ceiling. Lowering a floor shall require
an explicit written justification; silent ratchet-reversal shall be
mechanically impossible.
"""
verification_methods = ["test"]
traces_to = []

[[requirements]]
uid = "731cb43a-a9d1-43f8-8678-fc97db81162e"
id = "SYS-010"
title = "Trace layer shall support genuine decomposition beyond 1:1:1"
owner = "soi"
scope = "soi"
description = """
The tool's own trace schema shall express (a) lateral mapping from
HLRs to user-visible behaviors (CLI verbs + observable contracts),
(b) N:M test-to-requirement associations, and (c) explicitly-marked
derived requirements with written rationale per DO-178C §5.2.2. A
1:1:1 HLR:LLR:TEST graph is not evidence of decomposition; the
schema shall refuse to present such a graph as sufficient without
the supporting machinery.
"""
verification_methods = ["test"]
traces_to = []

[[requirements]]
uid = "5e9988ce-1351-4e39-98af-835e96e5fc17"
id = "SYS-011"
title = "Diagnostic stream shall expose structured codes per Link-phase failure, not an opaque prose envelope"
owner = "soi"
scope = "soi"
description = """
Every Link-phase validation rule (surface bijection, derived-
rationale, dangling-link, ownership-violation, duplicate-uid, etc.)
shall surface as a distinct diagnostic code in the JSONL stream, so
agents and auditors can disambiguate violations by `code` rather
than by pattern-matching prose payloads. Bundling heterogeneous
rule failures under a single wrapper code (e.g. `TRACE_LINK_FAILED`
with a concatenated message) regresses to the pre-typed-diagnostic
shape the whole diagnostic-codes arc was built to eliminate.
"""
verification_methods = ["test"]
traces_to = []

[[requirements]]
uid = "94cb54a1-53a0-40e3-81a1-e3e8d231b0e7"
id = "SYS-012"
title = "Tool source shall be free of rot-prone context markers (PR-number breadcrumbs, absolute line counts, time-pinned narrative)"
owner = "soi"
scope = "soi"
description = """
Docstring comments with short-lived context markers — PR-number
breadcrumbs (`PR #49 removed ...`), absolute line counts
(`sits at ~497 lines`), time-pinned narrative (`post-PR-#51`),
review-round markers (`round-1 / round-2`) — are stale by the next
PR touching the same file. Reviewers stop trusting them; new
contributors read them as current context and spread
misinformation. The tool's source shall be mechanically free of
this class, enforced by a CI integration test that walks every
`.rs` file under `crates/**/{src,tests}/**` and fails on any
banned pattern. If a caution is genuinely load-bearing, encode it
as a test (file-size limit, bijection, strict-floor equality); if
it's narrative, it belongs in the commit message, not the code.
"""
verification_methods = ["test"]
traces_to = []

[[requirements]]
uid = "3596cc7b-d8ce-46fb-8a92-62c55a40758b"
id = "SYS-013"
title = "The deterministic_hash of the tool's own bundle shall stay stable across time between PR-boundary checkpoints, with silent drift mechanically prevented"
owner = "soi"
scope = "soi"
description = """
Cross-host determinism (SYS-003, landed) proves that N hosts
building the SAME commit produce the same `deterministic_hash` at
a SINGLE point in time. It doesn't catch drift across time —
dependency lock-file changes, toolchain bumps, RUSTFLAGS
adjustments, or any edit to a determinism-affecting input in a
PR. The tool shall detect when the current PR's
`deterministic_hash` diverges from the last successful
main-branch build and block the PR unless an explicit override
line (`Override-Deterministic-Baseline: <reason>`) appears in the
PR body. This turns silent determinism drift into a
mechanically-refused regression, preserving the reproducibility
contract on which the bundle's audit value depends.

Known limitation: the live-compare gate catches per-PR drift by
comparing the current PR to the last successful main-branch
build, but it does NOT catch slow cumulative drift across many
PRs each of which carries its own justified override. An
auditor reconstructing the bundle six months later sees the
current reproducibility inputs, not the chain of intentional
overrides that led there. A committed-baseline anchor file
pinning specific historical commits (tip-of-main at
milestone N) is the follow-up that closes this gap and is
tracked explicitly in the development plan — not rolled into
this contract, because the two enforcement surfaces have
different operational shapes.
"""
verification_methods = ["test"]
traces_to = []

[[requirements]]
uid = "b1ddaec0-7981-491e-910f-6d04e1888f63"
id = "SYS-014"
title = "Every narrative trace-ID reference (SYS/HLR/LLR/TEST/DERIVED-NNN) in source and docs shall resolve to a real entry in tool/trace/"
owner = "soi"
scope = "soi"
description = '''
PR #52 preserved `LLR-NNN` / `HLR-NNN` / `TEST-NNN` / `SYS-NNN` /
`DERIVED-NNN` identifiers as human-readable anchors — they carry
semantic structure (`LLR-026` says "low-level requirement #26,
look in llr.toml") and replacing them with UUIDs in narrative
would trade readability for theoretical purity. But narrative
anchors aren't validated today: a deleted LLR leaves every
comment referencing it pointing at a ghost; a renumbered entry
breaks cross-file pointers silently. The existing PR #47
bijection covers `LLR.emits ⇔ RULES` — a narrower axis than
"comments and docs reference real trace items." The tool shall
mechanically assert that every `(SYS|HLR|LLR|TEST|DERIVED)-\d+`
reference in `.rs` / `.md` / non-`tool/trace` `.toml` sources
resolves to an `id` field in the corresponding trace file,
failing CI with the offending `file:line` pairs when a reference
becomes stale.
'''
verification_methods = ["test"]
traces_to = []

[[requirements]]
uid = "18188b31-f01d-4902-97a2-4b981b50a1ad"
id = "SYS-015"
title = "The tool shall mechanically prevent hand-rolled recursive fs::read_dir walkers across its own source"
owner = "soi"
scope = "soi"
description = """
Multiple independent recursive `fs::read_dir` walkers accumulated
across the tool's own source (five test-side walkers plus two
production walkers, each with subtly different skip-list rules
and no shared `follow_links(false)` pin). Divergence is invisible
to the test suite as long as each walker passes on the current
tree, but small drift — e.g. a walker that follows symlinks
where its neighbors don't — opens a path for a measurement in
one walker to disagree with a measurement in another for the
same input. `walkdir::WalkDir` is already a production
dependency; the tool shall use it project-wide for every
recursive file-tree traversal, with a CI-enforced gate that
fires on any new hand-rolled `fs::read_dir` outside a
reviewer-visible allowlist of single-directory non-recursive
uses.
"""
verification_methods = ["test"]
traces_to = []

[[requirements]]
uid = "abba0183-f506-4fe5-81d1-afdc3bcac1ca"
id = "SYS-016"
title = "The tool shall provide a mechanical rigor-audit subcommand that blocks cert-profile bundle generation on any FAIL finding"
owner = "soi"
scope = "soi"
description = """
cargo-evidence's internal discipline — the Override-Deterministic-
Baseline protocol, the floors ratchet, walker standardization,
the locked-test ecology, merge-style assumptions — lives in this
repo's CI + CLAUDE.md and is effectively invisible to downstream
projects that `cargo install cargo-evidence`. A downstream team
gets the CLI and the scaffolding (`init`) but not the mechanisms
that make the tool's own evidence trustworthy, so cert bundles
can be produced under DO-178C with none of the discipline the
tool applies to itself.

The tool shall ship a `doctor` subcommand that runs a mechanical
checklist (trace validity, floors config, boundary config, CI
integration, merge-style policy, override-protocol docs) against
the caller's repo and emits one typed Diagnostic per check with
a single terminal event (`DOCTOR_OK` / `DOCTOR_FAIL`). The
`generate` subcommand in cert / record profile shall invoke
doctor before bundle assembly and abort on any FAIL — producing
a cert-profile bundle shall be mechanically impossible without
passing the audit. No opt-out short of editing cargo-evidence
itself, which is visible in the bundle's `engine_git_sha`.
"""
verification_methods = ["test"]
traces_to = []

[[requirements]]
uid = "2758e039-4943-4a9a-ad3d-9e0b0d0da7d8"
id = "SYS-017"
title = "Bundles produced by a pre-release build of the tool shall be mechanically rejected as cert/record evidence"
owner = "soi"
scope = "soi"
description = """
The tool ships in two flavors: release (`cargo install
cargo-evidence --version '=X.Y.Z'`) and pre-release
(`cargo install cargo-evidence --version '<1.0.0-z'`) — the
latter covers `-pre`, `-alpha`, `-beta`, `-rc`, `-dev` semver
suffixes. Downstream contributors and agents need to trial the
full `generate → verify` loop against a pre-release build
(install friction is the same), but the output of that trial
must never be usable as real audit evidence: a cert-level
auditor reading a bundle alone must see a structured flag
(not just a version string requiring human parsing) and the
verify command must refuse such bundles loud.

The tool shall embed a `tool_prerelease: bool` field in every
bundle's `env.json`, set from `env!("CARGO_PKG_VERSION")` at
build time (any `-` suffix = pre-release per semver §9). The
`verify` subcommand under `--profile cert` / `record` shall
emit `VERIFY_PRERELEASE_TOOL` as an error-severity finding and
fail with `VERIFY_FAIL` whenever the bundle carries
`tool_prerelease = true`; dev profile shall emit the same code
at warning severity and still pass. The `generate` subcommand
in cert/record profile shall additionally emit a warning-
severity `VERIFY_PRERELEASE_TOOL` at bundle-assembly time so
the user knows the bundle they are producing will fail its own
verify. No opt-out short of editing the tool (visible in
`engine_git_sha`).
"""
verification_methods = ["test"]
traces_to = []

[[requirements]]
uid = "385c2c4c-748c-4486-bd8c-7622b12c9273"
id = "SYS-018"
title = "Agent-facing verbs shall be callable over the Model Context Protocol without shelling out"
owner = "soi"
scope = "soi"
description = """
The agent-facing verbs (`check`, `rules`, `doctor`) are the
tool's high-frequency surface (principle 5 of the plan). Today
agents call them by spawning `cargo evidence <verb>
--format=jsonl`, re-parsing stdout, and carrying exit-code
semantics in their prompt. That plumbing belongs in the tool,
not in the agent host.

The tool shall expose the same three verbs as MCP tool calls
over stdio so that Claude Desktop, Claude Code, and any other
MCP-speaking host can register them via `claude mcp add` and
invoke them as schema-validated first-class tool calls with
structured responses. The MCP surface shall not introduce new
diagnostic vocabulary — it is a pass-through wrapper whose
responses contain the same `Diagnostic` events already emitted
by the CLI (plus a per-call `exit_code` + `terminal` for
convenience). `verify` shall not be exposed — it is a
low-level primitive reserved for CI scripts and debugging, and
`check` wraps it in bundle mode.
"""
verification_methods = ["test"]
traces_to = []

[[requirements]]
uid = "8069de78-71cc-4acb-a1f8-9e3519ccf1ce"
id = "SYS-019"
title = "Bundle shall contain per-test outcome records, not just a workspace-aggregate pass/fail"
owner = "soi"
scope = "soi"
description = """
An auditor asking "show me the result of TEST-046" must get
atoms — one record per actual test run — not a workspace-level
"all tests passed" aggregate. DO-178C Annex A Table A-7
Objective 3 requires "Test results documented"; "exit codes
only" is not documented test results. Today
`CrateEvidence.tests_passed: Option<bool>` carries the whole
workspace outcome in one bit; there is no atomic way to show
that a given `test_selector` resolved to a specific pass/fail
outcome.

The tool shall emit `tests/test_outcomes.jsonl` inside the
bundle with one line per test: name, module path, pass/fail
status, ignored flag, and — on failure — the panic/assertion
message captured from libtest's failure block. The shape
reserves an `Option<u64>` for per-test duration so a future
timing source (nightly libtest or nextest) can populate it
without a wire break. LLR `test_selectors` resolve not just
syntactically (does the function exist?) but outcomally (did
it pass this run?).
"""
verification_methods = ["test"]
traces_to = []

[[requirements]]
uid = "5478751b-b547-49b7-b2fc-ae3963668a81"
id = "SYS-020"
title = "Bundle shall carry bidirectional requirement ↔ test traceability at atom level"
owner = "soi"
scope = "soi"
description = """
DO-178C Annex A Table A-6 Obj-3 ("Test cases selected based on
normal range of operation" / Obj-4 "Test cases selected based
on robustness") requires demonstrating that each test case is
linked to a specific requirement AND that each requirement has
at least one verifying test case. Forward linkage (test →
requirement) alone is insufficient: a dangling LLR with
`test_selectors = ["foo::bar"]` but no `#[test] fn foo::bar`
silently passes a test-selector syntactic check at trace-
validate time, then produces zero test-outcome records that
claim this LLR — invisible to auditors reading
`tests/test_outcomes.jsonl`.

The tool shall emit per-test outcome records tagged with the
LLR UIDs each test verifies (`requirement_uids: Vec<String>`
on `TestOutcomeRecord`), AND verify shall reject a bundle
whose recorded LLRs have `verification_methods` including
`"test"` but whose `uid` appears in no record's
`requirement_uids`. The two halves close the loop.
"""
verification_methods = ["test"]
traces_to = []

[[requirements]]
uid = "5c6e07f1-da4a-4aec-9647-426304deadb5"
id = "SYS-021"
title = "Bundle shall carry structural coverage evidence when cert profile is used"
owner = "soi"
scope = "soi"
description = """
DO-178C Annex A Table A-7 Obj-5 ("Test coverage of software
structure — statement coverage") and Obj-6 ("Test coverage of
software structure — decision coverage") require structural
coverage measurements at DAL-C (Obj-5) and DAL-B (Obj-5 + 6).
Without a coverage artifact in the bundle, an auditor has no
mechanical way to confirm that the test suite exercises every
executable statement / branch; the cert submission would rely
on verbal assertion, which does not satisfy DO-178C §6.4.4.

The tool shall, on demand, run an instrumented test pass and
emit a structured coverage report inside the bundle
(`coverage/coverage_summary.json` + `coverage/lcov.info`)
covering statement-level line data and, when requested, branch
data. The wire schema shall reserve shape for pattern-decision
and MC/DC additions without breaking consumers.

MC/DC measurement is explicitly out of scope for the stable-
Rust implementation — rust-lang/rust#124144 is nightly-only
and incomplete. DAL-A MC/DC evidence, when needed, must come
from an auxiliary qualified tool and is tracked separately.
"""
verification_methods = ["test"]
traces_to = []

[[requirements]]
uid = "f1db3aa6-e745-4770-abeb-fe90be4e0cb4"
id = "SYS-022"
title = "Agent-facing tool surfaces shall refuse silent typos and surface fallback path resolution"
owner = "soi"
scope = "soi"
description = """
An LLM agent calling the MCP wrapper with a typo'd argument field
(e.g. `{"workspace": "..."}` instead of `{"workspace_path": "..."}`)
or an omitted field must not silently succeed against an
unintended workspace. Silently dropping unknown fields or
defaulting to the server's CWD both produce "successful" runs
about the wrong project — a critical-class agent-trust failure
where typos yield green answers. The tool shall (a) reject
unknown MCP argument fields with a clear error, and (b) surface
an observable diagnostic when a request falls back to the
server's CWD due to an omitted workspace_path.
"""
verification_methods = ["test"]
traces_to = []

[[requirements]]
uid = "f5aac59f-9dbd-48f7-80d1-2e1cc1a2fdd1"
id = "SYS-023"
title = "Trace validation shall resolve references to every configured requirement layer, not a subset"
owner = "soi"
scope = "soi"
description = """
`tool/trace/derived.toml` is one of the four requirement-kind
files cargo-evidence templates via `cargo evidence init`. A
trace-validate run that silently drops derived requirements
leaves cross-file `traces_to` pointing at derived UIDs as
dangling false-positives — the tool's validation covers only a
subset of the declared trace surface while presenting as if it
covered the whole. Downstream DAL-C+ projects building derived
requirements into their chain get a spurious clean verdict on
broken link structure.

The tool shall load every requirement-kind file the init
template writes and include them in the Link-phase validation
run. Gaps in coverage (one kind loaded but ignored at validate)
are equivalent to silently-lying about rigor.
"""
verification_methods = ["test"]
traces_to = []

[[requirements]]
uid = "895097b2-6d08-4ef7-9305-143a87424684"
id = "SYS-024"
title = "Tool shall enforce DO-178C A-7 minimum coverage percentages per DAL"
owner = "soi"
scope = "soi"
description = """
SYS-021 requires a coverage artifact to land in the bundle.
That ensures the auditor can see the numbers; it does not
ensure the numbers meet DAL minima. Without mechanical
enforcement, a bundle can claim DAL-B compliance while
carrying 50% branch coverage — the auditor is expected to
catch the gap by hand, which degrades back to verbal
assertion.

SYS-024 closes that gap: on `Profile::Cert` / `Profile::Record`,
the tool compares each measurement level's aggregate against
`Dal::coverage_thresholds()` and refuses to finalize the
bundle when any level falls short. The structured diagnostic
`COVERAGE_BELOW_THRESHOLD { dimension, current, threshold }`
carries enough detail that the operator can see which
specific minimum was missed, without reading the full
coverage JSON. Dev profile continues to emit the artifact but
never blocks, so downstream exploratory runs keep working.

The pre-#82 `[dal.objectives]` override design was rejected in
favour of this surface (see plan Q2) because per-objective
manual overrides let downstream forks silently relax A-7;
SYS-024 keeps the minima centralized in `Dal::coverage_thresholds`
and the enforcement path in a single `threshold_violations`
dispatcher.
"""
verification_methods = ["test"]
traces_to = []

[[requirements]]
uid = "71c07b24-9d90-4ad5-ae9a-a7c2fe55c93c"
id = "SYS-025"
title = "Tool's downstream-audit surfaces shall derive trace policy from the max DAL across per-crate overrides"
owner = "soi"
scope = "soi"
description = """
DO-178C DAL is a per-object attribute; different crates in one
workspace can target different levels. The tool's
`cert/boundary.toml` encodes this via `[dal]
default_dal` + `[dal.crate_overrides]`. For any verification
surface that applies a single trace policy to the project (e.g.
`cargo evidence doctor`), "which DAL policy" must be resolved
to the *highest* level in use — not the default.

Failure mode this defends: a project sets `default_dal = "D"`
broadly but overrides one crate (payment gateway, safety
kernel) to DAL-A. If the audit surface derives its trace policy
from `default_dal` alone, the DAL-A crate's stricter rules
(require_hlr_sys_trace, require_derived_rationale, …) are
silently skipped. The auditor sees doctor green at DAL-D while
the DAL-A crate's chain has unenforced gaps. This is an
agent-trust / auditor-trust hole: the reported rigor level is
lower than what any in-scope component actually targets.

Resolution: audit surfaces compute the max DAL over the
dal_map (every in-scope crate mapped to its effective DAL),
falling back to `default_dal` only when `in_scope` is empty,
and to `Dal::D` only when boundary.toml is unloadable. Mirrors
the `cli::check` pattern; SYS-025 extends the obligation to the
doctor surface.
"""
verification_methods = ["test"]
traces_to = []

[[requirements]]
uid = "1eaaa60c-e8e0-4209-8ca5-51108495df61"
id = "SYS-026"
title = "Compliance claims shall reflect the actual outcome of the supporting check, not a hardcoded assumption"
owner = "soi"
scope = "soi"
description = """
A DO-178C compliance claim ("A3-6 Met: traceability passes")
is only cert-defensible if the tool's state at claim-time
actually matches the claim. Hardcoding the trace-validation
verdict into the compliance report disconnects the claim from
the observable: a run whose trace validation warned-and-
continued still ships a bundle whose compliance JSON says
"Met" — the audit surface reports one answer while the
underlying state says another.

SYS-026 closes that class of drift: every supporting-check
result that feeds a compliance objective's status must be
threaded from the producing phase to the compliance-writing
phase, not substituted with a literal. Covers the
trace-validation → A3-6/A4-6 feed today (fixed in LLR-061);
same principle applies to future checks feeding Table-A
objectives.

The failure mode this defends is more subtle than a missing
check — the check exists and runs, but its outcome is
dropped on the floor. Type-level enforcement (the compliance-
writing function takes the bool as a required parameter) is
the load-bearing guard against regression.
"""
verification_methods = ["test"]
traces_to = []

[[requirements]]
uid = "95610f58-a5c7-4a63-a96b-f18f74d6471a"
id = "SYS-027"
title = "Tool's MCP server shall advertise its own identity in the initialize handshake"
owner = "soi"
scope = "soi"
description = """
MCP's `initialize` response carries a `serverInfo.{name, version}`
block that agents use to identify the server they've connected
to. The default identity supplied by the `rmcp` framework
(`rmcp 1.5.0`, read from rmcp's own crate env) is
indistinguishable across every server built on rmcp —
evidence-mcp, some other cert tool, a hobby MCP server, all
report as "rmcp". An agent with multiple MCP servers cannot
route requests by server identity and cannot surface which tool
is actually running in a user-facing "connected to ..." string.

SYS-027 closes that class of ambiguity: every agent-facing MCP
surface this tool ships shall return its own crate name and
version in `serverInfo`, not the framework's default. Today
that's evidence-mcp; any future MCP surface added to the
workspace inherits the same obligation.

Failure mode this defends: rmcp 1.x.y default makes the tool
look like any other rmcp-built server. Agents pattern-matching
on `serverInfo.name` to gate tool-specific workflows (e.g.
"if the server is evidence-mcp, run the certification
pipeline") silently fall through, or worse, invoke the wrong
tool's verb-set.
"""
verification_methods = ["test"]
