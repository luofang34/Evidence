id = "SYS-008"
title = "Tool self-describes its diagnostic vocabulary and refuses contract drift"
owner = "soi"
scope = "soi"
description = """
The tool shall expose a machine-readable manifest of every diagnostic
code it can emit (`cargo evidence rules --json`) and mechanically
enforce three-way consistency between source code, requirements, and
committed wire fixtures. Every advertised code must be declared in
the manifest, claimed by a named requirement, tested against a real
function, and pinned against a byte-exact wire fixture. Silent drift
in any of those dimensions shall fail CI.
"""
verification_methods = ["test"]
traces_to = []

[[requirements]]
uid = "a289fe83-d842-4708-b920-39cbcebd1aa1"
id = "SYS-009"
title = "Tool ratchets its own rigor floors — no silent regression"
owner = "soi"
scope = "soi"
description = """
The tool shall commit an absolute floor for every dimension along
which it ratchets its own rigor (diagnostic codes, terminal codes,
per-layer trace entry counts, #[test] count, bijection-invariant
count), plus a delta ceiling for dimensions where any new addition
is a regression (dead-code allows, library-code panics). A CI gate
shall fail any change that lowers a measurement below its committed
floor or exceeds a committed ceiling. Lowering a floor shall require
an explicit written justification; silent ratchet-reversal shall be
mechanically impossible.
"""
verification_methods = ["test"]
traces_to = []

[[requirements]]
uid = "731cb43a-a9d1-43f8-8678-fc97db81162e"
id = "SYS-010"
title = "Trace layer shall support genuine decomposition beyond 1:1:1"
owner = "soi"
scope = "soi"
description = """
The tool's own trace schema shall express (a) lateral mapping from
HLRs to user-visible behaviors (CLI verbs + observable contracts),
(b) N:M test-to-requirement associations, and (c) explicitly-marked
derived requirements with written rationale per DO-178C §5.2.2. A
1:1:1 HLR:LLR:TEST graph is not evidence of decomposition; the
schema shall refuse to present such a graph as sufficient without
the supporting machinery.
"""
verification_methods = ["test"]
traces_to = []

[[requirements]]
uid = "5e9988ce-1351-4e39-98af-835e96e5fc17"
id = "SYS-011"
title = "Diagnostic stream shall expose structured codes per Link-phase failure, not an opaque prose envelope"
owner = "soi"
scope = "soi"
description = """
Every Link-phase validation rule (surface bijection, derived-
rationale, dangling-link, ownership-violation, duplicate-uid, etc.)
shall surface as a distinct diagnostic code in the JSONL stream, so
agents and auditors can disambiguate violations by `code` rather
than by pattern-matching prose payloads. Bundling heterogeneous
rule failures under a single wrapper code (e.g. `TRACE_LINK_FAILED`
with a concatenated message) regresses to the pre-typed-diagnostic
shape the whole diagnostic-codes arc was built to eliminate.
"""
verification_methods = ["test"]
traces_to = []

[[requirements]]
uid = "94cb54a1-53a0-40e3-81a1-e3e8d231b0e7"
id = "SYS-012"
title = "Tool source shall be free of rot-prone context markers (PR-number breadcrumbs, absolute line counts, time-pinned narrative)"
owner = "soi"
scope = "soi"
description = """
Docstring comments with short-lived context markers — PR-number
breadcrumbs (`PR #49 removed ...`), absolute line counts
(`sits at ~497 lines`), time-pinned narrative (`post-PR-#51`),
review-round markers (`round-1 / round-2`) — are stale by the next
PR touching the same file. Reviewers stop trusting them; new
contributors read them as current context and spread
misinformation. The tool's source shall be mechanically free of
this class, enforced by a CI integration test that walks every
`.rs` file under `crates/**/{src,tests}/**` and fails on any
banned pattern. If a caution is genuinely load-bearing, encode it
as a test (file-size limit, bijection, strict-floor equality); if
it's narrative, it belongs in the commit message, not the code.
"""
verification_methods = ["test"]
traces_to = []

[[requirements]]
uid = "3596cc7b-d8ce-46fb-8a92-62c55a40758b"
id = "SYS-013"
title = "The deterministic_hash of the tool's own bundle shall stay stable across time between PR-boundary checkpoints, with silent drift mechanically prevented"
owner = "soi"
scope = "soi"
description = """
Cross-host determinism (SYS-003, landed) proves that N hosts
building the SAME commit produce the same `deterministic_hash` at
a SINGLE point in time. It doesn't catch drift across time —
dependency lock-file changes, toolchain bumps, RUSTFLAGS
adjustments, or any edit to a determinism-affecting input in a
PR. The tool shall detect when the current PR's
`deterministic_hash` diverges from the last successful
main-branch build and block the PR unless an explicit override
line (`Override-Deterministic-Baseline: <reason>`) appears in the
PR body. This turns silent determinism drift into a
mechanically-refused regression, preserving the reproducibility
contract on which the bundle's audit value depends.

Known limitation: the live-compare gate catches per-PR drift by
comparing the current PR to the last successful main-branch
build, but it does NOT catch slow cumulative drift across many
PRs each of which carries its own justified override. An
auditor reconstructing the bundle six months later sees the
current reproducibility inputs, not the chain of intentional
overrides that led there. A committed-baseline anchor file
pinning specific historical commits (tip-of-main at
milestone N) is the follow-up that closes this gap and is
tracked explicitly in the development plan — not rolled into
this contract, because the two enforcement surfaces have
different operational shapes.
"""
verification_methods = ["test"]
traces_to = []

[[requirements]]
uid = "b1ddaec0-7981-491e-910f-6d04e1888f63"
id = "SYS-014"
title = "Every narrative trace-ID reference (SYS/HLR/LLR/TEST/DERIVED-NNN) in source and docs shall resolve to a real entry in tool/trace/"
owner = "soi"
scope = "soi"
description = '''
PR #52 preserved `LLR-NNN` / `HLR-NNN` / `TEST-NNN` / `SYS-NNN` /
`DERIVED-NNN` identifiers as human-readable anchors — they carry
semantic structure (`LLR-026` says "low-level requirement #26,
look in llr.toml") and replacing them with UUIDs in narrative
would trade readability for theoretical purity. But narrative
anchors aren't validated today: a deleted LLR leaves every
comment referencing it pointing at a ghost; a renumbered entry
breaks cross-file pointers silently. The existing PR #47
bijection covers `LLR.emits ⇔ RULES` — a narrower axis than
"comments and docs reference real trace items." The tool shall
mechanically assert that every `(SYS|HLR|LLR|TEST|DERIVED)-\d+`
reference in `.rs` / `.md` / non-`tool/trace` `.toml` sources
resolves to an `id` field in the corresponding trace file,
failing CI with the offending `file:line` pairs when a reference
becomes stale.
'''
verification_methods = ["test"]
traces_to = []

[[requirements]]
uid = "18188b31-f01d-4902-97a2-4b981b50a1ad"
id = "SYS-015"
title = "The tool shall mechanically prevent hand-rolled recursive fs::read_dir walkers across its own source"
owner = "soi"
scope = "soi"
description = '''
Multiple independent recursive `fs::read_dir` walkers accumulated
across the tool's own source (five test-side walkers plus two
production walkers, each with subtly different skip-list rules
and no shared `follow_links(false)` pin). Divergence is invisible
to the test suite as long as each walker passes on the current
tree, but small drift — e.g. a walker that follows symlinks
where its neighbors don't — opens a path for a measurement in
one walker to disagree with a measurement in another for the
same input. `walkdir::WalkDir` is already a production
dependency; the tool shall use it project-wide for every
recursive file-tree traversal, with a CI-enforced gate that
fires on any new hand-rolled `fs::read_dir` outside a
reviewer-visible allowlist of single-directory non-recursive
uses.
'''
verification_methods = ["test"]
traces_to = []

[[requirements]]
uid = "abba0183-f506-4fe5-81d1-afdc3bcac1ca"
id = "SYS-016"
title = "The tool shall provide a mechanical rigor-audit subcommand that blocks cert-profile bundle generation on any FAIL finding"
owner = "soi"
scope = "soi"
description = '''
cargo-evidence's internal discipline — the Override-Deterministic-
Baseline protocol, the floors ratchet, walker standardization,
the locked-test ecology, merge-style assumptions — lives in this
repo's CI + CLAUDE.md and is effectively invisible to downstream
projects that `cargo install cargo-evidence`. A downstream team
gets the CLI and the scaffolding (`init`) but not the mechanisms
that make the tool's own evidence trustworthy, so cert bundles
can be produced under DO-178C with none of the discipline the
tool applies to itself.

The tool shall ship a `doctor` subcommand that runs a mechanical
checklist (trace validity, floors config, boundary config, CI
integration, merge-style policy, override-protocol docs) against
the caller's repo and emits one typed Diagnostic per check with
a single terminal event (`DOCTOR_OK` / `DOCTOR_FAIL`). The
`generate` subcommand in cert / record profile shall invoke
doctor before bundle assembly and abort on any FAIL — producing
a cert-profile bundle shall be mechanically impossible without
passing the audit. No opt-out short of editing cargo-evidence
itself, which is visible in the bundle's `engine_git_sha`.
'''
verification_methods = ["test"]
traces_to = []

[[requirements]]
uid = "2758e039-4943-4a9a-ad3d-9e0b0d0da7d8"
id = "SYS-017"
title = "Bundles produced by a pre-release build of the tool shall be mechanically rejected as cert/record evidence"
owner = "soi"
scope = "soi"
description = '''
The tool ships in two flavors: release (`cargo install
cargo-evidence --version '=X.Y.Z'`) and pre-release
(`cargo install cargo-evidence --version '<1.0.0-z'`) — the
latter covers `-pre`, `-alpha`, `-beta`, `-rc`, `-dev` semver
suffixes. Downstream contributors and agents need to trial the
full `generate → verify` loop against a pre-release build
(install friction is the same), but the output of that trial
must never be usable as real audit evidence: a cert-level
auditor reading a bundle alone must see a structured flag
(not just a version string requiring human parsing) and the
verify command must refuse such bundles loud.

The tool shall embed a `tool_prerelease: bool` field in every
bundle's `env.json`, set from `env!("CARGO_PKG_VERSION")` at
build time (any `-` suffix = pre-release per semver §9). The
`verify` subcommand under `--profile cert` / `record` shall
emit `VERIFY_PRERELEASE_TOOL` as an error-severity finding and
fail with `VERIFY_FAIL` whenever the bundle carries
`tool_prerelease = true`; dev profile shall emit the same code
at warning severity and still pass. The `generate` subcommand
in cert/record profile shall additionally emit a warning-
severity `VERIFY_PRERELEASE_TOOL` at bundle-assembly time so
the user knows the bundle they are producing will fail its own
verify. No opt-out short of editing the tool (visible in
`engine_git_sha`).
'''
verification_methods = ["test"]
traces_to = []
