[[requirements]]
uid = "e16aabff-6655-4405-a1eb-b32f3def85f6"
id = "SYS-001"
title = "Verifiable evidence bundle"
owner = "soi"
scope = "soi"
description = """
The tool shall produce an evidence bundle whose integrity can be
independently verified without re-invoking the tool: a sibling party
with SHA-256 + HMAC implementations and the public signing key must be
able to confirm every hashed file and the bundle envelope.
"""
verification_methods = [
    "test",
    "review",
]
traces_to = []

[[requirements]]
uid = "0e42b90f-88d7-408f-8843-0a3335279360"
id = "SYS-002"
title = "Machine-readable diagnostic stream"
owner = "soi"
scope = "soi"
description = """
The tool shall emit a structured diagnostic stream on demand
(--format=jsonl). The stream is pattern-matchable by stable codes and
terminates in a single event that determines the process exit code.
Agent consumers must not need to parse human prose.
"""
verification_methods = ["test"]
traces_to = []

[[requirements]]
uid = "ee75dd4a-972d-44e1-96dd-1bc08c8f8726"
id = "SYS-003"
title = "Cross-host reproducibility for the same commit"
owner = "soi"
scope = "soi"
description = """
Two invocations on different supported hosts against the same source
commit and same toolchain shall produce byte-equal deterministic
manifests (content_hash may differ by host-varying metadata, but
deterministic_hash shall not).
"""
verification_methods = ["test"]
traces_to = []

[[requirements]]
uid = "5af6e706-6aef-411d-811d-747633876695"
id = "SYS-004"
title = "Policy-gated evidence emission"
owner = "soi"
scope = "soi"
description = """
The tool shall refuse to emit evidence when configured boundary or DAL
policy is violated. Unimplemented policy rules enabled in boundary.toml
shall block generate rather than silently no-op.
"""
verification_methods = ["test"]
traces_to = []

[[requirements]]
uid = "31ad3334-3d64-4fff-9f7a-fe7d5c709288"
id = "SYS-005"
title = "Refusal on integrity guarantees unmet"
owner = "soi"
scope = "soi"
description = """
Under cert / record profiles the tool shall refuse to generate or
verify an evidence bundle when critical integrity guarantees cannot
be met (dirty git tree, missing toolchain probes, shallow clone,
TOCTOU-observed SHA drift, etc.).
"""
verification_methods = ["test"]
traces_to = []

[[requirements]]
uid = "daf04641-ce24-4426-9c39-9f02b6c511cf"
id = "SYS-006"
title = "Self-enforcement of the trace contract"
owner = "soi"
scope = "soi"
description = """
The tool shall enforce its own traceability contract in its own CI
pipeline: (a) every HLR in the tool's self-trace must trace up to a
System Requirement; (b) every Test entry's test_selector must resolve
to a real #[test] function; (c) the CI gate that enforces the above
must itself be asserted against regression.
"""
verification_methods = ["test"]
traces_to = []

[[requirements]]
uid = "aa13d9a6-042e-4bc9-9d9e-c191128fb857"
id = "SYS-007"
title = "Single agent-facing command reports pass/gap coverage"
owner = "soi"
scope = "soi"
description = """
The tool shall provide a single command (`cargo evidence check`) that
agents invoke to receive a structured pass/gap view of a workspace or
bundle. The command auto-detects argument shape (source tree vs
bundle), runs the appropriate validation pipeline, and streams one
diagnostic per advertised requirement so agents can pattern-match on
a stable `code` rather than parse prose.
"""
verification_methods = ["test"]
traces_to = []

[[requirements]]
uid = "589a4478-b9b6-4eb3-99aa-5e5e0c631242"
id = "SYS-008"
title = "Tool self-describes its diagnostic vocabulary and refuses contract drift"
owner = "soi"
scope = "soi"
description = """
The tool shall expose a machine-readable manifest of every diagnostic
code it can emit (`cargo evidence rules --json`) and mechanically
enforce three-way consistency between source code, requirements, and
committed wire fixtures. Every advertised code must be declared in
the manifest, claimed by a named requirement, tested against a real
function, and pinned against a byte-exact wire fixture. Silent drift
in any of those dimensions shall fail CI.
"""
verification_methods = ["test"]
traces_to = []

[[requirements]]
uid = "a289fe83-d842-4708-b920-39cbcebd1aa1"
id = "SYS-009"
title = "Tool ratchets its own rigor floors — no silent regression"
owner = "soi"
scope = "soi"
description = """
The tool shall commit an absolute floor for every dimension along
which it ratchets its own rigor (diagnostic codes, terminal codes,
per-layer trace entry counts, #[test] count, bijection-invariant
count), plus a delta ceiling for dimensions where any new addition
is a regression (dead-code allows, library-code panics). A CI gate
shall fail any change that lowers a measurement below its committed
floor or exceeds a committed ceiling. Lowering a floor shall require
an explicit written justification; silent ratchet-reversal shall be
mechanically impossible.
"""
verification_methods = ["test"]
traces_to = []

[[requirements]]
uid = "731cb43a-a9d1-43f8-8678-fc97db81162e"
id = "SYS-010"
title = "Trace layer shall support genuine decomposition beyond 1:1:1"
owner = "soi"
scope = "soi"
description = """
The tool's own trace schema shall express (a) lateral mapping from
HLRs to user-visible behaviors (CLI verbs + observable contracts),
(b) N:M test-to-requirement associations, and (c) explicitly-marked
derived requirements with written rationale per DO-178C §5.2.2. A
1:1:1 HLR:LLR:TEST graph is not evidence of decomposition; the
schema shall refuse to present such a graph as sufficient without
the supporting machinery.
"""
verification_methods = ["test"]
traces_to = []

[[requirements]]
uid = "5e9988ce-1351-4e39-98af-835e96e5fc17"
id = "SYS-011"
title = "Diagnostic stream shall expose structured codes per Link-phase failure, not an opaque prose envelope"
owner = "soi"
scope = "soi"
description = """
Every Link-phase validation rule (surface bijection, derived-
rationale, dangling-link, ownership-violation, duplicate-uid, etc.)
shall surface as a distinct diagnostic code in the JSONL stream, so
agents and auditors can disambiguate violations by `code` rather
than by pattern-matching prose payloads. Bundling heterogeneous
rule failures under a single wrapper code (e.g. `TRACE_LINK_FAILED`
with a concatenated message) regresses to the pre-typed-diagnostic
shape the whole diagnostic-codes arc was built to eliminate.
"""
verification_methods = ["test"]
traces_to = []

[[requirements]]
uid = "94cb54a1-53a0-40e3-81a1-e3e8d231b0e7"
id = "SYS-012"
title = "Tool source shall be free of rot-prone context markers (PR-number breadcrumbs, absolute line counts, time-pinned narrative)"
owner = "soi"
scope = "soi"
description = """
Docstring comments with short-lived context markers — PR-number
breadcrumbs (`PR #49 removed ...`), absolute line counts
(`sits at ~497 lines`), time-pinned narrative (`post-PR-#51`),
review-round markers (`round-1 / round-2`) — are stale by the next
PR touching the same file. Reviewers stop trusting them; new
contributors read them as current context and spread
misinformation. The tool's source shall be mechanically free of
this class, enforced by a CI integration test that walks every
`.rs` file under `crates/**/{src,tests}/**` and fails on any
banned pattern. If a caution is genuinely load-bearing, encode it
as a test (file-size limit, bijection, strict-floor equality); if
it's narrative, it belongs in the commit message, not the code.
"""
verification_methods = ["test"]
traces_to = []
