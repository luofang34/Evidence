[workspace]
resolver = "2"
members = ["crates/*"]

[workspace.package]
version = "0.1.0"
edition = "2024"
rust-version = "1.85"
license = "MIT OR Apache-2.0"
repository = "https://github.com/user/evidence"
homepage = "https://github.com/user/evidence"
authors = []
keywords = ["certification", "evidence", "traceability", "reproducibility", "safety-critical"]
categories = ["development-tools", "command-line-utilities"]

[workspace.dependencies]
anyhow = "1"
clap = { version = "4", features = ["derive"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
sha2 = "0.10"
hmac = "0.12"
hex = "0.4"
log = "0.4"
toml = "0.8"
walkdir = "2"
chrono = { version = "0.4", features = ["serde"] }
uuid = { version = "1", features = ["v4"] }

# Internal crates
evidence = { version = "0.1.0", path = "crates/evidence" }
