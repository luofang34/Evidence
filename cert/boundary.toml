# Boundary configuration for this workspace.
#
# This is the dogfood config used by the `evidence-self-*` CI jobs.
# Every workspace member is in scope because the tool needs to hash
# both crates when it generates a bundle of itself.
#
# `no_out_of_scope_deps = true` enables the `check_no_out_of_scope_deps`
# rule end-to-end on every PR: any new workspace crate that a listed
# crate reaches has to be listed here or the generate fails loudly.
#
# `forbid_build_rs` / `forbid_proc_macros` stay false — for this
# workspace specifically. Both rules ship with full enforcement
# (see `evidence_core::boundary_check::check_no_build_rs` /
# `check_no_proc_macros`) plus a verify-time recheck against
# `cargo_metadata.json` (LLR-072). The reason this workspace
# can't enable `forbid_build_rs = true` is that
# `evidence-core/build.rs` is load-bearing — it embeds the
# engine's own git SHA into the binary via
# `EVIDENCE_ENGINE_GIT_SHA`, so bundles can prove which tool
# build produced them (SYS-017 / engine-source verification).
# Removing it would break that provenance chain. Other projects
# without engine-provenance constraints should set both flags to
# `true` at DAL-A/B per their certification posture.

[schema]
version = "0.0.1"

[scope]
in_scope = ["evidence-core", "cargo-evidence", "evidence-mcp"]

# Trace root directories (relative to workspace root). This repo's
# self-trace lives at `tool/trace/`; auto-discovery in
# `default_trace_roots()` already prefers that location, but the
# boundary.toml value is the documented fallback auditors read first.
# Keep the two in sync so an auditor opening this file doesn't head
# to a non-existent directory.
trace_roots = ["tool/trace"]

# Workspace crates explicitly forbidden as dependencies
explicit_forbidden = []

[policy]
no_out_of_scope_deps = true
forbid_build_rs = false
forbid_proc_macros = false

[forbidden_external]

[dal]
default_dal = "D"
