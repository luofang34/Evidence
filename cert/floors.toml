# Ratcheting floors for cargo-evidence itself (PR #48 / principle 2).
#
# Each entry is a current measurement taken at commit time; the CI
# floors-gate fails any change where `current < committed_floor`.
# Raising a floor is a PR that edits the number — reviewer-visible.
# Lowering a floor in this file triggers the `floors-only-up-lint`
# unless the PR body (or direct-to-main commit message) contains a
# line matching:
#
#     Lower-Floor: <dimension> <reason>
#
# The convention is strict: rigor only goes up. Every dimension below
# is a measurement the tool ratchets — deleting a requirement,
# dropping a test, or removing a diagnostic code is load-bearing
# enough that mechanical enforcement is worth the friction.
#
# Adding a new entry: land it in the same PR as the feature that
# makes the dimension measurable, set the floor to the commit-time
# value, and document the dimension's meaning in evidence::floors.
#
# `schema_version` pins the shape. A break in the shape (removed
# field, renamed table, incompatible type change) bumps this; an
# older tool reading a newer config refuses to proceed rather than
# silently skip unknown fields.
#
# This file is partitioned into workspace-true dimensions (one
# global value, `[floors]`) and per-crate-true dimensions (`[per_
# crate.<crate>]`). The per-crate split defends against a
# compensation mask — evidence adding a `panic!` while cargo-
# evidence removes one would leave a workspace-aggregate untouched
# but is a real rigor regression. The `per_crate.<crate>` key set
# must equal `cert/boundary.toml`'s `scope.in_scope`; CI enforces
# the bijection.

schema_version = 1

# --------------------------------------------------------------------
# Workspace-true dimensions: single global value.
# --------------------------------------------------------------------

[floors]

# evidence::RULES length — every diagnostic code the tool can emit,
# hand-curated. Lives in a single crate, so workspace-wide.
diagnostic_codes = 96

# evidence::TERMINAL_CODES length — hand-emitted terminals
# (VERIFY_OK / VERIFY_FAIL / VERIFY_ERROR / CLI_SUBCOMMAND_ERROR).
terminal_codes = 4

# tool/trace/sys.toml — System Requirements.
trace_sys = 12
# tool/trace/hlr.toml — High-Level Requirements.
trace_hlr = 44
# tool/trace/llr.toml — Low-Level Requirements.
trace_llr = 44
# tool/trace/tests.toml — Test Cases.
trace_test = 44

# evidence::trace::surfaces::KNOWN_SURFACES length — hand-curated
# catalog of CLI verbs + named observable contracts. Matching HLR
# coverage is enforced by `require_hlr_surface_bijection`; this floor
# guards against silently shrinking the catalog itself (which would
# relax the bijection without firing the check).
known_surfaces = 13

# --------------------------------------------------------------------
# Per-crate-true dimensions: one table per in-scope crate.
#
# [per_crate.<crate>]          — absolute floors: current >= value
# [per_crate_ceilings.<crate>] — absolute ceilings: current <= value
#
# Adding a crate to cert/boundary.toml requires adding its row to one
# of these tables or the bijection check fires. The key-union of the
# two tables must equal scope.in_scope.
# --------------------------------------------------------------------

[per_crate.evidence]
# `#[test]` attribute count inside crates/evidence/**/*.rs.
test_count = 213

[per_crate.cargo-evidence]
test_count = 74

# Per-crate ceilings. library_panics is a ceiling, not a floor: more
# panics is always worse. Before PR #49 this key lived in
# `[per_crate.<crate>]` with a floor, where `current >= 0` trivially
# passed — turning the gate into a no-op.

[per_crate_ceilings.evidence]
# panic! / unimplemented!() / todo!() in crates/evidence/src/**
# outside #[cfg(test)] blocks, sibling `tests.rs` facades, doc
# comments, string literals, and main.rs.
library_panics = 0

[per_crate_ceilings.cargo-evidence]
library_panics = 0
