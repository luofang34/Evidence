[[requirements]]
uid = "bebe9227-5f47-4eb8-89a7-f2157fb96e6c"
id = "HLR-056"
title = "generate compares per-level coverage aggregate against Dal::coverage_thresholds"
owner = "tool"
scope = "component"
description = """
On `cmd_generate` with `Profile::Cert` or `Profile::Record`
and `CoverageChoice != None`, after the typed `CoverageReport`
is built, the threshold-enforcement surface runs:

  1. Compute the max DAL across per-crate overrides (see
     `load_max_dal` mirror in `cli/check.rs` — doctor does
     the same thing for the downstream case).
  2. Pull `Dal::coverage_thresholds() -> DalCoverageThresholds
     {statement_percent: Option<u8>, branch_percent: Option<u8>}`
     for that DAL. DAL-D returns `{None, None}`; DAL-C sets
     statement = 90; DAL-B adds branch = 85; DAL-A tightens
     branch to 90.
  3. For each `(level, Some(threshold))` pair, if a measurement
     of that level exists, invoke the level-appropriate
     aggregator (`aggregate_lines_percent` for Statement,
     `aggregate_branches_percent` for Branch) and compare
     `current < f64::from(threshold)`. Comparison is strict
     `<` — DO-178C minima are stated inclusively, so equality
     passes.
  4. Each shortfall emits `COVERAGE_BELOW_THRESHOLD {
     dimension: "statement" | "branch", current: f64,
     threshold: u8 }`. The CLI translates any violation into
     exit 2 (`EXIT_CERT_REQUIREMENT_UNMET`), refusing to
     finalize a bundle that can't back its A-7 Obj-5/6 claim.

Dev profile surfaces the report but skips the enforcement
block entirely — the `enforce_thresholds` flag gates on
`matches!(profile, Profile::Cert | Profile::Record)`.
"""
verification_methods = ["test"]
traces_to = ["895097b2-6d08-4ef7-9305-143a87424684"]

[[requirements]]
uid = "79afc7a1-22dd-450e-8f0c-c29c93b48905"
id = "HLR-057"
title = "cli::doctor derives its trace DAL via load_max_dal, not default_dal"
owner = "tool"
scope = "component"
description = """
`cli::doctor::checks::check_trace` calls `load_max_dal(workspace)`
instead of `load_default_dal`. The returned DAL feeds
`EvidencePolicy::for_dal(dal).trace`, which gates the doctor
sub-checks that depend on DAL level (require_hlr_sys_trace at
DAL ≥ C, require_derived_rationale at DAL ≥ C, ...). Same
substitution in `cli::doctor::qualification::check_qualification`
— the DAL ≥ C gate that drives
`DOCTOR_QUALIFICATION_MISSING` must also see the raised DAL.

Both callsites keep the `(dal, boundary_loadable)` tuple shape
so the existing fallback-note plumbing (user-visible "(assumed
DAL-D, boundary unloadable)" on failure messages) is unchanged
for the load-failure branch.

Rename `load_default_dal` → `load_max_dal` is load-bearing: the
old name encodes the bug in its signature. "load_default" reads
as "the default from the config"; "load_max" reads as "the
effective DAL across the configured in-scope set" — matches the
new behavior and makes drift to the old semantic obvious at
callsite.
"""
verification_methods = ["test"]
traces_to = ["71c07b24-9d90-4ad5-ae9a-a7c2fe55c93c"]

[[requirements]]
uid = "2087d91a-12ba-4b3a-ab43-632f670bad49"
id = "HLR-058"
title = "generate threads trace_validation_passed bool from Phase 6 to write_compliance_reports"
owner = "tool"
scope = "component"
description = """
In `cmd_generate`, Phase 6 (`validate_trace_links_phase`)
returns a `TraceValidationResult { passed, short_circuit }`.
The caller:

  1. Checks `short_circuit` — Some(code) means strict profile
     hit a failure; return that exit code immediately.
  2. Threads `passed` into Phase 8 (`write_compliance_reports`)
     as a required parameter, which forwards to
     `evidence_core::CrateEvidence.trace_validation_passed`.

`write_compliance_reports` no longer has a place to hardcode
`true`; the bool is a non-defaultable parameter, so any
future phase that wants to claim A3-6 Met has to feed the
actual validation outcome. Type system enforces the honesty
invariant.

Non-strict (dev) profile warn-and-continue produces
`passed = false`; compliance reports claim A3-6 Partial
instead of Met. Strict profile (cert / record) short-circuits
before `write_compliance_reports` runs on any validation
failure, so the compliance JSON is never written for a
failing strict run — the bundle itself is refused.
"""
verification_methods = ["test"]
traces_to = ["1eaaa60c-e8e0-4209-8ca5-51108495df61"]

[[requirements]]
uid = "cb44260b-778a-45f0-9a2b-8304dfd836c0"
id = "HLR-059"
title = "evidence-mcp ServerHandler returns {name: evidence-mcp, version: CARGO_PKG_VERSION} in get_info"
owner = "tool"
scope = "component"
description = """
`evidence_mcp::server::Server`'s `ServerHandler` impl is
generated by rmcp's `#[tool_handler]` attribute. The attribute
takes optional `name` and `version` parameters that feed into
the auto-generated `get_info()` body:

  - `name = "evidence-mcp"` is passed explicitly.
  - `version` is omitted, which makes the macro expand to
    `env!("CARGO_PKG_VERSION")` at the callsite — reading
    evidence-mcp's crate version, not rmcp's.

The resulting `get_info()` returns a `ServerInfo` whose
`server_info` field is `Implementation::new("evidence-mcp",
env!("CARGO_PKG_VERSION"))`, replacing rmcp's default
`Implementation::from_build_env()` (which would have read
rmcp's name/version).

The override lives on the attribute — no hand-written
`get_info` method. Keeping the override declarative means the
serverInfo identity is pinned by the macro input, not by a
hand-written function body that could silently drift if a
future rmcp rewrite restructures the ServerHandler trait.
"""
verification_methods = ["test"]
traces_to = ["95610f58-a5c7-4a63-a96b-f18f74d6471a"]

[[requirements]]
uid = "4955bb57-af8d-402f-b2bf-42ef5baadc54"
id = "HLR-060"
title = "evidence-mcp probes cargo evidence --version at startup and prepends MCP_VERSION_SKEW / MCP_VERSION_PROBE_FAILED"
owner = "tool"
scope = "component"
description = """
`Server::new()` spawns `cargo evidence --version` with a 5-
second timeout, parses the last whitespace-separated token on
the first non-empty stdout line as the CLI's version string,
and compares against `env!("CARGO_PKG_VERSION")` (evidence-
mcp's own crate version at compile time).

Three outcomes, cached in `Server.version_skew`:

  - Matched: versions agree. No diagnostic synthesized.
  - Skewed { mcp, cli }: versions disagree. Tool responses
    prepend `MCP_VERSION_SKEW` (Warning) with both strings in
    the message.
  - ProbeFailed(reason): binary missing, spawn error, non-zero
    exit, or unparseable output. Tool responses prepend
    `MCP_VERSION_PROBE_FAILED` (Warning) with the reason.
    Distinct code so an agent can branch on "unknown version"
    vs "versions disagree".

Probe runs exactly once per `Server::new` — caching the
outcome in `Arc<VersionSkew>` keeps per-call cost at zero
while still letting every tool response carry the signal.
Per-call probing would pay a ~100 ms subprocess spawn on
every tool invocation.

Signal-carrying fields:
  - `JsonlToolResponse.diagnostics[]` / `.summary` for
    evidence_doctor / evidence_check (same pattern as the
    existing MCP_WORKSPACE_FALLBACK prepend).
  - `RulesToolResponse.warnings[]` for evidence_rules — a
    new additive field (empty when no skew), separate from
    the CLI's `rules[]` manifest so agents consuming the
    manifest don't have to filter out server signals.

Related: the startup probe also depends on `cargo evidence
--version` actually working. A sibling fix in
`cargo-evidence`'s main.rs intercepts `--version` / `--help`
before clap (which rejects the bare flag because CargoCli's
subcommand dispatch form is `cargo-evidence evidence ...`,
not `cargo-evidence ...`). That fix is a pre-requisite for
HLR-060's probe to succeed in the current workspace.
"""
verification_methods = ["test"]
traces_to = ["32d89a3d-7905-45fe-ba5b-3b02a660855f"]

[[requirements]]
uid = "1e5aae33-ad51-43c3-b572-52023275175b"
id = "HLR-061"
title = "MCP exposes evidence_ping as a cheap liveness + version-skew probe that does not spawn a subprocess"
owner = "tool"
scope = "component"
description = """
`evidence_ping` is an agent-facing MCP tool that returns the
MCP server's cached liveness state in a single round-trip:

- `mcp_version` — evidence-mcp's `CARGO_PKG_VERSION` at build
  time.
- `cli_version` — the cargo-evidence version captured by the
  one-shot startup probe (HLR-060), or `None` if the probe
  failed.
- `skew` — a short string tag (`"matched"`, `"skewed"`, or
  `"probe_failed"`) carrying the cached `VersionSkew` outcome.
- `probe_error` — populated only when `skew == "probe_failed"`,
  carrying the reason string from the startup probe.

No subprocess spawn per call. The handler reads the cached
`Arc<VersionSkew>` that `Server::new()` populated at startup,
so an agent can call `evidence_ping` at any frequency without
touching `cargo`, `fs`, or the network.

Intended usage: hosts use `evidence_ping` as a reachability
check before issuing expensive tool calls (e.g., `cargo test
--workspace` under `evidence_check --mode=source`). A host
that previously pulled the full rules blob just to verify the
server is reachable now gets a small structured response
instead.

`rules` / `doctor` / `check` remain the core verbs (HLR-050).
ping is deliberately NOT a wrapper over any `cargo evidence`
subcommand — its value is being cheap. That asymmetry is the
surface contract.
"""
surfaces = ["agent MCP surface"]
verification_methods = ["test"]
traces_to = ["385c2c4c-748c-4486-bd8c-7622b12c9273"]

[[requirements]]
uid = "0ba7d479-c45b-4786-9ff9-7e7a75565765"
id = "HLR-062"
title = "MCP exposes evidence_floors so agents can query the ratchet-gate state"
owner = "tool"
scope = "component"
description = """
`evidence_floors` is an agent-facing MCP tool that wraps
`cargo evidence floors --format=jsonl`: read-only ratchet-
state query over the workspace. Responds with the same
`JsonlToolResponse` shape as `evidence_doctor` /
`evidence_check`:

  - `terminal` — `FLOORS_OK` (all dimensions satisfied) or
    `FLOORS_FAIL` (one or more dimensions below committed
    floor) on well-formed runs; one of the `MCP_*` error
    terminals on subprocess failure (LLR-064).
  - `diagnostics` — one `FLOORS_DIMENSION_OK` /
    `FLOORS_BELOW_MIN` per measured dimension, in stream
    order. Agents pattern-match on `.code` to enumerate
    violations.
  - `summary` — per-code frequency map.
  - `exit_code` — 0 on `FLOORS_OK`, 2 on `FLOORS_FAIL` or
    tool-layer failure.

Input: optional `workspace_path`; missing path resolves to
server CWD and prepends the `MCP_WORKSPACE_FALLBACK` warning
(HLR-054).

Intended usage: agents driving a PR-review workflow use
`evidence_floors` to diagnose a red ratchet gate without
clone-and-build. An LLM receiving the structured stream can
name each dimension that regressed — `diagnostic_codes`,
`trace_llr`, `per_crate.evidence-mcp.test_count`, etc. — and
suggest fixes that only touch the specific inputs.
"""
surfaces = ["agent MCP surface"]
verification_methods = ["test"]
traces_to = ["385c2c4c-748c-4486-bd8c-7622b12c9273"]

[[requirements]]
uid = "b38d6ef2-1287-4087-b580-b81450f596a3"
id = "HLR-063"
title = "MCP exposes evidence_diff so agents can compare two bundles"
owner = "tool"
scope = "component"
description = """
`evidence_diff` is an agent-facing MCP tool that wraps
`cargo evidence diff <bundle_a> <bundle_b> --json`: pure
inspection, compares two on-disk bundles and returns the
structured delta across inputs, outputs, metadata, and env.

Input: two paths (`bundle_a_path`, `bundle_b_path`); both
required, no default. `#[serde(deny_unknown_fields)]` matches
the other MCP tool input shapes.

Response shape:

  - `diff: Option<serde_json::Value>` — the raw blob the CLI
    emits on success: `{bundle_a, bundle_b, inputs_diff,
    outputs_diff, metadata_diff, env_diff}`. `None` on tool-
    layer failure.
  - `exit_code: i32` — 0 on success (even when differences
    are found; diff reports, doesn't judge); 2 on tool-layer
    failure.
  - `warnings: Vec<serde_json::Value>` — version-skew signals
    from the startup probe (HLR-060), empty in the happy path.
  - `error: Option<serde_json::Value>` — tool-layer failure
    diagnostic carrying an `MCP_*` code (LLR-064). `None` on
    success.

Intended usage: AI PR-reviewers call `evidence_diff` on the
pre-PR and post-PR bundles to surface content-hash, metadata,
and env-capture changes. Because the CLI's output is a single
JSON blob (not JSONL), the response shape differs from the
streaming verbs — there's no `terminal` / `diagnostics` /
`summary` triad.
"""
surfaces = ["agent MCP surface"]
verification_methods = ["test"]
traces_to = ["385c2c4c-748c-4486-bd8c-7622b12c9273"]

[[requirements]]
uid = "beae070b-5998-48f4-8fd9-235ed14c93d5"
id = "HLR-064"
title = "Boundary policy can forbid build scripts in in-scope crates"
owner = "tool"
scope = "component"
description = """
When `cert/boundary.toml` sets `forbid_build_rs = true`,
`cargo evidence generate` refuses to produce a bundle if any
in-scope crate has a `build.rs`. Refusal applies before bundle
assembly and surfaces a `BOUNDARY_FORBIDDEN_BUILD_RS` finding
listing every offender with its `build.rs` path plus, when set,
the package’s `links` value (native FFI binding) for the
auditor.

Rationale: build scripts run arbitrary host code at build time,
so the resulting object files are a function of the build host,
not just the repository state. DAL-A/B determinism requires the
build output to be reproducible from `(git_sha, toolchain)`
alone; an enabled build.rs invalidates that. Per-crate scoping
is preserved — a build.rs in an out-of-scope crate is fine.

The rule is enforced at both generate-time and verify-time so a
bundle re-verified after a build.rs is added between generate
and verify is still caught (LLR-072).
"""
verification_methods = ["test"]
traces_to = ["5af6e706-6aef-411d-811d-747633876695"]

[[requirements]]
uid = "49d5c8b2-5c51-4046-a08d-ffde61f6c846"
id = "HLR-065"
title = "Boundary policy can forbid proc-macros in in-scope crates"
owner = "tool"
scope = "component"
description = """
When `cert/boundary.toml` sets `forbid_proc_macros = true`,
`cargo evidence generate` refuses to produce a bundle if any
in-scope crate exposes a target with `kind = ["proc-macro"]`.
Refusal applies before bundle assembly and surfaces a
`BOUNDARY_FORBIDDEN_PROC_MACRO` finding listing every
offender.

Rationale: proc-macros execute arbitrary code at compile time
and synthesize source that is not present in the
version-controlled tree. The DO-178C auditability assumption
— every line of in-scope code is reviewable in the repository
— doesn’t hold for proc-macro-expanded code: an auditor would
have to re-run the macro to see what was actually compiled.
For in-scope crates this is a non-starter at high DALs.

Distinct HLR from build_rs (HLR-064) because the rationale
differs (auditability of generated source vs determinism of
host-side build); a future relaxation of one rule should not
drag the other along.

The rule is enforced at both generate-time and verify-time so a
bundle re-verified after a proc-macro is added between generate
and verify is still caught (LLR-072).
"""
verification_methods = ["test"]
traces_to = ["5af6e706-6aef-411d-811d-747633876695"]

[[requirements]]
uid = "c222804b-4d4f-4dfd-8765-2fd51a730ecc"
id = "HLR-066"
title = "DAL-A in-scope crate without auxiliary MC/DC tool reference fails cert/record generate"
owner = "tool"
scope = "component"
description = """
At cert / record profile, `cargo evidence generate` refuses to
assemble a bundle when any in-scope crate carries DAL-A and the
project’s `cert/boundary.toml` does not record an
auxiliary qualified MC/DC tool reference under the
`[dal.auxiliary_mcdc_tool]` table.

Rationale: DO-178C Annex A Table A-7 Obj-7 requires Modified
Condition / Decision Coverage at DAL-A. Stable Rust cannot emit
MC/DC instrumentation today — the unstable
`-Zcoverage-options=mcdc` flag was removed by
rust-lang/rust#144999 (merged 2025-08-08); tracking issue
rust-lang/rust#124144 has no active reimplementation. The only
viable path for a DAL-A submission is to record an external
qualified tool’s evidence (LDRA TBvision, VectorCAST, Rapita
RVS) by reference. Without that reference the bundle would
silently underclaim Obj-7 (the bundle’s
`compliance/<crate>.json` would mark A7-10 as `NotMet` while
the terminal could still be `VERIFY_OK` because branch
coverage was met) — a known sharp edge an auditor would catch
but a careless DER might miss.

On dev profile the same condition emits a Warning to stderr
and allows the run to proceed, so projects iterating on DAL
assignment locally are not blocked.
"""
verification_methods = ["test"]
traces_to = ["5af6e706-6aef-411d-811d-747633876695"]

[[requirements]]
uid = "48a416ff-8555-4a26-b802-bc854cc4d0fd"
id = "HLR-067"
title = "MCP tool responses carry an explicit success boolean"
owner = "tool"
scope = "component"
description = """
Every MCP tool response — `JsonlToolResponse`, `RulesToolResponse`,
`DiffToolResponse` — carries a top-level `success: bool` field that is
`true` exactly when the underlying CLI run produced no error. The
field is additive and structured so a host need not pattern-match on
`exit_code`, scan the diagnostics array, or string-suffix the
`terminal` to learn pass/fail. Existing fields (`exit_code`,
`terminal`, `error`) remain unchanged for callers that already parse
them.

Derivation rules, fixed in the schema docstrings:

  - `JsonlToolResponse.success`: `terminal.ends_with("_OK")` and
    `exit_code == 0`. Both conditions must hold; a tool-layer
    `MCP_*` error sets `terminal` to the MCP code AND flips
    `exit_code` to 2, so success is false.
  - `RulesToolResponse.success`: `error.is_none() && exit_code == 0`.
    Server-layer `warnings` (version-skew prepends) are
    informational and do not flip success.
  - `DiffToolResponse.success`: `error.is_none() && exit_code == 0`.
    Diff reports differences but does not judge them; finding a
    delta is still success.

Rationale: LLR-064 documented the contract that hosts must
dispatch on `terminal` / `error.code` rather than on `exit_code`,
because the CLI's verification-fail (exit 2) and the MCP's tool-layer
fail (also exit 2) deliberately collide. Documentation alone does
not prevent an implementer from defaulting to the simple
`exit_code != 0` dispatch and conflating the two failure classes —
the contract should be machine-evident, not just human-readable.
A single boolean derived deterministically from the structured
fields makes the contract bullet-proof: hosts have one canonical
field to read.

The boolean is computed inside `evidence-mcp` (not produced by the
CLI), so the CLI's exit-code semantics stay unchanged. Older agents
that ignore unknown JSON fields keep working; newer agents read
`success` directly. The field is documented as the canonical
machine signal in `crates/evidence-mcp/README.md`'s "Failure-shape
contract" section.
"""
verification_methods = ["test"]
traces_to = ["385c2c4c-748c-4486-bd8c-7622b12c9273"]
surfaces = ["agent MCP surface"]

[[requirements]]
uid = "34234f8b-9f0b-47d4-829e-aed0ac96d51c"
id = "HLR-068"
title = "Direct cargo-evidence --help invocation lists subcommands, not a redirect stub"
owner = "tool"
scope = "component"
description = """
`cargo-evidence --help` and `cargo-evidence -h`, when invoked
directly (binary path resolved via `which cargo-evidence` rather
than the cargo subcommand dispatch `cargo evidence ...`), print a
usable summary of every subcommand. Output is reachable without
needing the user/agent to know that the canonical invocation form
is `cargo evidence ...`.

Output shape, fixed by the test:

  - First line: `cargo-evidence <version> — DO-178C / DO-330
    evidence bundles for Rust crates.`
  - Invocation hint paragraph naming both forms (`cargo evidence`
    and direct binary).
  - A `SUBCOMMANDS:` block listing every variant of the `Commands`
    enum in `cli::args` with its one-line description (clap's
    auto-help rendering, generated from the `#[command(about = …)]`
    attributes on each variant). New subcommands appear
    automatically when added — the binary intercept must not
    drift from clap's view.

Existing behavior preserved:

  - `cargo evidence --help` (the cargo subcommand path) continues
    to flow through clap's `#[command(version)]` /
    `#[command(about)]` auto-handler on `EvidenceArgs`, unchanged.
  - `cargo-evidence --version` / `-V` continues to print
    `cargo-evidence <version>` and exit 0.

Rationale: an agent that pins the binary path with
`which cargo-evidence` and runs the resolved path's `--help`
directly currently gets a four-line stub directing back to
`cargo evidence --help`. That asymmetry is friction without
purpose: the help content already exists in clap's render tree.
The intercept should reuse that render tree, not paper over it.
"""
verification_methods = ["test"]
traces_to = ["385c2c4c-748c-4486-bd8c-7622b12c9273"]
surfaces = ["agent MCP surface"]

[[requirements]]
uid = "202c2281-f2d7-4e43-8a6e-93da96f92add"
id = "HLR-069"
title = "Repository contains no editor-duplicate artifacts (` N.<ext>` filenames)"
owner = "tool"
scope = "component"
description = """
A mechanical gate refuses any path under the repository whose
basename matches the editor-duplicate pattern: stem + ` ` (single
ASCII space) + small-integer suffix + extension, for any of the
extensions the project recognizes as cert-relevant
(`.rs`, `.toml`, `.yml`, `.yaml`, `.md`, `.json`, `.lock`).

Concrete pattern, fixed in the test:

  - Regex (basename, anchored): `^.+ ([0-9]{1,2})\\.(rs|toml|yml|yaml|md|json|lock)$`.
  - Walks `crates/**`, `cert/**`, `tool/**`, `.github/**`, plus
    repo-root `*.md` / `*.toml`. Excludes `target/`, `.git/`,
    `node_modules/`, `fixtures/`, `cert/trace/` (audit journal).
  - Also walks `.git/refs/` for branch-name duplicates (the
    `main 2` ref artifact a misbehaving git client occasionally
    leaves behind).

Failure mode the gate prevents: a file like
`crates/cargo-evidence/tests/cli 2.rs` lands silently, compiles
into the test binary, inflates `#[test]` counts seen by the
floors gate, and survives in-tree until a manual sweep catches
it. The user's auto-memory captures the same trap
(`project_stray_2rs_artifacts.md`) — promoting it to a project-
level mechanical gate makes the rule observable in CI rather
than relying on memory recall.

Reserved-text-style escape hatch: the test exposes a
`RESERVED_DUPLICATE_PATHS` const, initially empty. An editor
artifact that is genuinely load-bearing (say, a third-party
file the project consumes whose name happens to match the
pattern) gets an entry here with written justification. The
default state is zero exemptions.
"""
verification_methods = ["test"]
traces_to = ["4b63a601-9770-4c3a-bfe4-e1d70e050c65"]
surfaces = ["editor-duplicate gate"]
