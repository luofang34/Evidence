uid = "4aad7a9e-ec91-42a6-9360-a4c7f8e50761"
id = "HLR-045"
title = "Cross-time determinism is enforced by comparing every PR's deterministic_hash to the last successful main-branch build"
owner = "tool"
scope = "component"
description = """
On every push to a PR branch and every push to main, a CI job
shall (a) build the release binary on the current tree, (b)
download the most recent successful main-branch bundle artifact,
(c) extract `deterministic_hash` from both, (d) compare. If the
two hashes match, the job passes silently. If they differ and the
commit message or PR body contains a line matching
`^Override-Deterministic-Baseline: .+`, the job passes with a
logged notice. If they differ with no override line, the job
fails with a message naming the two hashes and the expected
override syntax. Artifact fetch failures (prior artifact expired
beyond 14-day retention, no prior main run) degrade to a logged
warning + pass, so the gate doesn't block a repo with no
artifact history.
"""
verification_methods = ["test"]
traces_to = ["3596cc7b-d8ce-46fb-8a92-62c55a40758b"]
surfaces = ["generate"]

