[[requirements]]
uid = "78a03d07-7314-46bc-8b63-776104d99c35"
id = "HLR-006"
title = "Capture atomic git snapshot at start"
owner = "tool"
scope = "component"
description = """
Generate captures the git SHA, branch, and dirty status once at the
start of the run and re-checks the SHA at finalize. Downstream steps
read from the captured snapshot, not from fresh git queries, so a
HEAD move mid-run cannot create a bundle that mixes two commits.

**Analysis claim** (DO-178C §6.3.4 verification by analysis): test
alone covers the capture-and-recheck behavior in isolation against a
mock `GitProvider`, but cannot prove that *every* git query in the
generate pipeline flows through the captured `GitSnapshot` rather
than spawning `git` directly. That call-site invariant is verified
by code analysis: `crates/evidence-core/src/git.rs` and
`crates/cargo-evidence/src/cli/generate/phases.rs` are the only
modules permitted to invoke `Command::new("git")` (or equivalent),
and downstream phases read the SHA from the `EvidenceBuilder`'s
captured field. The analysis is recorded in the SDD-equivalent
section of `cert/trace/README.md` and re-confirmed at every PR
review; a future PR introducing a clippy `disallowed_types`
restriction on `Command::new` outside the git module would convert
this from manual analysis to mechanical, but the soft analysis
suffices for the current dev-profile shipping bar.
"""
verification_methods = ["test", "analysis"]
traces_to = ["e16aabff-6655-4405-a1eb-b32f3def85f6"]
surfaces = ["generate"]

