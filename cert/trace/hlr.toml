handler emits a synthetic `MCP_WORKSPACE_FALLBACK` (Warning)
diagnostic at the head of the returned `diagnostics` stream so
the agent sees an observable signal before the CLI-produced
diagnostics. Absolute + explicit relative paths bypass the
fallback signal entirely.
"""
